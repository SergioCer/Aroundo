<!DOCTYPE html>
<html>
<head>
  <title>Aroundo - Territory Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #f4f1ea;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* Piccolo overlay futuro per atmosfera */
    .map-overlay {
      position: absolute;
      top: 15px;
      left: 50px;
      z-index: 999;
      background: rgba(255,255,255,0.85);
      padding: 10px 14px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    /* Menù a discesa */
    .map-overlay2 {
      position: absolute;
      top: 80px;      /* spostato sotto title/subtitle */
      left: 50px;
      z-index: 999;
      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      max-height: 60vh;   /* limita altezza */
      overflow-y: auto;   /* scroll verticale se tante categorie */
    }

    
    
    .title {
      font-weight: 600;
      font-size: 14px;
      color: #3f3f3f;
      text-align: center;
    }

    .subtitle {
      font-size: 12px;
      color: #6b6b6b;
      margin-top: 2px;
      text-align: center;
    }
    
    /* marker base animato */
    .pulse {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      position: relative;
      background: inherit;
    }

    .pulse::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: inherit; /* <-- importante */
      z-index: 1;
      opacity: 0.6;
      animation: pulse 1.8s infinite;
    }
    
@keyframes pulse {
  0% {
    transform: scale(1);
    opacity: 0.6;
  }
  100% {
    transform: scale(2.5);
    opacity: 0;
  }
}
    
  </style>
</head>

<body>

<div class="map-overlay">
  <div class="title">Aroundo</div>
  <div class="subtitle">Discover what’s around you</div>
</div>

<div class="map-overlay2" id="category-menu">
  <button id="menu-toggle">Filtra per categoria ▼</button>
  <div id="menu-items" style="display:none; margin-top:6px;"></div>
</div>
  
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
  import { supabase } from './supabase.js';
  let categories = [];
  let icons = {};
  let events = [];
  
  async function fetchCategories() {
    const { data, error } = await supabase
      .from('MacroCategorie')
      .select('*')
      .eq('mc_attiva', true)
      .order('mc_descrizione', { ascending: true });
    if (error) {
      console.error("Errore caricamento categorie:", error);
      return [];
    }
    console.log(data);
    return data;
  }

async function fetchEvents() {
  const { data, error } = await supabase
    .from('Eventi')
    .select('*');
  if (error) {
    console.error("Errore caricamento eventi:", error);
    return [];
  }
  return data;
}
  

  // Coordinate: Sicilia occidentale
  const map = L.map('map', {
    zoomControl: true
  }).setView([38.0, 12.6], 12); /* sopra/sotto destra/sinistra il'12 indica lo zoom della mappa dalla posizione centrale (Trapani 38.0 12.5) */

  // Popola i filtri delle categorie
async function buildCategoryMenu() {
  const menuItemsDiv = document.getElementById('menu-items');

  categories.forEach(cat => {
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = cat.mc_slug;         // ID univoco
    cb.checked = cat.mc_attiva;  // boolean dal DB

    const label = document.createElement('label');
    label.htmlFor = cat.mc_slug;
    label.style.marginRight = '10px';
    label.textContent = cat.mc_descrizione; // testo leggibile

    menuItemsDiv.appendChild(cb);
    menuItemsDiv.appendChild(label);
    menuItemsDiv.appendChild(document.createElement('br'));
  });

  const toggleBtn = document.getElementById('menu-toggle');

  toggleBtn.addEventListener('click', () => {
    menuItemsDiv.style.display =
      menuItemsDiv.style.display === 'none' ? 'block' : 'none';
});
}

  document.addEventListener('DOMContentLoaded', async () => {
  // 1. prendi categorie
  categories = await fetchCategories();
  // 2. icone categorie
  icons = {};
  categories.forEach(cat => {
    icons[cat.id_macro_categoria] = createIcon(cat.mc_colore);
  });
  // 3. eventi (DA DB)
  events = await fetchEvents();
  // 4. menu UI
  buildCategoryMenu();
  // 5. markers della mappa
  renderEvents();
});
  
  // 🌿 Base map più calda (meno grigia)
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {
      attribution: '&copy; OpenStreetMap & CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }
  ).addTo(map);

 // 🎨 ICON SET PER CATEGORIE

function renderEvents() {
  events.forEach(e => {
    L.marker([e.ev_lat, e.ev_lng], {
      icon: icons[e.type]
    })
    .addTo(map)
    .bindPopup(`
    <b>${e.ev_titolo}</b><br>
    ${e.ev_descrizione || ''}
    `);
  });
}
  
function createIcon(color) {
  return L.divIcon({
    className: '',
    html: `
      <div 
      class="pulse"
      style="
      background: ${color};
      box-shadow:0 0 12px ${color};
      ">
      </div>
    `,
    iconSize: [20, 20]
  });
}  
</script>
</body>
</html>
