<html>
<head>
  <title>Aroundo - Territory Map</title>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #f4f1ea;
    }

    #map {
      height: 100dvh;
      width: 100%;
    }

    /* Riduce attributi Leaflet */
    .leaflet-control-attribution {
      font-size: 8px;               /* più piccolo */
      opacity: 0.5;                 /* meno invadente */
      background: rgba(255,255,255,0.3);     /* leggermente trasparente */
      padding: 2px 2px;
    }
    
    #fx-canvas {
      position: absolute;
      top: 0;
      left: 0;
      height: 100dvh;
      width: 100%;
      pointer-events: none;     /* Non blocca i click sulla mappa */
      z-index: 9999;
    }
    
    /* Titolo */
    .title {
      font-weight: 600;
      font-size: 20px;
      color: #3b82f6;
      text-align: center;
    }

    /* Sotto titolo */
    .subtitle {
      font-size: 14px;
      color: #6b6b6b;
      margin-top: 2px;
      text-align: center;
    }    
    
    /* -- Rettangolo Aroundo trasparente */
    .map-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      padding: 20px;
      border-radius: 16px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0.8));
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);     /* Velocità */ 
    }

    /* stato “mini” in alto a destra */
    .map-overlay.minimized {
      top: 20px;
      right: 10px;
      left: auto;
      transform: none;
      width: 35px;
      height: 35px;
      padding: 0;
      border-radius: 50%;
      overflow: hidden;
    }

    /* icona toggle */
    #overlayToggle {
      position: fixed;
      top: 20px;
      right: 10px;
      z-index: 1000;
      width: 40px;
      height: 40px;
      display: none;
      background: #3b82f6;
      color: white;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* -- Rettangolo filtro categorie */
    .map-overlay2 {
      position: absolute;
      top: 6px;
      left: 10px;
      z-index: 999;
      background: linear-gradient(to bottom, rgba(255,255,255,0.25), rgba(255,255,255,0.1));
      padding: 2px 2px;     /* Contenitore */
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      min-width: 140px;
      width: fit-content;
      max-width: 200px;
      max-height: 60vh;     /* limita altezza della sezione in verticale */
      overflow-y: auto;     /* scroll verticale se tante categorie */
    }
      
    /* -- Rettangolo barra temporale */
    .top-timebar {
      position: absolute;
      top: 6px;                      /* distanza dal bordo superiore */
      left: 50%;                     /* centro orizzontale */
      transform: translateX(-50%);   /* centraggio reale */
      z-index: 998;
      display: flex;
      flex-direction: row;           /* elementi in riga su desktop */
      align-items: center;
      justify-content: center;       /* centrare internamente */
      gap: 10px;                     /* distanza tra elementi interni */
      width: 330px;                  /* dimensione reale del contenitore */
      height: 90px;                  /* altezza fissa per contenuto */
      padding: 2px 2px;              /* spazio interno */
      border-radius: 16px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.25), rgba(255,255,255,0.08));
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    /* Pallino torna alla data di oggi */
    .reset-btn {
      border: none;
      background: transparent;
      font-size: 32px;
      cursor: pointer;
      color: #3b82f6;
      padding: 6px 10px;
      border-radius: 10px;
      font-weight: bold;
      transition: background-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .reset-btn:hover {
      background: rgba(59, 130, 246, 0.08);
      transform: translateY(-2px) scale(1.12);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .reset-btn:active {
      transform: translateY(0px) scale(0.96);
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    /* --- MENU & FILTRI --- */
    /* -- Menù a discesa */
    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 4px;
      width: 130px;       /* larghezza */
    }

    /* Elementi del menu */ 
    #menu-items {
      max-height: 72vh;
      overflow-y: auto;
    }

    /* elementi in verticale */
    .vertical-toggles {
      display: flex;
      flex-direction: column;
      width: 140px;     /* largezza massima della riga */
      gap: 3px;         /* Distanzia le singole categorie in verticale */
    }
    
    /* Bordino intorno a checkbox e label di Seleziona Categorie */
    .toggle-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      padding: 4px 10px;
      min-height: 30px;     /* Garantisce l'hover */
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(4px);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: black;
      user-select: none;
      transition:
        background 0.2s ease,
        border-color 0.2s ease,
        transform 0.15s ease;
    }

      /* Passaggio del mouse */
      .toggle-pill:hover {
        background: rgba(255,255,255,0.20);
        border-color: rgba(255,255,255,0.4);
    }

    /* Checkbox Categorie */
    .category-checkbox {
      position: absolute;
      background: transparent;
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    /* Checkbox specifiche grafiche */
    .toggle-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      vertical-align: middle;
      margin-right: 6px;
      font-size: 12px;
      position: relative;
      transition:
        background 0.2s ease,
        transform 0.2s ease,
        opacity 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    /* Checkbox Attiva */
    .toggle-checkbox:checked {
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-color: white;
    }
    
    /* Checkbox Piccolo punto bianco interno */
    .toggle-checkbox:checked::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    /* Label delle categorie */
    .category-label {
      white-space: nowrap;
      display: flex;
      align-items: center;          /* icona e testo allineati in alto */
      justify-content: flex-start;  /* testo a sinistra */
      margin: 2px;                  /* distanza verticale compatta */
      cursor: pointer;
      border-radius: 50px;
      padding: 1px 4px;     /* leggero padding */
      flex-grow: 1;         /* permette all'hover di utilizzare tutta la larghezza */ 
      font-size: 12px;
      color: #fff;
      font-weight: 500;
      user-select: none;
      transition: opacity 0.2s;
    }

    /* Cerchietto prima del testo */
    .category-label::before {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 6px;
      border: 2px solid white;
      box-sizing: border-box;
      background: transparent;
      transition:
        background 0.2s ease,
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    /* Categoria disattiva */
    .category-checkbox:not(:checked) + .category-label {
      opacity: 0.75;
    }

    /* Pallino categoria disattiva */
    .category-checkbox:not(:checked) + .category-label::before {
      background: white;
     }
      
    /* PULSAZIONI dei Marker */
    /* Marker pulsazioni base */
    .pulse { border-radius: 50%; position: relative; z-index: 990; }
    .pulse::before { content: ""; position: absolute; inset: 0; border-radius: 50%; background: var(--c); z-index: 990; }
    .pulse::after { content: ""; position: absolute; inset: -40%; border-radius: 50%; background: var(--c); z-index: 990; opacity: 0.25; transform: scale(0.6); }
    /* Marker pulsazioni in funzione del tempo */
    .pulse.distant { animation: none; }
    .pulse.distant::after { animation: none; opacity: 0; }    
    .pulse.future-deep { animation: none; }
    .pulse.future-deep::after { animation: none; opacity: 0; }    
    .pulse.future-far { animation: hopSlow 3s infinite; }
    .pulse.future-medium { animation: hopMedium 2s infinite; }
    .pulse.future-near { animation: hopFast 1s infinite; }
    .pulse.imminent { animation: hopCrazy 0.5s infinite; }
    .pulse.imminent::after { animation: pulse 0.5s infinite ease-out; opacity: 0.45; }
    .pulse.countdown { animation: hopCrazy 0.3s infinite; }
    .pulse.countdown::after { animation: pulse 0.3s infinite ease-out; opacity: 0.8; }
    .pulse.started { animation: hopLive 2s infinite; }    
    .pulse.started::after { animation: pulseLive 0.3s infinite; }
    .pulse.running { animation: none; }
    .pulse.running::after { animation: pulse 2.5s infinite ease-out; opacity: 0.2; }
    .pulse.running-strong { animation: running-strong 2s infinite ease-in-out;}
    .pulse.running-strong::after { animation: pulse 2s infinite ease-out; opacity: 0.25;}
    .pulse.running-medium { animation: running-medium 2.5s infinite ease-in-out;}
    .pulse.running-medium::after { animation: hopSlow 2.5s infinite; opacity: 0.12;}
    .pulse.running-soft { animation: running-soft 3s infinite ease-in-out;}
    .pulse.running-soft::after { animation: none; opacity: 0;}
    .pulse.finished { animation: finished 0.5s ease forwards; }    
    /* Inserisce un piccolo puntino bianco sui markers conclusi */
    .pulse.finished::after { content: ""; position: absolute; width: 3px; height: 3px; border-radius: 50%; background: #ffffff; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1001; opacity: 0.9;}

    /* SALTI dei Marker correlati alle Pulsazioni */
    @keyframes pulse { 0% { transform: scale(0.6);opacity: 0.5; } 70% { transform: scale(1.6); opacity: 0; } 100% { opacity: 0; }}
    @keyframes hopSlow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); }}
    @keyframes hopMedium { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); }}
    @keyframes hopFast { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); }}
    @keyframes hopCrazy { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); }}
    @keyframes pulseLive { 0% { transform: scale(1) translateY(0); opacity: 0.7; } 70% { transform: scale(1.5) translateY(-5px); opacity: 0.3; } 100% { transform: scale(2) translateY(-10px); opacity: 0; }}
    @keyframes finished { 0%,100% { transform: translateY(0); }}
    @keyframes running-strong { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-8px,0); } /* X = -8px, Y = 0 */}
    @keyframes running-medium { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-6px,0); } /* X = -8px, Y = 0 */}
    @keyframes running-soft { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-4px,0); } /* X = -8px, Y = 0 */}
    
    #menu-toggle {
      display: inline-flex;
      vertical-align: middle;
      align-items: center;
      justify-content: center;
      width: 140px; /* larghezza */

    /* linea base */

    /* indicatore mezzanotte */

      top: -8px;

      background: #3b82f6;
      border-radius: 2px;
      z-index: 997;
      pointer-events: none;
      opacity: 0.4;
    }

    #midnight::after {
      content: "24";
      position: absolute;

    /* SLIDER */
    #time-range { width: 100%; margin-top: 2px; }    
      
    .noUi-target {

    .noUi-base { background: transparent; }

    .noUi-handle::before,

    /* NUOVO MENU checkbox integrata */

    /* Su Categorie crea un effetto passando il mouse */

  // Data unica: currentDate = giorno 'logico' 
  function getAppTime(mode = 'now') {
    const day = new Date(currentDate);
    let time = new Date();
    switch(mode) {
        case 'startOfDay':
            time = new Date(day);
            time.setHours(0,0,0,0);
            break;
        case 'endOfDay':
            time = new Date(day);
            time.setHours(23,59,59,999);
            break;
        case 'live': 
            // ora reale se siamo in modalità LIVE
            time = new Date();
            break;
        default: 
            // ora corrente entro il giorno logico
            time = new Date(day);
            time.setHours(new Date().getHours(), new Date().getMinutes(), new Date().getSeconds(), 0);
    }
    return time;
}
  
    function updateTimelineMode() {
    const currentDay = new Date(currentDate);
    currentDay.setHours(0,0,0,0);
    const today = new Date();
    today.setHours(0,0,0,0);
    const diffDays = Math.round((currentDay - today) / 86400000);
    if (diffDays < 0) {
    timelineMode = 'past';
    } else if (diffDays === 0) {
    timelineMode = 'live';
    } else {
    timelineMode = 'day';
    }
  }
  
  // Preleva le Categorie da supabase
  async function fetchCategories() {
    console.log("Creo le Categorie", new Date().toLocaleTimeString());

      .from('categorie')
      .select('*')
      .eq('mc_attiva', true)
      .order('mc_ordine', { ascending: true });
      if (error) {
      console.error("Errore caricamento categorie:", error);
      return [];
      }
      return data;
      }

  // Preleva gli Eventi ed Organizzatori da supabase
  async function fetchEvents() {
    console.log("Aggiorno Eventi", new Date().toLocaleTimeString());

    let query = supabase      
      .from('eventi')
      .select(`
      *,

      luoghi (
      lu_lat,
      lu_lng,
      lu_location,
      id_comune,

    const { data, error } = await query;  //     
    if (error) {

    return [];
    }
    return data;
  }

// Dimensione dei Markers  
function createIcon(color, state, intensity) {
  const size = markerSizes[state] || 10;
  return L.divIcon({
  className: '',
  html: `
  <div class="pulse ${state}"
  style="--c:${color};width:${size}px;height:${size}px;">
  </div>
  `,
  iconSize: [size, size]
  });
}

    /* Mostra o nasconde i Marker delle categorie */
    function updateMarkerVisibility(start, end) {
        // Se non vengono passati parametri, usa il range corrente della timeline
      if (!start || !end) {
      const range = getTimelineRange();
      start = range.start;
      end = range.end;
      }
      const checkboxes = document.querySelectorAll('#menu-items input[type="checkbox"]');
      const activeCategories = [];
      checkboxes.forEach(cb => {const catId = parseInt(cb.id.replace('cat-', ''));
      if (cb.checked) { activeCategories.push(catId); }});
      // Preleva eventStart ed eventEnd dai markers      
      markers.forEach(marker => {
      const categoryVisible = activeCategories.includes(marker.category);
      const eventStart = new Date(marker.start);
      const eventEnd = marker.end ? new Date(marker.end) : eventStart;
      // Seleziona il range dei markers da visualizzare tra eventStart ed eventEnd
      const inTimeRange = eventStart <= end &&  eventEnd >= start;
      // disattiva il timeriterval del marker per i fireworks
        const visible = categoryVisible && inTimeRange;
          if (visible) {
            markersCluster.addLayer(marker.marker);
            // opzionale: riattiva se serve
          } else {
            markersCluster.removeLayer(marker.marker);
            if (marker.fireworkInterval) {
              clearInterval(marker.fireworkInterval);
              marker.fireworkInterval = null;
            }
          }
        });
      // updateTicker(); // Aggiorna le News ***** ATTENZIONE Disabilitata temporaneamente, aggiornava le news ogni minuto 
    }

// Costruisce Checkbox Categorie, Pulsante toggle del menù, select all, listeners  
function buildCategoryMenu() {
  console.log("Aggiorno Menù Categorie", new Date().toLocaleTimeString());
  // console.trace(); // mostra da dove è stata chiamata
  const menuItemsDiv = document.getElementById('menu-items');
  // checkbox per ogni categoria
  categories.forEach(cat => {
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = `cat-${cat.id_categoria}`;
    cb.checked = true;
    cb.className = 'category-checkbox';
    const label = document.createElement('label');
    label.htmlFor = `cat-${cat.id_categoria}`;
    label.className = 'category-label';
    label.innerHTML = `${cat.mc_icona} ${cat.mc_descrizione}`; // icona + testo link per icone : https://www.svgrepo.com/
    // label.textContent = cat.mc_descrizione; // questa è solo descrizione 
    // Applichiamo il colore dell’evento
    label.style.backgroundColor = cat.mc_colore;
    label.style.color = getContrastColor(cat.mc_colore);
    label.style.setProperty('--cat-color', cat.mc_colore);
    menuItemsDiv.appendChild(cb);
    menuItemsDiv.appendChild(label);
    });
    // toggle menu
    const toggleBtn = document.getElementById('menu-toggle');
    toggleBtn.addEventListener('click', () => {
    if (menuItemsDiv.style.display === 'none' || menuItemsDiv.style.display === '') {
    menuItemsDiv.style.display = 'block';
    } else { menuItemsDiv.style.display = 'none'; }});
    // Checkbox Singola Categoria
    menuItemsDiv.addEventListener('change', () => updateMarkerVisibility());
    const selectAllToggle = document.getElementById('select-all-toggle');
    selectAllToggle.checked = true;
    // Checkbox Globale Seleziona/Deseleziona
    selectAllToggle.addEventListener('change', () => {
    const checkboxes = menuItemsDiv.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(cb => cb.checked = selectAllToggle.checked);
    updateMarkerVisibility();
    });
    // aggiorna lo stato del checkbox
    function updateSelectAllToggle() {
    const checkboxes = document.querySelectorAll('#menu-items input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    selectAllToggle.checked = allChecked;
    }
    menuItemsDiv.addEventListener('change', updateSelectAllToggle);
  }

  /* Compone il giorno ed il mese corrente nel rettangolo */  
    function updateDateUI() {
      console.log("Aggiorno Data e mese", new Date().toLocaleTimeString());
      // console.trace(); // mostra da dove è stata chiamata
      dayText.innerText = currentDate.getDate();
      dateText.innerText = monthNames[currentDate.getMonth()] + " " + currentDate.getFullYear();
    // -- Posizionamento di -day
    //-- Iniziali Maiuscole
    function capitalizeFirst(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
    }
      // ---- dichiarazioni globali alla funzione ----
      const currentDayEl = document.getElementById('day-text');
      const nextDayEl = document.getElementById('day-next-text');
      
    if (timelineMode === 'live') {
      const currentDayPercent = midnightPercent / 2;
      const nextDayPercent = midnightPercent + (1 - midnightPercent) / 2;
      // Giorno attuale
      let currentDayName = currentDate.toLocaleDateString(navigator.language, { weekday: 'short' });
      currentDayName = capitalizeFirst(currentDayName); // "lun" → "Lun"
      currentDayEl.innerText = `${currentDayName} ${currentDate.getDate()}`;
      currentDayEl.style.left = `${currentDayPercent * 100}%`;
      currentDayEl.style.display = "block";
      currentDayEl.style.transform = "";
      // Giorno successivo
      const nextDate = new Date(currentDate);
      nextDate.setDate(currentDate.getDate() + 1);
      let nextDayName = nextDate.toLocaleDateString(navigator.language, { weekday: 'short' });
      nextDayName = capitalizeFirst(nextDayName); // "mar" → "Mar"
      nextDayEl.innerText = `${nextDayName} ${nextDate.getDate()}`;
      nextDayEl.style.left = `${(nextDayPercent - 0.10) * 100}%`; // tolgo il 10% per compensare in allineamento la dimensione dei caratteri
      nextDayEl.style.display = "block";
      nextDayEl.style.transform = "";
    } else { 
    // DAY MODE
    nextDayEl.style.display = "none";
    // centra day-text
    currentDayEl.style.display = "block";
    currentDayEl.style.left = "50%";
    currentDayEl.style.transform = "translateX(-50%)";
    let currentDayName =
      currentDate.toLocaleDateString(navigator.language, {
        weekday: 'short'
      });
    currentDayName = capitalizeFirst(currentDayName);
    currentDayEl.innerText = `${currentDayName} ${currentDate.getDate()}`;
    }
  }
  
    /* Formatta la data in stile Italiano 00:00 */

  /* Temporizzazione dei Marker */
  function getEventState(startDate, endDate) {
    const now = new Date();
    const diffMinutes = (startDate - now) / 1000 / 60;
    const minutesFromStart =  (now - startDate) / 1000 / 60;
    const durationMinutes = endDate ? (endDate - startDate) / 1000 / 60 : null; // calcola durata dell'evento
    // evento terminato 
    if (endDate && now > endDate) return {state: 'finished' };
    let state;
    // evento già Started da oltre 30'
    if (minutesFromStart > 0) {
    state = 'running-soft' ;
    if (durationMinutes) {
    const progress = minutesFromStart / durationMinutes;
    if (progress < 0.125) { 
    state = 'running-strong';
    } else if (progress < 0.25) { 
    state = 'running-medium';
    } else { 
    state = 'running-soft';
    }
    }
    return { state };
  }
    // Inizia tra 12 - 8 - 6 - 4 - 2 h - Started < 2 ore
    if (diffMinutes > 720) return { state: 'distant' };
    if (diffMinutes > 480) return { state: 'future-deep' };
    if (diffMinutes > 240) return { state: 'future-far' };
    if (diffMinutes > 120) return { state: 'future-medium' };
    if (diffMinutes > 60) return { state: 'future-near' };
    if (diffMinutes > 30) return { state: 'imminent' };
    if (diffMinutes > 0) return { state: 'countdown' };
    return { state: 'started' };
}

  function getContrastColor(hex) {
    hex = hex.replace('#', '');
    const r = parseInt(hex.substr(0,2),16);
    const g = parseInt(hex.substr(2,2),16);
    const b = parseInt(hex.substr(4,2),16);
    const brightness =
    (r * 299 + g * 587 + b * 114) / 1000;
    return brightness > 150
    ? '#111'
    : '#fff';
  }

// ====================================================
// FIREWORKS SCENICI SUL CANVAS
// ====================================================
class Particle {
  constructor(x, y, color, vx, vy, life) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.vx = vx;
    this.vy = vy;
    this.life = life;
    this.alpha = 1;
    this.radiusOuter = 4; // dimensione stellina
    this.radiusInner = 2;
    this.spikes = 5; // punte della stella
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.05; // gravità
    this.life -= 1;
    this.alpha = Math.max(0, this.life / 60);
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    ctx.translate(this.x, this.y);

    ctx.beginPath();
    for (let i = 0; i < this.spikes * 2; i++) {
      const r = i % 2 === 0 ? this.radiusOuter : this.radiusInner;
      const angle = (Math.PI / this.spikes) * i;
      const px = Math.cos(angle) * r;
      const py = Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

class Firework {
  constructor(x, y) {
    this.x = x; // coordinata orizzontale
    this.y = y; // posizione iniziale
    this.startY = y // quota di partenza
    this.maxHeight = 22 // quota massima raggiungibile
    this.particles = []; // perticelle dopo esplosione
    this.exploded = false; // esploso si/no
    this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
    this.vy = -8 - Math.random() * 4; // velocità verticale
    this.vx = (Math.random() - 0.5) * 2; // deriva laterale
    this.currentY = y; // quota corrente
    this.trail = []; // punti della scia
  }
  
  isDead() { return this.exploded && this.particles.length === 0;}

  update() {
    if (!this.exploded) {
      this.x += this.vx; 
      this.currentY += this.vy; // Salita del razzo
      this.vy += 0.35; // gravità
      this.trail.push({ x: this.x, y: this.currentY }); 
      if (this.trail.length > 4) this.trail.shift(); // quanti punti di scia vengono mantenuti 
      if (this.startY - this.currentY >= this.maxHeight || this.vy >= 0) { this.exploded = true; this.createParticles(); } // esplode quando raggiunge la quota stabilita (210px)
    }
    // Aggiorna particelle esplose
    this.particles.forEach(p => p.update()); // aggiorna le particelle
    this.particles = this.particles.filter(p => p.life > 0); // elimina particelle morte
  }

  createParticles() {
    const count = 10 + Math.floor(Math.random() * 10); // Numero di stelline che esplodono
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * 2 * Math.PI;
      const speed = Math.random() * 4 + 2;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
      this.particles.push(
        new Particle(this.x, this.currentY, color, vx, vy, 30 + Math.random() * 20) // Quanti frame vive una particella
      );
    }
  }

  draw(ctx) {
    // Disegna la scia del razzo
    ctx.save();
    for (let i = 0; i < this.trail.length; i++) {
      const p = this.trail[i];
      ctx.globalAlpha = i / this.trail.length * 0.25; // opacità crescente verso il razzo ( 1 = Opaco 0.5= semi trasparente 0 = invisibile)
      ctx.fillStyle = this.color; // colore della scia
      ctx.beginPath(); // disegna punto luminoso
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
    // Razzo prima dell’esplosione
    if (!this.exploded) {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.currentY, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Stelline esplose
    this.particles.forEach(p => p.draw(ctx));
  }
  }
  
  // ====================================================
// GESTIONE FIREWORKS SULLA MAPPA
// ====================================================

  function triggerFirework(latLng) {
  const { x, y } = latLngToCanvasXY(latLng.lat, latLng.lng);
  fireworks.push(new Firework(x, y));
}

function animateFX() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  fireworks.forEach(fw => {
    fw.update();
    fw.draw(ctx);
  });
    // elimina fuochi terminati
  for (let i = fireworks.length - 1; i >= 0; i--) {
    if (fireworks[i].isDead()) {
      fireworks.splice(i, 1);
    }
  }
requestAnimationFrame(animateFX);
}
animateFX();

// Lancia i fuochi se lo stato è countdown  
function updateMarkerState(marker, state, latLng, evFine) {
  marker.state = state;
  // Calcola se l'evento è finito
  const now = new Date();
  const eventoFinito = evFine && now >= new Date(evFine);
  if (eventoFinito) {
    // Evento Finito → pulisci intervallo fuochi e imposta stato a 'finished'
    if (marker.fireworkInterval) {
      clearInterval(marker.fireworkInterval);
      marker.fireworkInterval = null;
    }
    marker.state = 'finished';
    return;
  }
  // Evento attuale, fuochi solo se in countdown
  if (state === 'countdown' && !marker.fireworkInterval) {
  triggerFirework(latLng);
  marker.fireworkInterval = setInterval(() => triggerFirework(latLng), 2500); // Un fuoco ogni X secondi 1=1000
}
if (state !== 'countdown' && marker.fireworkInterval) {
  clearInterval(marker.fireworkInterval);
  marker.fireworkInterval = null;
}
  return;
}

const overlay = document.getElementById('mapOverlay');
const toggle = document.getElementById('overlayToggle');
let timeout = 20 * 1000; // 20 secondi

// chiusura overlay
function minimizeOverlay() {
  overlay.classList.add('minimized');
  toggle.style.display = 'flex';
}

// apertura overlay
function openOverlay() {
  overlay.classList.remove('minimized');
  toggle.style.display = 'none';
}

// click fuori → chiude
document.addEventListener('click', (e) => {
  if (!overlay.contains(e.target) && !toggle.contains(e.target) && !overlay.classList.contains('minimized')) {
    minimizeOverlay();
  }
});

// evita chiusura cliccando dentro
overlay.addEventListener('click', (e) => {
  e.stopPropagation();
});

// click icona → riapre
toggle.addEventListener('click', openOverlay);

// timer 30 minuti
setTimeout(() => { minimizeOverlay(); }, timeout);
