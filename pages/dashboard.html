<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">  
<title>Admin Panel</title>

<style>

body {
  margin:0;
  font-family:Arial,sans-serif;
}

.container {
  display:flex;
  min-height:100vh;
}

.sidebar {
  width:220px;
  background:#1f2937;
  color:white;
  padding:20px;
}

.sidebar h2 {
  font-size:18px;
  margin-bottom:20px;
}

.sidebar a {
  display:block;
  color:white;
  text-decoration:none;
  padding:8px 0;
}

.sidebar a:hover {
  background:#374151;
  padding-left:5px;
}

.content {
  flex:1;
  padding:20px;
}

/* MOBILE */
@media(max-width:700px){
  .container{
    flex-direction:column;
  }

  .sidebar{
    width:auto;
    padding:15px;
  }

  .sidebar nav{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:5px;
  }

  .sidebar a{
    padding:10px;
    text-align:center;
    background:#374151;
    border-radius:8px;
  }

  .content{
    padding:15px;
  }
}

</style>
</head>
<body>
  
  <div class="container">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <nav>
        <a href="luoghi.html">Venues</a>
        <a href="organizzatori.html">Organizers</a>
        <a href="eventi.html">Events</a>
        <a href="event_series.html">Event Series</a>
        <a href="generi.html">Servizi</a>
        <a href="titolari.html" class="in-progress">Owners</a>
        <a href="categorie.html" class="in-progress">Categories</a>
        <a href="subcategorie.html" class="in-progress">Subcategories</a>
        <a href="ruoli.html" class="in-progress">Roles</a>
        <a href="risorse.html" class="in-progress">Risource</a>
        <a href="comuni.html" class="in-progress">Municipalities</a>
        <a href="statistics.html">Statistics</a>
        <a href="analytics.html">Analytics</a>
        <a href="copertura.html">Copertura</a>
        <a href="../index.html">Aroundo</a>
      </nav>
    </aside>
    <main class="content">
      <h1>Dashboard</h1>
      <p>Select from menu.</p>
    </main>
  </div>

<!-- MESSAGE DIALOG -->
<div id="messageDialog" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:99999;
align-items:center;
justify-content:center;
">
<div style="
background:white;
padding:22px;
border-radius:12px;
width:300px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
">
<div id="messageText" style="
margin-bottom:18px;
font-weight:600;
">
</div>

<button onclick="closeMessage()" style="
width:100%;
background:#3b82f6;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:600;
">
OK
</button>
</div>
</div>
  
</body>
</html>

<script type="module">
  import { requireAuth } from './auth-check.js';
  await requireAuth(); 
  
  import { supabase } from '../supabase.js';
  const { data, error } = await supabase.auth.getSession();
    if (error || !data.session) {
      window.location.href = "login.html";
    }
    if (!data.session) {
      window.location.href="login.html";
    }  

window.showMessage=function(text){
document.getElementById("messageText").textContent=text;
document.getElementById("messageDialog").style.display="flex";
}

window.closeMessage=function(){
document.getElementById("messageDialog").style.display="none";
}
  
  document.querySelectorAll('.in-progress').forEach(link => {
  link.addEventListener('click', function(event) {
    event.preventDefault();
    showMessage("In Progress!");    
  });
});
  
</script>
