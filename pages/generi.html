<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servizi</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f4f7;
}

/* TOP BAR */

.topbar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:16px;
    font-weight:bold;
}

.page-title{
    font-size:24px;
    font-weight:bold;
}

.back-btn{
    width:34px;
    height:34px;
    border:none;
    border-radius:17px;
    background:#e5e7eb;
    color:#374151;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
}

.back-btn:hover{
    background:#d1d5db;
}

/* GENERI */

.genre-box{
    margin:0 15px 15px;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

.genre-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    cursor:pointer;
    user-select:none;
}

.genre-header:hover{
    background:#eef6ff;
}

.genre-title{
    flex:1;
    font-size:16px;
    font-weight:700;
}

.genre-count{
    color:#6b7280;
    font-size:14px;
    font-weight:600;
}

/* ICONE */

.material-symbols-outlined{
    font-size:22px;
    vertical-align:middle;
}

.arrow{
    width:18px;
    text-align:center;
    font-weight:bold;
}

/* STATO */

.state{
    width:16px;
    text-align:center;
    font-size:15px;
    font-weight:bold;
}

.state.on{
    color:#22c55e;
}

.state.off{
    color:#ef4444;
}

/* BOX PULSANTI */

.icon-btn{
    width:32px;
    height:32px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
}

.icon-btn:hover{
    opacity:.9;
}

.edit-btn{
    background:#3b82f6;
    color:white;
}

.add-btn{
    background:#22c55e;
    color:white;
}

/* PANNELLO */

.genre-panel{
    border-top:1px solid #e5e7eb;
    padding:14px;
}

.genre-description{
    margin-bottom:16px;
    color:#4b5563;
    line-height:1.45;
    font-size:14px;
}

/* SERVIZI */

.service-row{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px 4px;
    border-bottom:1px solid #eef2f7;
    cursor:pointer;
}

.service-row:hover{
    background:#eef6ff;
}

.service-body{
    flex:1;
}

.service-name{
    font-weight:700;
    font-size:15px;
}

.service-description{
    margin-top:3px;
    font-size:13px;
    color:#6b7280;
}

.service-level{
    margin-top:5px;
    font-size:12px;
    color:#374151;
    font-weight:bold;
}

/* DIALOG */

.dialog-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.40);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.dialog{
    width:340px;
    background:white;
    border-radius:12px;
    padding:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.dialog-title{
    text-align:center;
    font-weight:bold;
    margin-bottom:18px;
}

.dialog-body input{
    width:100%;
    box-sizing:border-box;
    padding:9px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
}

.dialog-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.dialog-buttons button{
    flex:1;
    border:none;
    border-radius:8px;
    padding:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-green{
    background:#22c55e;
    color:white;
}

.btn-red{
    background:#ef4444;
    color:white;
}

.inline-input{
    flex:1;
    padding:8px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:14px;
}

.service-icons{
    width:60px;            /* spazio fisso per max 3 icone */
    display:flex;
    gap:4px;
    justify-content:flex-start;
}

.service-icons .material-symbols-outlined{
    font-size:20px;
}    

.service-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 4px;
    border-bottom:1px solid #eef2f7;
    cursor:pointer;
}

/* nome prende tutto lo spazio */
.service-name{
    flex:1;
    font-weight:700;
    font-size:15px;
}

/* livello sempre a destra del nome ma prima dello stato */
.service-level{
    min-width:40px;
    text-align:right;
    font-size:12px;
    font-weight:bold;
    color:#374151;
}

/* stato estrema destra */
.service-state{
    width:20px;
    text-align:center;
    font-size:14px;
}

.service-state{
    color:#22c55e;
}
.service-state:has(:contains("✕")){
    color:#ef4444;
}
    
</style>
</head>
<body>

<div class="topbar">
    <button
        class="back-btn"
        onclick="history.back()">
        ←
    </button>
    <div class="page-title">
        Servizi
    </div>
</div>
<div id="generiContainer"></div>
<!-- DIALOG RENAME GENERE                                 -->
<div id="renameDialog" class="dialog-overlay">
    <div class="dialog">
        <div class="dialog-title">
            Modifica genere
        </div>
        <div class="dialog-body">
            <input
                id="renameInput"
                type="text"
                maxlength="80">
        </div>
        <div class="dialog-buttons">
            <button
                class="btn-green"
                onclick="saveRename()">
                Salva
            </button>
            <button
                class="btn-red"
                onclick="closeRename()">
                Annulla
            </button>
        </div>
    </div>
</div>

<script type="module">

import { supabase } from "../supabase.js";

let generi = [];
let servizi = [];
let expanded = new Set();
let editingGenere = null;

/* LOAD DATI                                             */
async function load() {
    const g = await supabase
        .from("servizi_genere")
        .select("*");
    const s = await supabase
        .from("servizi")
        .select("*");
    generi = g.data || [];
    servizi = s.data || [];
    render();
}


/* HELP: servizi per genere */
function getServizi(id_genere) {
  return servizi.filter(s => s.id_genere == id_genere);
}

/* RENDER */
function render() {
  const container = document.getElementById("generiContainer");
  container.innerHTML = "";
  generi.forEach(g => {
    const list = getServizi(g.id_genere);
    const open = expanded.has(g.id_genere);
    const box = document.createElement("div");
    box.className = "genre-box";
    /* HEADER */
    const header = document.createElement("div");
    header.className = "genre-header";
        header.innerHTML = `
          <!-- FRECCIA -->
          <span class="arrow">
            ${open ? "▼" : "▶"}
          </span>
          <!-- NUMERO SERVIZI (blocco fisso 2 cifre) -->
          <span class="genre-count" style="width:28px; text-align:center;">
            ${String(list.length).padStart(2, "0")}
          </span>
          <!-- ICONA MATERIAL -->
          <span class="material-symbols-outlined">
            ${g.gen_icona || ""}
          </span>
          <!-- DESCRIZIONE GENERE -->
          <span class="genre-title">
            ${g.gen_descrizione}
          </span>
          <!-- BOX VERDE + -->
          <button class="icon-btn add-btn" onclick="event.stopPropagation(); openAdd(${g.id_genere})">
            +
          </button>
          <!-- BOX BLU MATITA -->
          <button class="icon-btn edit-btn" onclick="event.stopPropagation(); openEdit(${g.id_genere})">
            ✎
          </button>
        `;      
    header.onclick = () => {
      if (expanded.has(g.id_genere)) {
        expanded.delete(g.id_genere);
      } else {
        expanded.add(g.id_genere);
      }
      render();
    };
    box.appendChild(header);
    /* PANEL */
    if (open) {
      const panel = document.createElement("div");
      panel.className = "genre-panel";
      /* DESCRIZIONE ESTESA */
      const ext = document.createElement("div");
      ext.style.marginBottom = "10px";
      ext.textContent = g.gen_descrizione_estesa || "";
      panel.appendChild(ext);

        /* SERVIZI LIST */
        getServizi(g.id_genere).forEach(s => {
          const row = document.createElement("div");
          row.className = "service-row";
        row.innerHTML = `
          <!-- ICONA -->
          <span class="service-icons">
            <span class="material-symbols-outlined">${s.sv_icona || ""}</span>
          </span>
          <!-- TESTO SERVIZIO -->
          <span class="service-name">
            ${s.sv_servizio}
          </span>
          <!-- LIVELLO (sempre a destra) -->
          <span class="service-level">
            ${s.livello}
          </span>
          <!-- STATO (✔ / ✖) -->
          <span class="service-state">
            ${s.sv_attivo ? "●" : "✕"}
          </span>
        `;
          row.onclick = () => {
            window.location.href = `servizio.html?id=${s.id_servizio}`;
          };
          panel.appendChild(row);
        });
/* ADD SERVIZIO 
      const add = document.createElement("button");
      add.className="icon-btn add-btn";
      add.textContent = "+";
      add.onclick = () => {
        window.location.href =
          `servizio.html?new=1&id_genere=${g.id_genere}`;
      };
*/
      panel.appendChild(add);
      box.appendChild(panel);
    }
    container.appendChild(box);
  });
}

        window.openAdd = (id_genere) => {
          window.location.href = `servizio.html?new=1&id_genere=${id_genere}`;
        };

        window.openEdit = (id_genere) => {
          editingGenere = id_genere;
          render();
        };
  
load();

</script>
</body>
</html>
