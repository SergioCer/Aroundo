<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Servizio</title>

<style>
body { margin:0; font-family:Arial; background:#f2f4f7; }

.topbar {
  display:flex; justify-content:center; padding:16px; font-weight:bold;
}

.back-btn {
  width:34px;height:34px;border-radius:17px;border:none;
  background:#e5e7eb;color:#374151;cursor:pointer;
}

.card {
  background:white; margin:15px; padding:15px; border-radius:12px;
}

.section-title { font-size:11px; color:#777; margin:10px 0 4px; }

input,textarea,select {
  width:100%; padding:6px; border-radius:6px; border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="back-btn" onclick="requestBack()">←</button>
  Servizio
</div>

<div class="card">

<div class="section-title">Servizio</div>
<input id="sv_servizio" oninput="markDirty()">

<div class="section-title">Descrizione</div>
<textarea id="sv_descrizione" oninput="markDirty()"></textarea>

<div class="section-title">Icona</div>
<input id="sv_icona" oninput="markDirty()">

<div class="section-title">Attivo</div>
<select id="sv_attivo" oninput="markDirty()">
  <option value="true">true</option>
  <option value="false">false</option>
</select>

<div class="section-title">Livello</div>
<input id="livello" oninput="markDirty()">

</div>

<script type="module">
import { supabase } from '../supabase.js';

const params=new URLSearchParams(location.search);
const id=params.get('id');
const isNew=!id;

let original="{}";
let dirty=false;

async function load(){
  if(isNew) return;

  const {data}=await supabase
    .from('servizi')
    .select('*')
    .eq('id_servizio',id)
    .single();

  original=JSON.stringify(data);

  sv_servizio.value=data.sv_servizio||'';
  sv_descrizione.value=data.sv_descrizione||'';
  sv_icona.value=data.sv_icona||'';
  sv_attivo.value=data.sv_attivo;
  livello.value=data.livello||'';
}

window.markDirty=()=>{
  const current=JSON.stringify({
    sv_servizio:sv_servizio.value,
    sv_descrizione:sv_descrizione.value,
    sv_icona:sv_icona.value,
    sv_attivo:sv_attivo.value,
    livello:livello.value
  });

  dirty=current!==original;
};

async function save(){
  const payload={
    sv_servizio:sv_servizio.value,
    sv_descrizione:sv_descrizione.value,
    sv_icona:sv_icona.value,
    sv_attivo:sv_attivo.value==="true",
    livello:livello.value?parseInt(livello.value):null
  };

  let res;

  if(isNew){
    res=await supabase.from('servizi').insert(payload).select().single();
  } else {
    res=await supabase.from('servizi').update(payload).eq('id_servizio',id).select().single();
  }

  if(res.error){
    alert("errore");
    return false;
  }

  dirty=false;

  if(isNew){
    location.href=`servizio.html?id=${res.data.id_servizio}`;
  }

  return true;
}

window.requestBack=async()=>{
  if(!dirty) return history.back();
  if(confirm("salvare?")) await save();
  history.back();
};

await load();
</script>

</body>
</html>
