<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Servizio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  font-weight: bold;
  gap: 20px;
}

.back-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.back-btn.dirty {
  background: #fbbf24;
  color: #111827;
}

.back-btn:hover {
  background: #d1d5db;
}

/* HERO */
.hero {
  margin: 10px 15px 8px;
  padding: 12px;
  background: white;
  border-radius: 12px;
}

/* CARD */
.card {
  background: white;
  margin: 0 15px 20px;
  padding: 15px;
  border-radius: 12px;
}

/* LABEL */
.section-title {
  font-size: 11px;
  color: #777;
  margin: 12px 0 4px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 16px;
}

textarea {
  min-height: 60px;
  resize: vertical;
}

/* MAP BUTTON (non usato ma coerente col template) */
.map-btn {
  width: 60px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: #dbeafe;
  color: #1e3a8a;
  font-size: 12px;
  cursor: pointer;
}

.map-btn:disabled {
  background: #e5e7eb;
  color: #9ca3af;
  cursor: not-allowed;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 11px;
  color: #888;
}

/* LOCK STATE */
.card.locked {
  opacity: .55;
  pointer-events: none;
}

input:disabled,
textarea:disabled,
select:disabled {
  background: #f8fafc;
  color: #9ca3af;
}

/* GENERE BOX */
.genere-box {
  padding: 10px;
  border-radius: 10px;
  background: #f8fafc;
  border: 1px solid #e5e7eb;
}

/* ICON PREVIEW */
.icon-preview {
  font-size: 26px;
  text-align: center;
  margin-top: 6px;
}

/* INLINE ROW */
.inline-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.inline-col {
  flex: 1;
}

/* SAVE DIALOG */
#saveDialog {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:99999;
  align-items:center;
  justify-content:center;
}

#saveDialog > div {
  background:white;
  padding:22px;
  border-radius:12px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button {
  cursor: pointer;
}

</style>
</head>

<body>

<div class="topbar">
  <button id="backBtn" class="back-btn" onclick="requestBack()">←</button>
  <div id="title">Servizio</div>
</div>

<!-- HERO GENERE -->
<div class="hero">

  <div class="section-title">Genere</div>

  <div class="genere-box">

    <select id="id_genere" onchange="onGenereChange()"></select>

    <div id="genereIcon" class="icon-preview">—</div>

    <div id="genereDesc" style="font-size:13px; color:#555; margin-top:8px;">
      Seleziona un genere
    </div>

  </div>

</div>

<!-- CARD -->
<div class="card">

  <div class="section-title">Servizio *</div>
  <input id="sv_servizio" oninput="markDirty()"/>

  <div class="section-title">Descrizione</div>
  <textarea id="sv_descrizione" oninput="markDirty()"></textarea>

  <div class="section-title">Icona / Stato / Livello</div>

  <div class="inline-row">

    <div class="inline-col">
      <input id="sv_icona" oninput="updateIconPreview(); markDirty()"/>
      <div id="iconPreview" class="icon-preview">—</div>
    </div>

    <div>
      <label style="font-size:12px;">Attivo</label><br/>
      <input type="checkbox" id="sv_attivo" onchange="markDirty()"/>
    </div>

    <div class="inline-col">
      <label style="font-size:12px;">Livello</label>
      <select id="livello" onchange="markDirty()">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer" id="sv_creato"></div>

<!-- SAVE DIALOG -->
<div id="saveDialog">
  <div>
    <div style="margin-bottom:18px; font-weight:600;">
      Vuoi salvare le modifiche?
    </div>
    <div style="display:flex; gap:10px;">
      <button onclick="dialogAction('yes')" style="flex:1;background:#22c55e;color:white;border:none;padding:10px;border-radius:8px;">
        Sì
      </button>
      <button onclick="dialogAction('no')" style="flex:1;background:#ef4444;color:white;border:none;padding:10px;border-radius:8px;">
        No
      </button>
      <button onclick="dialogAction('cancel')" style="flex:1;background:#9ca3af;color:white;border:none;padding:10px;border-radius:8px;">
        Annulla
      </button>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from '../supabase.js';

let original = "{}";
let dirty = false;

let generi = [];
let dialogResolve;
async function loadGeneri() {
  const { data, error } = await supabase
    .from("generi")
    .select("id_genere, gen_descrizione, gen_descrizione_estesa, gen_icona")
    .order("gen_descrizione", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  generi = data || [];

  const sel = document.getElementById("id_genere");
  sel.innerHTML = "";

  generi.forEach(g => {
    const opt = document.createElement("option");
    opt.value = g.id_genere;
    opt.textContent = `${g.gen_icona ? g.gen_icona + " " : ""}${g.gen_descrizione}`;
    sel.appendChild(opt);
  });
}

function onGenereChange() {
  const id = document.getElementById("id_genere").value;
  const g = generi.find(x => x.id_genere == id);

  if (!g) return;

  document.getElementById("genereIcon").textContent = g.gen_icona || "—";
  document.getElementById("genereDesc").textContent =
    g.gen_descrizione_estesa || "";

  markDirty();
}

function updateIconPreview() {
  const val = document.getElementById("sv_icona").value;
  document.getElementById("iconPreview").textContent = val || "—";
}

async function load() {
  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  const isNew = !id;

  if (isNew) {
    document.getElementById("title").textContent = "Nuovo Servizio";
    await loadGeneri();
    onGenereChange();
    updatePageState();
    return;
  }

  document.getElementById("title").textContent = "Servizio Attuale";

  const { data, error } = await supabase
    .from("servizi")
    .select("*")
    .eq("id_servizio", id)
    .single();

  if (error) {
    console.error(error);
    return;
  }

  original = JSON.stringify(data);

  await loadGeneri();

  // valori form
  document.getElementById("id_genere").value = data.id_genere;
  document.getElementById("sv_servizio").value = data.sv_servizio || "";
  document.getElementById("sv_descrizione").value = data.sv_descrizione || "";
  document.getElementById("sv_icona").value = data.sv_icona || "";
  document.getElementById("sv_attivo").checked = !!data.sv_attivo;
  document.getElementById("livello").value = data.livello || 1;

  document.getElementById("sv_creato").textContent =
    data.sv_creato ? new Date(data.sv_creato).toLocaleString() : "";

  updateIconPreview();
  onGenereChange();
  updatePageState();
}

/* DIRTY */
window.markDirty = () => {
  const current = JSON.stringify({
    id_genere: document.getElementById("id_genere").value,
    sv_servizio: document.getElementById("sv_servizio").value,
    sv_descrizione: document.getElementById("sv_descrizione").value,
    sv_icona: document.getElementById("sv_icona").value,
    sv_attivo: document.getElementById("sv_attivo").checked,
    livello: document.getElementById("livello").value
  });

  dirty = current !== original;

  document.getElementById("backBtn")
    .classList.toggle("dirty", dirty);
};

function updatePageState() {
  const isNew = !new URLSearchParams(location.search).get("id");

  const disable = false; // sempre editabile come da modello

  document.getElementById("id_genere").disabled = disable;
  document.getElementById("sv_servizio").disabled = disable;
  document.getElementById("sv_descrizione").disabled = disable;
  document.getElementById("sv_icona").disabled = disable;
  document.getElementById("sv_attivo").disabled = disable;
  document.getElementById("livello").disabled = disable;
}

/* SAVE */
async function save() {
  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  const isNew = !id;

  const payload = {
    id_genere: document.getElementById("id_genere").value,
    sv_servizio: document.getElementById("sv_servizio").value,
    sv_descrizione: document.getElementById("sv_descrizione").value,
    sv_icona: document.getElementById("sv_icona").value,
    sv_attivo: document.getElementById("sv_attivo").checked,
    livello: parseInt(document.getElementById("livello").value)
  };

  let result;

  if (isNew) {
    result = await supabase
      .from("servizi")
      .insert(payload)
      .select()
      .single();
  } else {
    result = await supabase
      .from("servizi")
      .update(payload)
      .eq("id_servizio", id)
      .select()
      .single();
  }

  const { data, error } = result;

  if (error) {
    console.error(error);
    alert("Errore salvataggio");
    return false;
  }

  dirty = false;

  if (isNew) {
    location.href = `servizio.html?id=${data.id_servizio}`;
  }

  return true;
}

/* BACK */
window.requestBack = async () => {
  if (!dirty) return history.back();

  const choice = await askSaveDialog();

  if (choice === "cancel") return;

  if (choice === "yes") {
    const ok = await save();
    if (!ok) return;
    history.back();
    return;
  }

  history.back();
};

function askSaveDialog() {
  document.getElementById("saveDialog").style.display = "flex";

  return new Promise(resolve => {
    dialogResolve = resolve;
  });
}

window.dialogAction = (type) => {
  document.getElementById("saveDialog").style.display = "none";
  dialogResolve(type);
};

/* INIT */
await loadGeneri();
await load();

</script>
</body>
</html>
