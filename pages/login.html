<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Aroundo Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  min-height:100vh;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f1ea;
  font-family:Arial, sans-serif;
}

.login-box {
  width:280px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
  text-align:center;
}

.login-box img {
  width:120px;
  height:120px;
  border-radius:20px;
  margin-bottom:15px;
}

input {
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button {
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:700;
  cursor:pointer;
}

button:hover {
  opacity:.9;
}

</style>
</head>
<body>
  
<div class="login-box">
<img src="../icon-512.png" alt="Aroundo">
<h2>Aroundo</h2>
<input 
 id="email"
 type="email"
 placeholder="Email">
<input
 id="password"
 type="password"
 placeholder="Password">
<button id="loginBtn">
Login
</button>
</div>

<script type="module">

import { supabase } from '../supabase.js';
document
.getElementById('loginBtn')
.addEventListener('click', async () => {
const email =
document.getElementById('email').value;

const password =
document.getElementById('password').value;
const { error } =
await supabase.auth.signInWithPassword({
 email,
 password
});

if(error) {
 alert(error.message);
 return;
}

window.location.href="dashboard.html";
});

</script>
</body>
</html>
