<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Aroundo Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  min-height:100vh;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f1ea;
  font-family:Arial, sans-serif;
}

.login-box {
  width:280px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
  text-align:center;
}

.login-box img {
  width:120px;
  height:120px;
  border-radius:20px;
  margin-bottom:15px;
}

input {
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button {
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:700;
  cursor:pointer;
}

button:hover {
  opacity:.9;
}

</style>
</head>
<body>
  
<div class="login-box">
<img src="../icon-512.png" alt="Aroundo">
<h2>Aroundo</h2>
<div style="
    margin-top:-10px;
    margin-bottom:18px;
    font-size:14px;
    color:#666;
    letter-spacing:.5px;
">
    Explore • Discover • Experience
</div>
<input 
 id="email"
 type="email"
 placeholder="Email">
<input
 id="password"
 type="password"
 placeholder="Password">
<button id="loginBtn">
Login
</button>
<div style="
  margin-top:18px;
  font-size:13px;
  color:#666;
">
  Don't have an account yet?
  <br><br>
  <a href="#"
     id="registerLink"
     style="
       color:#3b82f6;
       text-decoration:underline;
       font-weight:600;
     ">
     Register
  </a>
</div>
<div style="
    margin-top:35px;
    font-size:11px;
    color:#999;
    text-align:center;
">
    Aroundo is continuously evolving.<br>
    New features will become available over time.
</div>  
</div>


  
<!-- LOGIN ERROR DIALOG -->
  <div style="
    background:white;
    padding:22px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
  ">
  <div id="loginErrorDialog" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:99999;
    align-items:center;
    justify-content:center;
  ">
  <div id="loginErrorTitle" style="
    margin-bottom:15px;
    font-weight:700;
    color:#ef4444;
    font-size:16px;
    ">
  </div>      
    <div id="loginErrorMessage" style="
      margin-bottom:18px;
      color:#555;
      font-size:13px;
    ">
  </div>
    <button id="loginErrorOkBtn" style="
      width:100%;
      background:#22c55e;
      color:white;
      border:none;
      padding:10px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    ">
      OK
    </button>
  </div>
</div>

<script type="module">

import { supabase } from '../supabase.js';

document.getElementById('loginErrorOkBtn').addEventListener('click', () => {
  document.getElementById('loginErrorDialog').style.display = 'none';
});
  
document.getElementById('registerLink').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('loginErrorTitle').textContent = 'Register';
  document.getElementById('loginErrorMessage').textContent =
  'User registration will be available soon.';
  document.getElementById('loginErrorDialog').style.display = 'flex';
});

document.getElementById('loginBtn').addEventListener('click', async () => {
const email =
document.getElementById('email').value;

const password =
document.getElementById('password').value;
const { error } =
await supabase.auth.signInWithPassword({
 email,
 password
});
  
if(error) {
  document.getElementById('loginErrorTitle').textContent = 'Invalid login';
  document.getElementById('loginErrorMessage').textContent = 'Invalid email or password.';
  document.getElementById('loginErrorDialog').style.display = 'flex';
 return;
}

window.location.href="dashboard.html";
});

</script>
</body>
</html>
