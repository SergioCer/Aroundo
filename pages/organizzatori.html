<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Organizzatori Admin</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 12px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  display: flex;
  gap: 10px;
  align-items: center;
}

.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  overflow: hidden;
}

tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

td {
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* HEADER STRUCT */
.col-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 14px;
}

.col-tools {
  display: flex;
  gap: 4px;
}

.filter {
  width: 100%;
  font-size: 12px;
  padding: 4px;
}

/* BUTTONS */
.sort-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  background: #dbeafe;
  cursor: pointer;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  background: #f3f4f6;
  opacity: 0.5;
  cursor: pointer;
}

.reset-btn.active {
  background: #fbbf24;
  opacity: 1;
}

/* STATUS */
.status-ok { color: #22c55e; }
.status-no { color: #ef4444; }

.status-filter {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  background: #dbeafe;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">
    Organizzatori
    <button class="add-btn" onclick="location.href='organizzatore.html?new=1'">+</button>
  </div>
</div>

<table>

<colgroup>
  <col style="width: 30px;">
  <col style="width: 140px;">
  <col style="width: 160px;">
  <col style="width: 120px;">
  <col style="width: 120px;">
  <col style="width: 160px;">
  <col style="width: 40px;">
</colgroup>

<thead>
<tr>

  <!-- ID -->
  <th>
    <div class="col-header">
      <div class="col-title" style="justify-content:center;">
        ID
      </div>
      <div class="col-tools" style="justify-content:center;">
        <button class="reset-btn" onclick="resetAll()">•</button>
      </div>
    </div>
  </th>

  <!-- NOME -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Nome
        <button class="sort-btn" onclick="sort('nome')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('nome',this.value)">
      </div>
    </div>
  </th>

  <!-- DESCRIZIONE -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Descrizione
        <button class="sort-btn" onclick="sort('descrizione')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('descrizione',this.value)">
      </div>
    </div>
  </th>

  <!-- EMAIL -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Email
        <button class="sort-btn" onclick="sort('email')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('email',this.value)">
      </div>
    </div>
  </th>

  <!-- TELEFONO -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Telefono
        <button class="sort-btn" onclick="sort('telefono')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('telefono',this.value)">
      </div>
    </div>
  </th>

  <!-- NOTE -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Note
        <button class="sort-btn" onclick="sort('note')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('note',this.value)">
      </div>
    </div>
  </th>

  <!-- STATO -->
  <th>
    <div class="col-header">
      <div class="col-title" style="justify-content:center;">
        Stato
      </div>
      <div class="col-tools" style="justify-content:center;">
        <button class="status-filter" onclick="toggleAttivo()" id="attivoBtn">●</button>
      </div>
    </div>
  </th>

</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc',
  attivo: 'all'
};

/* LOAD */
async function load() {
  const { data: rows } = await supabase
    .from('organizzatori')
    .select('*');

  data = rows || [];

  data.sort((a,b) =>
    (a.or_nome || '').localeCompare(b.or_nome || '')
  );

  render();
}

/* SORT */
window.sort = (field) => {
  if (state.sortField !== field) {
    state.sortField = field;
    state.sortDir = 'asc';
  } else {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  }
  render();
  syncUI();
};

/* FILTER */
window.setFilter = (k,v) => {
  state.filters[k] = v;
  render();
  syncUI();
};

/* RESET */
window.resetAll = () => {
  state.filters = {};
  state.sortField = null;
  state.sortDir = 'asc';
  state.attivo = 'all';

  document.querySelectorAll('.filter').forEach(i => i.value = '');
  render();
  syncUI();
};

/* STATUS FILTER */
window.toggleAttivo = () => {
  if (state.attivo === 'all') state.attivo = 'true';
  else if (state.attivo === 'true') state.attivo = 'false';
  else state.attivo = 'all';

  render();
  syncUI();
};

/* RENDER */
function render() {

  let filtered = [...data];

  if (state.attivo === 'true')
    filtered = filtered.filter(r => r.or_attivo === true);

  if (state.attivo === 'false')
    filtered = filtered.filter(r => r.or_attivo === false);

  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;

    filtered = filtered.filter(r => {
      if (k === 'nome') return (r.or_nome||'').toLowerCase().includes(v);
      if (k === 'descrizione') return (r.or_descrizione||'').toLowerCase().includes(v);
      if (k === 'email') return (r.or_email||'').toLowerCase().includes(v);
      if (k === 'telefono') return (r.or_telefono||'').toLowerCase().includes(v);
      if (k === 'note') return (r.or_note||'').toLowerCase().includes(v);
      return true;
    });
  });

  if (state.sortField) {
    filtered.sort((a,b) => {
      let va = (a['or_' + state.sortField] || '').toLowerCase();
      let vb = (b['or_' + state.sortField] || '').toLowerCase();

      return state.sortDir === 'asc'
        ? va.localeCompare(vb)
        : vb.localeCompare(va);
    });
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  filtered.forEach(r => {

    const stato = r.or_attivo
      ? '<span class="status-ok">✔</span>'
      : '<span class="status-no">✖</span>';

    const tr = document.createElement('tr');
    tr.onclick = () =>
      location.href = `organizzatore.html?id=${r.id_organizzatore}`;

    tr.innerHTML = `
      <td>${r.id_organizzatore}</td>
      <td>${r.or_nome||''}</td>
      <td>${r.or_descrizione||''}</td>
      <td>${r.or_email||''}</td>
      <td>${r.or_telefono||''}</td>
      <td>${r.or_note||''}</td>
      <td style="text-align:center">${stato}</td>
    `;

    tbody.appendChild(tr);
  });

  updateSortUI();
  updateResetUI();
  updateStatusUI();
}

/* UI */
function updateSortUI() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const field = btn.getAttribute('onclick')?.match(/'(.+)'/)?.[1];

    if (field !== state.sortField) {
      btn.textContent = '↕';
      return;
    }

    btn.textContent = state.sortDir === 'asc' ? '▲' : '▼';
  });
}

function updateResetUI() {
  const btn = document.querySelector('.reset-btn');

  const active =
    Object.keys(state.filters).length > 0 ||
    state.attivo !== 'all' ||
    state.sortField !== null;

  btn.classList.toggle('active', active);
  btn.textContent = active ? '↺' : '•';
}

function updateStatusUI() {
  const btn = document.getElementById('attivoBtn');

  if (state.attivo === 'all') btn.textContent = '●';
  if (state.attivo === 'true') btn.textContent = '✔';
  if (state.attivo === 'false') btn.textContent = '✖';
}

function syncUI() {
  updateSortUI();
  updateResetUI();
  updateStatusUI();
}

load();
</script>

</body>
</html>
