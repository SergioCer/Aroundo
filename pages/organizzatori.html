<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Organizzatori Admin</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  display: flex;
  gap: 10px;
  align-items: center;
}

.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
  overflow: hidden;
}

tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

td {
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* HEADER COL */
.col-header {
  width: 100%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  min-width: 0;
  font-weight: bold;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  white-space: nowrap;
}

.col-tools {
  min-width: 0;
  display: flex;
  gap: 4px;
  align-items: center;
}

.filter {
  flex: 1;
  font-size: 12px;
  padding: 4px;
}

/* SORT BUTTON */
.sort-btn {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #dbeafe;
  color: #1e3a8a;
}

.sort-btn:hover {
  background: #bfdbfe;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #f3f4f6;
  color: #374151;
  transition: 0.2s;
  opacity: 0.4;
}

.reset-btn.active {
  background: #fbbf24;
  color: #111827;
  border-color: #f59e0b;
  opacity: 1;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">
    Organizzatori
    <button class="add-btn"
      onclick="window.location.href='organizzatore.html?new=1'">+</button>
  </div>
</div>

<table>

<colgroup>
  <col style="width: 30px;">
  <col style="width: 180px;">
  <col style="width: 180px;">
  <col style="width: 160px;">
  <col style="width: 160px;">
</colgroup>

<thead>

<tr>

  <th>
    <div class="col-header">
      <div class="col-title">
        ID
        <button class="reset-btn" onclick="resetAll()">↕</button>
      </div>
      <div class="col-tools"></div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Nome
        <button class="sort-btn" data-field="nome" onclick="sort('nome')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('nome', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Descrizione
        <button class="sort-btn" data-field="descrizione" onclick="sort('descrizione')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('descrizione', this.value)">
      </div>
    </div>
  </th>
  
  <th>
    <div class="col-header">
      <div class="col-title">
        Email
        <button class="sort-btn" data-field="email" onclick="sort('email')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('email', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Telefono
        <button class="sort-btn" data-field="telefono" onclick="sort('telefono')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('telefono', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Note
        <button class="sort-btn" data-field="note" onclick="sort('note')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('note', this.value)">
      </div>
    </div>
  </th>

</tr>

</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc',
};

// ---------------- LOAD ----------------
async function load() {
  const { data: rows, error } = await supabase
    .from('organizzatori')
    .select('*');

  if (error) {
    console.error(error);
    return;
  }

  data = rows || [];
  
  state.sortField = 'nome';
  state.sortDir = 'asc';
  
  render();
}

// ---------------- RENDER ----------------
function render() {

  let filtered = [...data];

  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;

    filtered = filtered.filter(r => {

      if (k === 'nome')
        return (r.or_nome || '').toLowerCase().includes(v);
      
      if (k === 'descrizione')
        return (r.or_descrizione || '').toLowerCase().includes(v);

      if (k === 'email')
        return (r.or_email || '').toLowerCase().includes(v);

      if (k === 'telefono')
        return (r.or_telefono || '').toLowerCase().includes(v);

      if (k === 'note')
        return (r.or_note || '').toLowerCase().includes(v);

      return true;
    });
  });

  if (state.sortField) {
    filtered.sort((a,b) => {

      let va = a['or_' + state.sortField];
      let vb = b['or_' + state.sortField];

      va = (va ?? '').toString().toLowerCase();
      vb = (vb ?? '').toString().toLowerCase();

      return state.sortDir === 'asc'
        ? va.localeCompare(vb)
        : vb.localeCompare(va);
    });
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  filtered.forEach(r => {
    const tr = document.createElement('tr');

    tr.onclick = () => {
      window.location.href = `organizzatore.html?id=${r.id_organizzatore}`;
    };

    tr.innerHTML = `
      <td>${r.id_organizzatore}</td>
      <td>${r.or_nome || ''}</td>
      <td>${r.or_descrizione || ''}</td>
      <td>${r.or_email || ''}</td>
      <td>${r.or_telefono || ''}</td>
      <td>${r.or_note || ''}</td>
    `;

    tbody.appendChild(tr);
  });
}

// ---------------- FILTER ----------------
window.setFilter = (k,v) => {
  state.filters[k] = v;
  render();
  syncUI();
};

// ---------------- SORT ----------------
window.sort = (field) => {

  if (state.sortField !== field) {
    state.sortField = field;
    state.sortDir = 'asc';
  } else {
    state.sortDir = state.sortDir === 'asc'
      ? 'desc'
      : 'asc';
  }

  render();
  syncUI();
};

// ---------------- RESET ----------------
window.resetAll = () => {

  state.filters = {};
  state.sortField = null;
  state.sortDir = 'asc';

  document.querySelectorAll('.filter')
    .forEach(i => i.value = '');

  render();
  syncUI();
};

// ---------------- UI SYNC ----------------
function syncUI() {
  updateSortButtons();
  updateResetButton();
}

function updateSortButtons() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const field = btn.dataset.field;

    if (field !== state.sortField) {
      btn.textContent = '↕';
      return;
    }

    btn.textContent =
      state.sortDir === 'asc'
        ? '▼'
        : '▲';
  });
}

function updateResetButton() {
  const hasFilters =
    Object.values(state.filters).some(v => v && v.length > 0);

  const hasSort = state.sortField !== null;

  const btn = document.querySelector('.reset-btn');

  if (!btn) return;

  const active = hasFilters || hasSort;

  btn.textContent = active ? '↺' : '•';
  btn.classList.toggle('active', active);
}

await load();
syncUI();

</script>

</body>
</html>
