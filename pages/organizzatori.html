<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Organizzatori Admin</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER TOP */
.header {
  display: flex;
  justify-content: space-between;
  padding: 12px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  display: flex;
  gap: 10px;
  align-items: center;
}

.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

/* GRID TABLE */
.grid {
  display: grid;
  grid-template-columns: 30px 160px 140px 120px 120px 180px 30px;
  background: white;
  width: 100%;
}

/* HEADER ROW */
.grid-header {
  display: grid;
  grid-template-columns: inherit;
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
}

/* CELLE */
.cell {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  overflow: hidden;
}

/* ROWS */
.row {
  display: grid;
  grid-template-columns: inherit;
  cursor: pointer;
}

.row:hover {
  background: #eef6ff;
}

/* COL HEADER STRUCT */
.col-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 14px;
}

.col-tools {
  display: flex;
  gap: 4px;
}

.filter {
  width: 100%;
  font-size: 12px;
  padding: 4px;
}

/* BUTTONS */
.sort-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  background: #dbeafe;
  cursor: pointer;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  background: #f3f4f6;
  opacity: 0.5;
  cursor: pointer;
}

.reset-btn.active {
  background: #fbbf24;
  opacity: 1;
}

.status-ok { color: #22c55e; }
.status-no { color: #ef4444; }

.status-filter {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  background: #dbeafe;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">
    Organizzatori
    <button class="add-btn" onclick="location.href='organizzatore.html?new=1'">+</button>
  </div>
</div>

<!-- GRID HEADER -->
<div class="grid grid-header">

  <div class="cell">
    <div class="col-header">
      <div class="col-title">ID</div>
      <div class="col-tools">
        <button class="reset-btn" onclick="resetAll()">•</button>
      </div>
    </div>
  </div>

  <div class="cell">
    <div class="col-header">
      <div class="col-title">
        Nome
        <button class="sort-btn" onclick="sort('nome')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('nome',this.value)">
      </div>
    </div>
  </div>

  <div class="cell">
    <div class="col-header">
      <div class="col-title">
        Descrizione
        <button class="sort-btn" onclick="sort('descrizione')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('descrizione',this.value)">
      </div>
    </div>
  </div>

  <div class="cell">
    <div class="col-header">
      <div class="col-title">
        Email
        <button class="sort-btn" onclick="sort('email')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('email',this.value)">
      </div>
    </div>
  </div>

  <div class="cell">
    <div class="col-header">
      <div class="col-title">
        Telefono
        <button class="sort-btn" onclick="sort('telefono')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('telefono',this.value)">
      </div>
    </div>
  </div>

  <div class="cell">
    <div class="col-header">
      <div class="col-title">Note</div>
    </div>
  </div>

  <div class="cell">
    <div class="col-header">
      <div class="col-title">Stato</div>
      <div class="col-tools">
        <button class="status-filter" onclick="toggleAttivo()" id="attivoBtn">●</button>
      </div>
    </div>
  </div>

</div>

<!-- ROWS -->
<div id="tbody"></div>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc',
  attivo: 'all'
};

async function load() {
  const { data: rows } = await supabase.from('organizzatori').select('*');
  data = rows || [];

  data.sort((a,b) =>
    (a.or_nome || '').localeCompare(b.or_nome || '')
  );

  render();
}

/* SORT */
window.sort = (field) => {
  if (state.sortField !== field) {
    state.sortField = field;
    state.sortDir = 'asc';
  } else {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  }
  render();
  syncUI();
};

/* FILTER */
window.setFilter = (k,v) => {
  state.filters[k] = v;
  render();
  syncUI();
};

/* RESET */
window.resetAll = () => {
  state.filters = {};
  state.sortField = null;
  state.sortDir = 'asc';
  state.attivo = 'all';
  document.querySelectorAll('.filter').forEach(i => i.value = '');
  render();
  syncUI();
};

/* STATUS */
window.toggleAttivo = () => {
  if (state.attivo === 'all') state.attivo = 'true';
  else if (state.attivo === 'true') state.attivo = 'false';
  else state.attivo = 'all';
  render();
  syncUI();
};

/* RENDER */
function render() {
  let filtered = [...data];

  if (state.attivo === 'true')
    filtered = filtered.filter(r => r.or_attivo === true);

  if (state.attivo === 'false')
    filtered = filtered.filter(r => r.or_attivo === false);

  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;

    filtered = filtered.filter(r => {
      if (k === 'nome') return (r.or_nome||'').toLowerCase().includes(v);
      if (k === 'descrizione') return (r.or_descrizione||'').toLowerCase().includes(v);
      if (k === 'email') return (r.or_email||'').toLowerCase().includes(v);
      if (k === 'telefono') return (r.or_telefono||'').toLowerCase().includes(v);
      if (k === 'note') return (r.or_note||'').toLowerCase().includes(v);
      return true;
    });
  });

  if (state.sortField) {
    filtered.sort((a,b) => {
      let va = (a['or_' + state.sortField] || '').toString().toLowerCase();
      let vb = (b['or_' + state.sortField] || '').toString().toLowerCase();
      return state.sortDir === 'asc'
        ? va.localeCompare(vb)
        : vb.localeCompare(va);
    });
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  filtered.forEach(r => {

    const stato = r.or_attivo
      ? '<span class="status-ok">✔</span>'
      : '<span class="status-no">✖</span>';

    const row = document.createElement('div');
    row.className = 'row';
    row.onclick = () =>
      location.href = `organizzatore.html?id=${r.id_organizzatore}`;

    row.innerHTML = `
      <div class="cell">${r.id_organizzatore}</div>
      <div class="cell">${r.or_nome||''}</div>
      <div class="cell">${r.or_descrizione||''}</div>
      <div class="cell">${r.or_email||''}</div>
      <div class="cell">${r.or_telefono||''}</div>
      <div class="cell">${r.or_note||''}</div>
      <div class="cell" style="text-align:center">${stato}</div>
    `;

    tbody.appendChild(row);
  });

  updateSortUI();
  updateResetUI();
  updateStatusUI();
}

/* UI */
function updateSortUI() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const field = btn.getAttribute('onclick')?.match(/'(.+)'/)?.[1];
    if (field !== state.sortField) {
      btn.textContent = '↕';
      return;
    }
    btn.textContent = state.sortDir === 'asc' ? '▲' : '▼';
  });
}

function updateResetUI() {
  const btn = document.querySelector('.reset-btn');
  const active =
    Object.keys(state.filters).length > 0 ||
    state.attivo !== 'all' ||
    state.sortField !== null;

  btn.classList.toggle('active', active);
  btn.textContent = active ? '↺' : '•';
}

function updateStatusUI() {
  const btn = document.getElementById('attivoBtn');
  if (state.attivo === 'all') btn.textContent = '●';
  if (state.attivo === 'true') btn.textContent = '✔';
  if (state.attivo === 'false') btn.textContent = '✖';
}

function syncUI() {
  updateSortUI();
  updateResetUI();
  updateStatusUI();
}

load();
</script>

</body>
</html>
