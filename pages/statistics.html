<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Statistics</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f4f7;
}

*{
    box-sizing:border-box;
}

.topbar{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
}

.btn-icon{
    width:34px;
    height:34px;
    border:none;
    border-radius:50%;
    background:#e5e7eb;
    cursor:pointer;
    font-size:18px;
}

.card{
    background:white;
    margin:8px;
    border-radius:22px;
    padding:2px;

}

.card-title{
    text-align: center;
    font-size:14px;
    color:#6b7280;
    margin-bottom:4px;
    font-weight:bold;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:4px 0;
}

.label{
    color:#374151;
    margin-left: 20px;
}

.value{
    font-weight:bold;
    color:#111827;
    margin-right: 20px;
}

.footer{
    margin:12px 15px;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:15px;
    text-align:center;
    font-size:14px;
}

.footer-title{
    color:#6b7280;
    margin-bottom:4px;
}

.footer-value{
    font-weight:bold;
    color:#111827;
}

.device-footer{
    margin:12px 15px;
    text-align:center;
}

.device-list{
    display:flex;
    justify-content:left;
    gap:20px;
    flex-wrap:wrap;
    font-size:14px;
    font-weight:bold;
}
    
</style>

</head>

<body>

<div class="topbar">

<div style="display:flex;align-items:center;gap:20px;">

<button class="btn-icon" onclick="history.back()">←</button>
<div style="font-size:30px;">
Statistics
</div>
</div>
</div>
<div class="card">
<div class="card-title">
TODAY
</div>
<div id="today"></div>
</div>
<div class="card">
<div class="card-title">
THIS WEEK
</div>
<div id="week"></div>
</div>
<div class="card">
<div class="card-title">
THIS MONTH
</div>
<div id="month"></div>
</div>
<div class="card">
<div class="card-title">
THIS YEAR
</div>
<div id="year"></div>
</div>
<div class="footer">
<div>
<div class="footer-title">
Database
</div>
<div
id="dbStatus"
class="footer-value">-</div>
</div>
<div>
<div class="footer-title">
Last update
</div>
<div
id="lastUpdate"
class="footer-value">-</div>
</div>
<div>

<div class="footer-title">
Users Today
</div>
<div
id="todayUsers"
class="footer-value">-</div>
</div>
<div>

<div class="footer-title">
New
</div>
<div
id="newUsers"
class="footer-value">-</div>
</div>    
<div>

<div class="footer-title">
Returning
</div>
<div
id="returningUsers"
class="footer-value">-</div>
</div>
<div>

<div class="footer-title">
Avg Open
</div>
<div
id="avgOpen"
class="footer-value">-</div>
</div>
</div>
<div class="device-footer">
<div id="deviceStats" class="device-list">-</div>
</div>
    
<script type="module">
import { requireAuth } from './auth-check.js';
await requireAuth();

import './statistics.js';

</script>
</body>
</html>
