<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event Serie</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f7;
}

.topbar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 14px;
  font-weight: bold;
  gap: 12px;
}

.back-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.back-btn:hover {
  background: #d1d5db;
}
  
.back-btn.dirty {
  background: #fbbf24;
  color: #111827;
}
  
.card {
  background: white;
  margin: 10px 15px;
  padding: 12px;
  border-radius: 12px;
}

.section-title {
  font-size: 11px;
  color: #777;
  margin-top: 10px;
}

input, textarea {
  width: 100%;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ddd;
  font-size: 15px;
}

.preview img {
  max-width: 100%;
  margin-top: 8px;
  border-radius: 8px;
}

.section-box {
  margin: 10px 15px;
  background: white;
  border-radius: 12px;
}

.section-header{
  padding:10px 12px;
  font-weight:bold;
  cursor:pointer;
  display:flex;
  gap:8px;
  align-items:center;
  user-select:none;
  border-bottom:1px solid #eee;
}

.header-row td{
  font-size:11px;
  color:#777;
  font-weight:600;
  background:#fafafa;
  position:sticky;
  top:0;
  z-index:5;
  border-bottom:1px solid #e5e7eb;
}
  
.section-header.disabled{
  color:#9ca3af;
  cursor:default;
}

.section-panel{
  display:none;
  max-height:300px;
  overflow-y:auto;
}

.mini-table {
  width: 100%;
  border-collapse: collapse;
}

.table td {
  padding: 6px;
  border-bottom: 1px solid #eee;
}

.link {
  color: #1e3a8a;
  cursor: pointer;
  font-weight: 600;
}

.footer {
  text-align: right;
  font-size: 11px;
  color: #888;
  margin-top: 15px;
}
  
</style>
</head>

<body>

<div class="topbar">
  <button id="backBtn" class="back-btn" onclick="requestBack()">←</button>
  Event Serie
</div>

<div class="card">
  <div class="section-title">Titolo</div>
  <input id="es_title" oninput="markDirty()">

  <div class="section-title">Descrizione</div>
  <textarea id="es_description" oninput="markDirty()"></textarea>

  <div class="section-title">Note</div>
  <textarea id="es_notes" oninput="markDirty()"></textarea>

  <div class="section-title">Organizzatore</div>
<div id="es_organizzatore" style="
  padding:6px;
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:6px;
  font-size:15px;
  color:#374151;
"></div>

  <div class="section-title">Copertina</div>
  <input id="es_cover" oninput="markDirty(); preview()">

  <div class="preview">
    <img id="img">
  </div>

<!-- EVENTI COLLEGATI -->
<div class="section-box">
<div class="section-header" onclick="toggleEvents()">
    <span id="eventiArrow">▶</span>
    <span id="eventiTitle">Eventi collegati (0)</span>
</div>

  <div class="section-panel" id="panel">
    <table class="table">
      <tbody id="eventsBody"></tbody>
    </table>
  </div>
  
</div>
  
  <div class="footer" id="es_created"></div>
  
<!-- SI - NO - ANNULLA -->
<div id="saveDialog" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:99999;
  align-items:center;
  justify-content:center;
">
  <div style="
    background:white;
    padding:22px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
  ">
    <div style="margin-bottom:18px; font-weight:600;">
      Vuoi salvare le modifiche?
    </div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button onclick="dialogAction('yes')" style="
        flex:1;
        background:#22c55e;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Sì</button>
      <button onclick="dialogAction('no')" style="
        flex:1;
        background:#ef4444;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">No</button>
      <button onclick="dialogAction('cancel')" style="
        flex:1;
        background:#9ca3af;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Annulla</button>
    </div>
  </div>
</div>
  
</div>

<script type="module">
import { requireAuth } from './auth-check.js';
await requireAuth();  

import { supabase } from '../supabase.js';

const params = new URLSearchParams(location.search);
const id = params.get('id');
const isNew = params.has('new');
const idOrganizzatore = params.get("id_organizzatore");
  
let original = "{}";
let dirty = false;
let eventsOpen = false;
let dialogResolve;  

function askSaveDialog() {
  const dialog = document.getElementById("saveDialog");
  dialog.style.display = "flex";
  return new Promise(resolve => {
    dialogResolve = resolve;
  });
}

function dialogAction(type) {
  document.getElementById("saveDialog").style.display = "none";
  dialogResolve(type);
}
window.dialogAction = dialogAction;  

async function load() {
  if (isNew) {
    original = JSON.stringify({
      es_title: '',
      es_description: '',
      es_notes: '',
      es_cover: ''
    });
    dirty = false;
    document.getElementById("backBtn").classList.remove("dirty");
    es_created.textContent = "";
    if (idOrganizzatore) {
  const { data } = await supabase
    .from("organizzatori")
    .select("or_nome")
    .eq("id_organizzatore", idOrganizzatore)
    .single();
  es_organizzatore.textContent = data?.or_nome || "—";
}
    return;
  }
const { data, error } = await supabase
  .from("event_series")
  .select(`
    *,
    organizzatori (
      id_organizzatore,
      or_nome
    )
  `)
  .eq("id_event_series", id)
  .single();
  if (error) {
    console.error(error);
    return;
  }
  original = JSON.stringify({
    es_title: data.es_title || '',
    es_description: data.es_description || '',
    es_notes: data.es_notes || '',
    es_cover: data.es_cover || ''
  });
  es_title.value = data.es_title || "";
  es_description.value = data.es_description || "";
  es_notes.value = data.es_notes || "";
  es_cover.value = data.es_cover || "";
  es_created.textContent = data.es_created
  ? new Date(data.es_created).toLocaleString()
  : "";
  es_organizzatore.textContent =
  data.organizzatori?.or_nome || "—";
  dirty = false;
  document.getElementById("backBtn").classList.remove("dirty");
  preview();
  await loadEvents();
}

async function loadEvents() {
  const { data } = await supabase
    .from('eventi')
    .select('id_evento, ev_titolo, ev_inizio')
    .eq('id_event_series', id);
  const body = document.getElementById('eventsBody');
  body.innerHTML = '';
  const eventi = (data || [])
  .sort((a,b)=>new Date(b.ev_inizio)-new Date(a.ev_inizio));
if(eventi.length){
  const header = document.createElement("tr");
  header.className = "header-row";
  header.innerHTML = `
    <td>Data</td>
    <td>Evento</td>
  `;
  body.appendChild(header);
}
eventi.forEach(e=>{
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${new Date(e.ev_inizio).toLocaleDateString()}</td>
    <td class="link">${e.ev_titolo}</td>
  `;
  tr.cells[1].onclick = () =>
    location.href = `evento.html?id=${e.id_evento}`;
  body.appendChild(tr);
});

  
const title = document.getElementById("eventiTitle");
const arrow = document.getElementById("eventiArrow");
const header = document.querySelector(".section-header");
title.textContent = `Eventi collegati (${data?.length || 0})`;
if (!data || data.length === 0) {
    header.classList.add("disabled");
    arrow.textContent = "▶";
} else {
    header.classList.remove("disabled");
    arrow.textContent = eventsOpen ? "▼" : "▶";
}
}

function getSnapshot() {
  return {
    es_title: document.getElementById('es_title').value,
    es_description: document.getElementById('es_description').value,
    es_notes: document.getElementById('es_notes').value,
    es_cover: document.getElementById('es_cover').value
  };
}

async function save() {
  const payload = {
    es_title: es_title.value,
    es_description: es_description.value,
    es_notes: es_notes.value,
    es_cover: es_cover.value
  };
  if (isNew && idOrganizzatore) {
    payload.id_organizzatore = Number(idOrganizzatore);
  }
  let result;
  if (isNew) {
    result = await supabase
      .from('event_series')
      .insert(payload)
      .select()
      .single();
  } else {
    result = await supabase
      .from('event_series')
      .update(payload)
      .eq('id_event_series', id)
      .select()
      .single();
  }
  const { error, data } = result;
  if (error) {
    console.error(error);
    alert("Errore salvataggio");
    return false;
  }
  dirty = false;
  original = JSON.stringify(payload);
  if (isNew && data?.id_event_series) {
    location.href = `event_serie.html?id=${data.id_event_series}`;
  }
  return true;
}
  
window.toggleEvents = () => {
  if(document.querySelector(".section-header").classList.contains("disabled"))
    return;
  eventsOpen = !eventsOpen;
  panel.style.display = eventsOpen ? "block" : "none";
  eventiArrow.textContent = eventsOpen ? "▼" : "▶";
};

window.preview = () => {
  document.getElementById('img').src =
    document.getElementById('es_cover').value;
};

window.markDirty = () => {
  const current = JSON.stringify(getSnapshot());
  dirty = current !== original;
  const btn = document.getElementById('backBtn');
  if (btn) btn.classList.toggle('dirty', dirty);
};

/* BACK */
window.requestBack = async () => {
  if (!dirty)
    return history.back();
  const choice = await askSaveDialog();
  if (choice === "cancel")
    return;
  if (choice === "yes") {
    const success = await save();
    if (!success)
      return;
    history.back();
    return;
  }
  if (choice === "no") {
    history.back();
  }
};
  
load();

</script>
</body>
</html>
