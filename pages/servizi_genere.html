<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Genere di Servizi</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
}

.title {
  font-size: 24px;
  font-weight: bold;
  display: flex;
  gap: 20px;
  align-items: center;
}

.bck-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

th {
  font-size: 13px;
  font-weight: bold;
  text-align: left;
  background: #f9fafb;
}

tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

td {
  border-right: 2px solid #f1f5f9;
}

td:last-child {
  border-right: none;
}

/* ICON STYLE */
.icon {
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">
    <button class="bck-btn" onclick="window.location.href='../tabelle.html'">←</button>
    Genere di Servizi
  </div>
</div>

<table>
<colgroup>
  <col style="width:50px;">   <!-- ID ridotto -->
  <col style="width:200px;">  <!-- descrizione -->
  <col style="width:400px;">  <!-- descrizione estesa -->
  <col style="width:120px;">  <!-- icona testuale -->
  <col style="width:60px;">   <!-- icona render -->
</colgroup>

<thead>
<tr>
  <th>ID</th>
  <th>Descrizione</th>
  <th>Descrizione estesa</th>
  <th>Icona</th>
  <th></th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];

async function load() {
  const { data: rows } = await supabase
    .from('servizi_genere')
    .select('*');

  data = rows || [];
  render();
}

function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach(r => {
    const tr = document.createElement("tr");

    tr.onclick = () => {
      window.location.href = `servizi.html?id_genere=${r.id_genere}`;
    };

    tr.innerHTML = `
      <td>${r.id_genere}</td>
      <td>${r.gen_descrizione || ''}</td>
      <td>${r.gen_descrizione_estesa || ''}</td>
      <td>${r.gen_icona || ''}</td>
      <td class="icon">${r.gen_icona || ''}</td>
    `;

    tbody.appendChild(tr);
  });
}

await load();
</script>

</body>
</html>
