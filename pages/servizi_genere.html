<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Servizi Genere</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
}

.title {
  font-size: 24px;
  font-weight: bold;
  display: flex;
  gap: 20px;
  align-items: center;
}

.bck-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.bck-btn:hover {
  background: #d1d5db;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
  overflow: hidden;
}

tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

td {
  white-space: nowrap;
  text-overflow: ellipsis;
  border-right: 2px solid #f1f5f9;
}

td:last-child {
  border-right: none;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">
    <button class="bck-btn" onclick="window.location.href='../tabelle.html'">←</button>
    Servizi Genere
  </div>
</div>

<table>
<colgroup>
  <col style="width: 60px;">
  <col style="width: 200px;">
  <col style="width: 300px;">
  <col style="width: 120px;">
</colgroup>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];

async function load() {
  const { data: rows, error } = await supabase
    .from('servizi_genere')
    .select('*');

  if (error) {
    console.error(error);
    return;
  }

  data = rows || [];
  render();
}

function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach(r => {
    const tr = document.createElement("tr");

    tr.onclick = () => {
      window.location.href = `servizi.html?id_genere=${r.id_genere}`;
    };

    tr.innerHTML = `
      <td>${r.id_genere}</td>
      <td>${r.gen_descrizione || ''}</td>
      <td>${r.gen_descrizione_estesa || ''}</td>
      <td>${r.gen_icona || ''}</td>
    `;

    tbody.appendChild(tr);
  });
}

await load();
</script>

</body>
</html>
