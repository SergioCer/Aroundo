<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Organizzatore</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

.topbar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  font-weight: bold;
  gap: 20px;
}

.back-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.back-btn.dirty {
  background: #fbbf24;
  color: #111827;
}

.back-btn:hover {
  background: #d1d5db;
}  

.hero {
  margin: 10px 15px 8px;
  padding: 12px;
  background: white;
  border-radius: 12px;
}

.hero input {
  width: 100%;
  font-size: 20px;
  font-weight: bold;
  border: none;
  text-align: center;
  background: transparent;
}

.card {
  background: white;
  margin: 0 15px 20px;
  padding: 15px;
  border-radius: 12px;
}

.section-title {
  font-size: 11px;
  color: #777;
  margin: 12px 0 4px;
}

input, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 16px;
}

/* STATUS */
.status-box {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 16px;
  margin-top: 6px;
  cursor: pointer;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 6px 10px;
}

.status-ok {
  color: #22c55e;
  font-weight: bold;
}

.status-no {
  color: #ef4444;
  font-weight: bold;
}

/* COPERTINA PREVIEW */
.preview {
  margin-top: 8px;
}

.preview img {
  max-width: 100%;
  border-radius: 8px;
  margin-top: 6px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

.footer {
  text-align: right;
  font-size: 11px;
  color: #888;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="topbar">
  <button id="backBtn" class="back-btn" onclick="requestBack()">←</button>
  Organizzatore
</div>

<div class="hero">
  <input id="or_nome" placeholder="Inserisci nuovo nome" oninput="markDirty()">
</div>

<div class="card">

  <div class="section-title">Descrizione</div>
  <textarea id="or_descrizione" oninput="markDirty()"></textarea>

  <div class="section-title">Email</div>
  <input id="or_email" oninput="markDirty()">

  <div class="section-title">Telefono</div>
  <input id="or_telefono" oninput="markDirty()">

  <div class="section-title">Sito web</div>
  <input id="or_sito_web" oninput="markDirty()">

  <div class="section-title">Note</div>
  <textarea id="or_note" oninput="markDirty()"></textarea>

  <!-- STATO -->
  <div class="section-title">Stato</div>
  <div class="status-box" onclick="toggleAttivo()">
    <span id="statusIcon"></span>
    <span id="statusText"></span>
  </div>

  <!-- COPERTINA -->
  <div class="section-title">Copertina (URL)</div>
  <input id="or_copertina" oninput="markDirty(); updatePreview()">

  <div class="preview">
    <div id="copertina_url" style="font-size:10px; color:#666;">
  </div>
    <img id="copertina_img" />
  </div>

  <!-- CREATO -->
  <div class="footer" id="or_creato"></div>
  
<!-- SI - NO - ANNULLA -->
<div id="saveDialog" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:99999;
  align-items:center;
  justify-content:center;
">
  <div style="
    background:white;
    padding:22px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
  ">
    <div style="margin-bottom:18px; font-weight:600;">
      Vuoi salvare le modifiche?
    </div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button onclick="dialogAction('yes')" style="
        flex:1;
        background:#22c55e;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Sì</button>
      <button onclick="dialogAction('no')" style="
        flex:1;
        background:#ef4444;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">No</button>
      <button onclick="dialogAction('cancel')" style="
        flex:1;
        background:#9ca3af;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Annulla</button>
    </div>
  </div>
</div>
  
</div>

<script type="module">
import { supabase } from '../supabase.js';

const params = new URLSearchParams(location.search);
const id = params.get('id');
const isNew = params.has('new') || !id;

let original = "{}";
let dirty = false;
let dialogResolve;

function askSaveDialog() {
  document.getElementById("saveDialog").style.display = "flex";
  return new Promise(resolve => {
    dialogResolve = resolve;
  });
}

function dialogAction(type) {
  document.getElementById("saveDialog").style.display = "none";
  dialogResolve(type);
}
window.dialogAction = dialogAction;
  
/* LOAD */
async function load() {
  if (isNew) {
    original = JSON.stringify({});
    updateStatus(false);
    return;
  }
  const { data, error } = await supabase
    .from('organizzatori')
    .select('*')
    .eq('id_organizzatore', id)
    .single();
  if (error) {
    console.error(error);
    return;
  }
  original = JSON.stringify(data);
  or_nome.value = data.or_nome || '';
  or_descrizione.value = data.or_descrizione || '';
  or_email.value = data.or_email || '';
  or_telefono.value = data.or_telefono || '';
  or_sito_web.value = data.or_sito_web || '';
  or_copertina.value = data.or_copertina || '';
  or_note.value = data.or_note || '';
  updateStatus(data.or_attivo);
  updatePreview();
  or_creato.textContent = data.or_creato
    ? new Date(data.or_creato).toLocaleString()
    : '';
}

/* STATUS */
window.toggleAttivo = () => {
  const isActive = document.body.dataset.attivo === 'true';
  updateStatus(!isActive);
  markDirty();
};

function updateStatus(val) {
  document.body.dataset.attivo = val;
  statusIcon.textContent = val ? '✔' : '✖';
  statusText.textContent = val ? 'Attivo' : 'Non attivo';
  statusIcon.className = val ? 'status-ok' : 'status-no';
}

/* PREVIEW */
window.updatePreview = () => {
  const url = or_copertina.value;
  copertina_url.textContent = url || '';
  copertina_img.src = url || '';
};

/* DIRTY */
window.markDirty = () => {
  const current = JSON.stringify({
    or_nome: or_nome.value,
    or_descrizione: or_descrizione.value,
    or_email: or_email.value,
    or_telefono: or_telefono.value,
    or_sito_web: or_sito_web.value,
    or_note: or_note.value,
    or_copertina: or_copertina.value,
    or_attivo: document.body.dataset.attivo === 'true'
  });
  dirty = current !== original;
  document.getElementById('backBtn')
    .classList.toggle('dirty', dirty);
};

/* SAVE */
async function save() {
  const payload = {
    or_nome: or_nome.value,
    or_descrizione: or_descrizione.value,
    or_email: or_email.value,
    or_telefono: or_telefono.value,
    or_sito_web: or_sito_web.value,
    or_note: or_note.value,
    or_copertina: or_copertina.value,
    or_attivo: document.body.dataset.attivo === 'true'
  };
  let result;
  if (isNew) {
    result = await supabase
      .from('organizzatori')
      .insert(payload)
      .select()
      .single();
  } else {
    result = await supabase
      .from('organizzatori')
      .update(payload)
      .eq('id_organizzatore', id)
      .select()
      .single();
  }
  const { data, error } = result;
  if (error) {
    console.error(error);
    alert("Errore salvataggio");
    return false;
  }
  dirty = false;
  if (isNew) {
    location.href = `organizzatore.html?id=${data.id_organizzatore}`;
  }
  return true;
}

/* BACK */
window.requestBack = async () => {
  if (!dirty)
    return history.back();
  const choice = await askSaveDialog();
  if (choice === "cancel")
    return;
  if (choice === "yes") {
    const success = await save();
    if (!success)
      return;
    history.back();
    return;
  }
  if (choice === "no") {
    history.back();
  }
};

await load();
</script>
</body>
</html>
