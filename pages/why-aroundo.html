<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Why Aroundo?</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  margin:0;
  min-height:100vh;
  background:#f4f1ea;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#333;
}

.container {
  width:90%;
  max-width:520px;
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.12);
}

.logo {
  text-align:center;
}

.logo img {
  width:90px;
  height:90px;
  border-radius:18px;
}

.lang {
  text-align:right;
  margin-top:10px;
  margin-bottom:20px;
}

.lang button {
  border:none;
  background:none;
  cursor:pointer;
  font-weight:700;
  font-size:13px;
}

.active-lang {
  color:#2563eb;
}

.inactive-lang {
  color:#999;
}

h1 {
  text-align:center;
  font-size:26px;
  margin:10px 0 20px;
}

details {
  background:#f8fafc;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
}

summary {
  cursor:pointer;
  font-weight:700;
  color:#2563eb;
}

details p {
  color:#555;
  font-size:14px;
  line-height:1.55;
}

details li {
  color:#555;
  font-size:14px;
  margin-bottom:5px;
}

.final-message {
  margin-top:30px;
  margin-bottom:20px;
  text-align:center;
  font-size:15px;
  color:#555;
  font-style:italic;
  line-height:1.5;
}

.button {
  display:block;
  text-align:center;
  background:#22c55e;
  color:white;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
}

.back {
  text-align:center;
  margin-top:15px;
}

.back a {
  color:#666;
  font-size:13px;
}

</style>

</head>


<body>

<div class="container">


<div class="logo">
<img src="../icon-512.png" alt="Aroundo">
</div>


<div class="lang">

<button id="enBtn"
class="active-lang"
onclick="changeLanguage('en')">
EN
</button>

&nbsp;|&nbsp;

<button id="itBtn"
class="inactive-lang"
onclick="changeLanguage('it')">
IT
</button>
</div>
<h1 id="pageTitle"
data-en="Why Aroundo?"
data-it="Perché Aroundo?">
Why Aroundo?
</h1>

<details open>

<summary data-en="What is Aroundo?"
         data-it="Cos'è Aroundo?">
What is Aroundo?
</summary>

<p data-en="
Aroundo is a network of people, places and experiences.
It connects those who want to discover events with those who create them,
organize them or make the places where they happen available.
"
data-it="
Aroundo è una rete di persone, luoghi ed esperienze.
Collega chi vuole scoprire eventi con chi li crea,
li organizza o rende disponibili gli spazi dove possono accadere.
">
</p>


<p data-en="
Aroundo grows through the contribution of its community:
every person can add value, share knowledge and help create a more reliable
and complete map of experiences.
"
data-it="
Aroundo cresce grazie al contributo della sua comunità:
ogni persona può aggiungere valore, condividere conoscenze
e contribuire a creare una mappa di esperienze più completa e affidabile.
">
</p>

</details>


<details>

<summary data-en="How can I participate?"
data-it="Come posso partecipare?">
How can I participate?
</summary>

<p data-en="
Aroundo does not define people by a single category.
A person can have different roles over time and participate in different ways.
"
data-it="
Aroundo non definisce le persone attraverso una sola categoria.
Una persona può avere ruoli diversi nel tempo e partecipare in modi differenti.
">
</p>

<p data-en="
You can start simply as a User and, whenever you want, add new roles
according to what you do and what you want to contribute.
"
data-it="
Puoi iniziare semplicemente come User e, quando vuoi,
aggiungere nuovi ruoli in base a ciò che fai e a ciò che vuoi offrire.
">
</p>

</details>


<details>
<summary>User</summary>

<p data-en="
A User is someone who wants to explore the territory and discover new experiences.
"
data-it="
Uno User è una persona che vuole esplorare il territorio
e scoprire nuove esperienze.
">
</p>

<ul>
<li>discover events and places</li>
<li>save interesting experiences</li>
<li>participate in activities</li>
<li>share feedback with the community</li>
</ul>

</details>


<details>

<summary>Creator</summary>

<p data-en="
Creators are the people who create experiences and content to share
with the community.
"
data-it="
I Creator sono le persone che creano esperienze e contenuti
da condividere con la comunità.
">
</p>

<p data-en="
Creators may include artists, professionals, cultural operators,
performers or anyone who offers something meaningful to others.
"
data-it="
Possono essere artisti, professionisti, operatori culturali,
performer o chiunque offra qualcosa di significativo agli altri.
">
</p>

</details>


<details>

<summary>Organizer</summary>

<p data-en="
Organizers are responsible for creating and coordinating events.
"
data-it="
Gli Organizer sono responsabili della creazione
e del coordinamento degli eventi.
">
</p>

</details>


<details>

<summary>Place Manager</summary>

<p data-en="
A Place Manager is responsible for a place available on Aroundo.
The role is not necessarily linked to ownership:
it represents the person or organization responsible for maintaining
the information and availability of that place.
"
data-it="
Un Place Manager è responsabile di un luogo presente su Aroundo.
Il ruolo non è necessariamente legato alla proprietà:
rappresenta la persona o organizzazione che ne cura informazioni
e disponibilità.
">
</p>

</details>


<details>

<summary>Service Provider</summary>

<p data-en="
Service Providers offer skills and support that help make events possible.
"
data-it="
I Service Provider offrono competenze e servizi
che aiutano a realizzare gli eventi.
">
</p>

</details>


<details>

<summary>Trust & Community</summary>

<p data-en="
Trust is the foundation of Aroundo.
The platform provides the tools, but the quality of the experience
depends on the people who use them.
"
data-it="
La fiducia è il fondamento di Aroundo.
La piattaforma fornisce gli strumenti, ma la qualità dell'esperienza
dipende dalle persone che li utilizzano.
">
</p>

</details>


<div class="final-message"
     data-en="Aroundo starts with people.<br>Choose how you want to be part of it."
     data-it="Aroundo nasce dalle persone.<br>Scegli come vuoi farne parte.">
</div>
<a class="button"
   href="login.html"
   data-en="Join Aroundo"
   data-it="Entra in Aroundo">
</a>
<div class="back">
<a href="login.html"
   data-en="Back to login"
   data-it="Torna al login">
</a>
</div>
</div>

<script>
const details = document.querySelectorAll("details");

details.forEach((targetDetail)=>{
targetDetail.addEventListener("toggle",()=>{
if(targetDetail.open){
details.forEach((detail)=>{
if(detail !== targetDetail){
detail.removeAttribute("open");
}
});
}
});
});

function changeLanguage(lang){
document.querySelectorAll("[data-en]").forEach(el=>{
el.innerHTML = el.getAttribute("data-"+lang);
});
document.getElementById("enBtn").className =
lang==="en" ? "active-lang" : "inactive-lang";
document.getElementById("itBtn").className =
lang==="it" ? "active-lang" : "inactive-lang";
document.documentElement.lang = lang;
}

</script>
</body>
</html>
