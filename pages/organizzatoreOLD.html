<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Organizzatore</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f2f4f7;
    color: #333;
  }

  .container {
    max-width: 720px;
    margin: auto;
    padding: 20px;
  }

  /* HEADER */
  .topbar {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
  }

  .back-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
  }

  /* HEADER TITLE */
  .title {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0 20px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  /* CARD */
  .card {
    background: white;
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  }

  /* ROWS */
  .row {
    display: flex;
    margin: 10px 0;
    align-items: flex-start;
  }

  .label {
    width: 120px;
    font-size: 12px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .value {
    flex: 1;
    font-size: 14px;
  }

  /* STATUS */
  .status-ok {
    color: #22c55e;
    font-size: 18px;
    font-weight: bold;
  }

  /* FOOTER */
  .footer {
    text-align: right;
    font-size: 11px;
    color: #888;
    margin-top: 15px;
  }

  a {
    color: #333;
  }
</style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="topbar">
    <a class="back-btn" href="javascript:history.back()">←</a>
  </div>

  <!-- TITLE -->
  <div class="title" id="or_nome">Caricamento...</div>

  <!-- CARD -->
  <div class="card">

    <div class="row">
      <div class="label">Descrizione:</div>
      <div class="value" id="or_descrizione"></div>
    </div>

    <div class="row">
      <div class="label">Email:</div>
      <div class="value" id="or_email"></div>
    </div>

    <div class="row">
      <div class="label">Telefono:</div>
      <div class="value" id="or_telefono"></div>
    </div>

    <div class="row">
      <div class="label">Sito web:</div>
      <div class="value" id="or_sito_web"></div>
    </div>

    <div class="row">
      <div class="label">Stato:</div>
      <div class="value status-ok" id="or_attivo"></div>
    </div>

    <div class="footer" id="or_creato"></div>

  </div>

</div>

<script type="module">
import { supabase } from '../supabase.js';

const params = new URLSearchParams(window.location.search);
const id = params.get('id');

async function loadOrganizzatore() {

  if (!id) {
    document.body.innerHTML = "ID organizzatore mancante";
    return;
  }

  const { data, error } = await supabase
    .from('organizzatori')
    .select('*')
    .eq('id_organizzatore', id)
    .single();

  if (error) {
    console.error(error);
    document.body.innerHTML = "Errore caricamento organizzatore";
    return;
  }

  document.getElementById('or_nome').textContent = data.or_nome || '';
  document.getElementById('or_descrizione').textContent = data.or_descrizione || '-';

  document.getElementById('or_email').innerHTML = data.or_email
    ? `<a href="mailto:${data.or_email}">${data.or_email}</a>`
    : '-';

  document.getElementById('or_telefono').textContent = data.or_telefono || '-';

  document.getElementById('or_sito_web').innerHTML = data.or_sito_web
    ? `<a href="${data.or_sito_web}" target="_blank">${data.or_sito_web}</a>`
    : '-';

  document.getElementById('or_attivo').innerHTML =
    data.or_attivo ? '✔' : '';

  document.getElementById('or_creato').textContent =
    data.or_creato ? new Date(data.or_creato).toLocaleString() : '';
}

loadOrganizzatore();
</script>

</body>
</html>
