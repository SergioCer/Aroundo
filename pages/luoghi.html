<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Luoghi Admin</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  display: flex;
  gap: 10px;
  align-items: center;
}

.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
}

/* FILTER + SORT ROW */
.col-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  font-weight: bold;
  font-size: 14px;
}

/* input + sort inline */
.col-tools {
  display: flex;
  gap: 4px;
  align-items: center;
}

.filter {
  flex: 1;
  font-size: 12px;
  padding: 4px;
}

/* SORT BUTTON */
.sort-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #dbeafe;
  color: #1e3a8a;
}

.sort-btn:hover {
  background: #bfdbfe;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #fee2e2;
  color: #991b1b;
}

.reset-btn:hover {
  background: #fecaca;
}

.reset-btn.active {
  background: #ef4444;
  color: white;
}  
  
/* TABLE ROW */
tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}

#modalContent {
  background: white;
  width: 420px;
  padding: 18px;
  border-radius: 10px;
  position: relative;
}

.closeX {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: #f3f4f6;
  transition: 0.2s;
}

.closeX:hover {
  background: #ef4444;
  color: white;
}

input, select, textarea {
  width: 100%;
  margin-bottom: 0px;
  padding: 6px;
}

th:nth-child(1), td:nth-child(1) {width: 30px;}
th:nth-child(2), td:nth-child(2) {width: 120px;}
th:nth-child(3), td:nth-child(3) {width: 120px;}
th:nth-child(4), td:nth-child(4) {width: 120px;}
th:nth-child(5), td:nth-child(5) {width: 50px;}
th:nth-child(6), td:nth-child(6) {width: 50px;}
th:nth-child(7), td:nth-child(7) {width: 200px;}
th:nth-child(8), td:nth-child(8) {width: 40px;}

td {overflow: hidden; white-space: nowrap; text-overflow: ellipsis;}  
  
</style>
</head>

<body>

<div class="header">
  <div class="title">
    Luoghi
    <button class="add-btn" onclick="openModal()">+</button>
  </div>
</div>

<table>
  <thead>

    <tr>
      <th>
        <div class="col-header">
          <div class="col-title">ID</div>
          <div class="col-tools">
            <button class="reset-btn" onclick="resetAll()">-</button>
          </div>
        </div>
      </th>

      <th>
        <div class="col-header">
          <div class="col-title">Comune</div>
          <div class="col-tools">
            <input class="filter" oninput="setFilter('comune', this.value)">
            <button class="sort-btn" data-field="comune" onclick="sort('comune')">-</button>
          </div>
        </div>
      </th>

      <th>
        <div class="col-header">
          <div class="col-title">Location</div>
          <div class="col-tools">
            <input class="filter" oninput="setFilter('location', this.value)">
            <button class="sort-btn" data-field="location" onclick="sort('location')">-</button>
          </div>
        </div>
      </th>

      <th>
        <div class="col-header">
          <div class="col-title">Descrizione</div>
          <div class="col-tools">
            <input class="filter" oninput="setFilter('descrizione', this.value)">
            <button class="sort-btn" data-field="descrizione" onclick="sort('descrizione')">-</button>
          </div>
        </div>
      </th>
      
      <th>
        <div class="col-header">
          <div class="col-title">Lat</div>
          <div class="col-tools">
            <input class="filter" oninput="setFilter('lat', this.value)">
            <button class="sort-btn" data-field="lat" onclick="sort('lat')">-</button>
          </div>
        </div>
      </th>

      <th>
        <div class="col-header">
          <div class="col-title">Lng</div>
          <div class="col-tools">
            <input class="filter" oninput="setFilter('lng', this.value)">
            <button class="sort-btn" data-field="lng" onclick="sort('lng')">-</button>
          </div>
        </div>
      </th>

      <th>
        <div class="col-header">
          <div class="col-title">Note</div>
          <div class="col-tools">
            <input class="filter" oninput="setFilter('note', this.value)">
            <button class="sort-btn" data-field="note" onclick="sort('note')">-</button>
          </div>
        </div>
      </th>
      
      <th>
        <div class="col-header">
          <div class="col-title">Capacità</div>
          <div class="col-tools">
            <input class="filter" oninput="setFilter('cap', this.value)">
            <button class="sort-btn" data-field="cap" onclick="sort('cap')">-</button>
          </div>
        </div>
      </th>

    </tr>
  </thead>

  <tbody id="tbody"></tbody>
</table>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <div class="closeX" onclick="requestClose()">✕</div>
    <input type="hidden" id="id_luogo">
    <label>Comune</label>
    <select id="lu_comune" onchange="markDirty()"></select>
    <label>Location</label>
    <input id="lu_location" oninput="markDirty()">
    <label>Lat</label>
    <input id="lu_lat" oninput="markDirty()">
    <label>Lng</label>
    <input id="lu_lng" oninput="markDirty()">
    <label>Descrizione</label>
    <textarea id="lu_descrizione" oninput="markDirty()"></textarea>
    <label>Note</label>
    <textarea id="lu_note" oninput="markDirty()"></textarea>
    <label>Capacità</label>
    <input id="lu_capacita_massima" oninput="markDirty()">
  </div>
</div>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];
let comuni = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc',
  dirty: false,
};


let originalData = null;
  

  
// ---------------- COMUNI ----------------
async function loadComuni() {
  const res = await supabase.from('comuni').select('*');
  comuni = res.data;
  const sel = document.getElementById("lu_comune");
  sel.innerHTML = `<option value="">--</option>`;
  comuni.forEach(c => {
    sel.innerHTML += `<option value="${c.id_comune}">${c.co_descrizione}</option>`;
  });
}

// ---------------- LOAD ----------------
async function load() {
  const res = await supabase.from('luoghi').select('*');
  data = res.data;
  render();
}

// ---------------- RENDER ----------------
function render() {
  let filtered = [...data];
  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;
    filtered = filtered.filter(r => {
      if (k === 'comune') {
        const c = comuni.find(x => x.id_comune === r.lu_comune);
        return (c?.co_descrizione || '').toLowerCase().includes(v);
      }
      if (k === 'location')
        return (r.lu_location || '').toLowerCase().includes(v);
      if (k === 'descrizione')
        return (r.lu_descrizione || '').toLowerCase().includes(v);
      if (k === 'lat')
        return (r.lu_lat || '').toString().startsWith(v);
      if (k === 'lng')
        return (r.lu_lng || '').toString().startsWith(v);
      if (k === 'note')
        return (r.lu_note || '').toLowerCase().includes(v);
      if (k === 'cap')
        return (r.lu_capacita_massima || '').toString().startsWith(v);
      return true;
    });
  });

  if (state.sortField) {
    filtered.sort((a,b) => {
      let va = a['lu_' + state.sortField];
      let vb = b['lu_' + state.sortField];
      if (state.sortDir === 'asc') return va > vb ? 1 : -1;
      return va < vb ? 1 : -1;
    });
  }

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  filtered.forEach(r => {
    const c = comuni.find(x => x.id_comune === r.lu_comune);
    const tr = document.createElement("tr");
    tr.onclick = () => openModal(r);
    tr.innerHTML = `
      <td>${r.id_luogo}</td>
      <td>${c ? c.co_descrizione : ''}</td>
      <td>${r.lu_location || ''}</td>
      <td>${r.lu_descrizione || ''}</td>
      <td>${r.lu_lat}</td>
      <td>${r.lu_lng}</td>
      <td>${r.lu_note || ''}</td>
      <td>${r.lu_capacita_massima || ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ---------------- FILTER ----------------
window.setFilter = (k,v) => {
  state.filters[k] = v;
  render();
  syncUI();
};

// ---------------- SORT ----------------
window.sort = (field) => {
  if (state.sortField !== field) {
    state.sortField = field;
    state.sortDir = 'asc';
  } else {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  }
  render();
  syncUI();
};

// ---------------- MODAL ----------------
window.openModal = (row=null) => {
  originalData = {
  lu_comune: row?.lu_comune || "",
  lu_location: row?.lu_location || "",
  lu_lat: row?.lu_lat || "",
  lu_lng: row?.lu_lng || "",
  lu_descrizione: row?.lu_descrizione || "",
  lu_note: row?.lu_note || "",
  lu_capacita_massima: row?.lu_capacita_massima || ""
};
  state.dirty = false;
  state.editing = row;
  document.getElementById("modal").style.display = "flex";
  if (!row) {
    document.getElementById("id_luogo").value = "";
    document.getElementById("lu_location").value = "";
    document.getElementById("lu_lat").value = "";
    document.getElementById("lu_lng").value = "";
    document.getElementById("lu_descrizione").value = "";
    document.getElementById("lu_note").value = "";
    document.getElementById("lu_capacita_massima").value = "";
    document.getElementById("lu_comune").value = "";
  } else {
    document.getElementById("id_luogo").value = row.id_luogo;
    document.getElementById("lu_comune").value = row.lu_comune || "";
    document.getElementById("lu_location").value = row.lu_location || "";
    document.getElementById("lu_lat").value = row.lu_lat || "";
    document.getElementById("lu_lng").value = row.lu_lng || "";
    document.getElementById("lu_descrizione").value = row.lu_descrizione || "";
    document.getElementById("lu_note").value = row.lu_note || "";
    document.getElementById("lu_capacita_massima").value = row.lu_capacita_massima || "";
  }
};

// click outside
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") requestClose();
});

// ESC
document.addEventListener("keydown", e => {
  if (e.key === "Escape") requestClose();
});

// ---------------- DIRTY ----------------
window.markDirty = () => {
  const current = {
    lu_comune: document.getElementById("lu_comune").value,
    lu_location: document.getElementById("lu_location").value,
    lu_lat: document.getElementById("lu_lat").value,
    lu_lng: document.getElementById("lu_lng").value,
    lu_descrizione: document.getElementById("lu_descrizione").value,
    lu_note: document.getElementById("lu_note").value,
    lu_capacita_massima: document.getElementById("lu_capacita_massima").value
  };

  state.dirty = JSON.stringify(current) !== JSON.stringify(originalData);
};
  
// ---------------- SAVE ----------------
window.save = async () => {
  const id = document.getElementById("id_luogo").value;
  const payload = {
    lu_comune: document.getElementById("lu_comune").value || null,
    lu_location: document.getElementById("lu_location").value,
    lu_lat: parseFloat(document.getElementById("lu_lat").value),
    lu_lng: parseFloat(document.getElementById("lu_lng").value),
    lu_descrizione: document.getElementById("lu_descrizione").value,
    lu_note: document.getElementById("lu_note").value,
    lu_capacita_massima: parseInt(document.getElementById("lu_capacita_massima").value)
  };
  if (id) {
    await supabase.from('luoghi')
      .update(payload)
      .eq('id_luogo', id);
  } else {
    await supabase.from('luoghi')
      .insert(payload);
  }
  // closeModal(true);
  load();
};

await loadComuni();
await load();
updateSortButtons();
updateResetButton();
  

function updateSortButtons() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const field = btn.dataset.field;
    if (field !== state.sortField) {
      btn.textContent = '-';
      return;
    }
    btn.textContent =
      state.sortDir === 'asc'
        ? '▼'
        : '▲';
  });
}

function updateResetButton() {
  const hasFilters =
    Object.values(state.filters).some(v => v && v.length > 0);
  const hasSort = state.sortField !== null;
  const btn = document.querySelector('.reset-btn');
  if (!btn) return;
  btn.textContent = (hasFilters || hasSort) ? '✕' : '-';
  btn.classList.toggle('active', hasFilters || hasSort);
}
  
window.resetAll = () => {
  state.filters = {};
  state.sortField = null;
  state.sortDir = 'asc';
  document.querySelectorAll('.filter').forEach(i => i.value = '');
  render();
  syncUI();
};

function syncUI() {
  updateSortButtons();
  updateResetButton();
}  

  function requestClose() {
  if (!state.dirty) {
    document.getElementById("modal").style.display = "none";
    return;
  }
 const ok = confirm("Vuoi salvare le modifiche?");
  if (ok) {
    save();
  } else {
    document.getElementById("modal").style.display = "none";
  }
}

// function closeModal(force = false) {
  // if (!force && state.dirty) {
    // const ok = confirm("Vuoi salvare le modifiche?");
    // if (ok) save();
    // return;
  // }
  //document.getElementById("modal").style.display = "none";
// } 
  
  
</script>
</body>
</html>
