<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Luoghi Admin</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
}

.title {
  font-size: 24px;
  font-weight: bold;
  display: flex;
  gap: 20px;
  align-items: center;
}

.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
}

.bck-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.bck-btn:hover {
  background: #d1d5db;
}  

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
  overflow: hidden;
}

/* FILTER + SORT ROW */
.col-header {
  width: 100%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  min-width: 0;
  font-weight: bold;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  white-space: nowrap;
}

/* input + sort inline */
.col-tools {
  min-width: 0;
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: nowrap;
}

.filter {
  width: 100%;
  font-size: 12px;
  padding: 6px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  box-sizing: border-box;
}

/* SORT BUTTON */
.sort-btn {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #dbeafe;
  color: #1e3a8a;
}

.sort-btn:hover {
  background: #bfdbfe;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #f3f4f6;
  color: #374151;
  transition: 0.2s;
  opacity: 0.4;
}

.reset-btn:hover {
  background: #e5e7eb;
}

.reset-btn.active {
  background: #fbbf24;
  color: #111827;
  border-color: #f59e0b;
  opacity: 1;
}  
  
/* TABLE ROW */
tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

th {
  white-space: normal;
  overflow: hidden;
}
  
td {
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  border-right: 2px solid #f1f5f9;
}  

td:last-child {
  border-right: none;
}  

label {
  font-size: 12px;
  color: #374151;
  margin-top: 6px;
}

input, select, textarea {
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 8px;
  font-size: 13px;
}

textarea {
  min-height: 60px;
  resize: vertical;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">
    <button class="bck-btn" onclick="window.location.href='../tabelle.html'">←</button>
    Luoghi
    <button class="add-btn" onclick="window.location.href='luogo.html?new=1'">+</button>
  </div>
</div>

<table>
<colgroup>
  <col style="width: 30px;">
  <col style="width: 130px;">
  <col style="width: 150px;">
  <col style="width: 180px;">
  <col style="width: 60px;">
  <col style="width: 60px;">
  <col style="width: 160px;">
  <col style="width: 50px;">
</colgroup>

<thead>
<tr>

  <!-- ID -->
  <th>
    <div class="col-header">
      <div class="col-title" style="justify-content:center;">
        ID
      </div>
      <div class="col-tools" style="justify-content:center;">
        <button class="reset-btn" onclick="resetAll()">•</button>
      </div>
    </div>
  </th>

  <!-- COMUNE -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Comune
        <button class="sort-btn" data-field="comune" onclick="sort('comune')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('comune', this.value)">  
      </div>
    </div>
  </th>

  <!-- LOCATION -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Location
        <button class="sort-btn" data-field="location" onclick="sort('location')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('location', this.value)">
      </div>
    </div>
  </th>

  <!-- DESCRIZIONE -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Descrizione
        <button class="sort-btn" data-field="descrizione" onclick="sort('descrizione')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('descrizione', this.value)">
      </div>
    </div>
  </th>

  <!-- LAT -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Lat
        <button class="sort-btn" data-field="lat" onclick="sort('lat')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('lat', this.value)">
      </div>
    </div>
  </th>

  <!-- LNG -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Lng
        <button class="sort-btn" data-field="lng" onclick="sort('lng')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('lng', this.value)">
      </div>
    </div>
  </th>

  <!-- NOTE -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Note
        <button class="sort-btn" data-field="note" onclick="sort('note')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('note', this.value)">
      </div>
    </div>
  </th>

  <!-- CAPIENZA -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Capienza
        <button class="sort-btn" data-field="cap" onclick="sort('cap')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('cap', this.value)">
      </div>
    </div>
  </th>

</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];
let comuni = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc',
  dirty: false,
};

 const savedFilters = sessionStorage.getItem('luoghi_filters');
if (savedFilters) {
  state.filters = JSON.parse(savedFilters);
} 
  
let comuniMap = {};  
  
// ---------------- COMUNI ----------------
async function loadComuni() {
  const { data: rows, error } = await supabase.from('comuni').select('*');
  if (error) {
    console.error(error);
    return;
  }
    comuni = rows || [];
    comuniMap = Object.fromEntries(
    comuni.map(c => [c.id_comune, c.co_descrizione])
  );
}
  
// ---------------- LOAD ----------------
async function load() {
  const { data: rows, error } = await supabase.from('luoghi').select('*');
  if (error) {
    console.error(error);
    return;
  }
  data = rows || [];
    data.sort((a, b) =>
    (comuniMap[a.lu_comune] || '').localeCompare(
      comuniMap[b.lu_comune] || ''
    )
  );
  render()
}

// ---------------- RENDER ----------------
function render() {
  let filtered = [...data];
  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;
    filtered = filtered.filter(r => {
      if (k === 'comune') {
        return (comuniMap[r.lu_comune] || '').toLowerCase().includes(v);
      }
      if (k === 'location')
        return (r.lu_location || '').toLowerCase().includes(v);
      if (k === 'descrizione')
        return (r.lu_descrizione || '').toLowerCase().includes(v);
      if (k === 'lat')
        return (r.lu_lat || '').toString().startsWith(v);
      if (k === 'lng')
        return (r.lu_lng || '').toString().startsWith(v);
      if (k === 'note')
        return (r.lu_note || '').toLowerCase().includes(v);
      if (k === 'cap')
        return (r.lu_capienza || '').toString().startsWith(v);
      return true;
    });
  });

if (state.sortField) {
  const numericFields = ['cap', 'lat', 'lng'];
  filtered.sort((a, b) => {
    let va, vb;
    // 🟡 caso speciale: comune (label da mappa)
    if (state.sortField === 'comune') {
      va = comuniMap[a.lu_comune] || '';
      vb = comuniMap[b.lu_comune] || '';
    } 
    // 🔵 tutti gli altri campi
    else {
      if (state.sortField === 'cap') {
        va = a.lu_capienza;
        vb = b.lu_capienza;
      } else {
        va = a['lu_' + state.sortField];
        vb = b['lu_' + state.sortField];
      } 
    }
    // 🔥 NUMERI
    if (numericFields.includes(state.sortField)) {
      va = Number(va ?? 0);
      vb = Number(vb ?? 0);
      return state.sortDir === 'asc'
        ? va - vb
        : vb - va;
    }  
    va = (va ?? '').toString().toLowerCase();
    vb = (vb ?? '').toString().toLowerCase();
    return state.sortDir === 'asc'
      ? va.localeCompare(vb)
      : vb.localeCompare(va);
  });
}
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  document.querySelectorAll('.filter').forEach(input => {
  const key = input.getAttribute('oninput')?.match(/'(.*?)'/)?.[1];
  if (key && state.filters[key] !== undefined) {
    input.value = state.filters[key];
  }
});
  filtered.forEach(r => {
    const tr = document.createElement("tr");
    tr.onclick = () => {
      window.location.href = `luogo.html?id=${r.id_luogo}`;
    };
    tr.innerHTML = `
      <td>${r.id_luogo}</td>
      <td>${comuniMap[r.lu_comune] || ''}</td>
      <td>${r.lu_location || ''}</td>
      <td>${r.lu_descrizione || ''}</td>
      <td>${r.lu_lat}</td>
      <td>${r.lu_lng}</td>
      <td>${r.lu_note || ''}</td>
      <td>${r.lu_capienza || ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ---------------- FILTER ----------------
window.setFilter = (k,v) => {
  state.filters[k] = v;
  sessionStorage.setItem('luoghi_filters', JSON.stringify(state.filters));
  render();
  syncUI();
};

// ---------------- SORT ----------------
window.sort = (field) => {
  if (state.sortField !== field) {
    state.sortField = field;
    state.sortDir = 'asc';
  } else {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  }
  render();
  syncUI();
};

await loadComuni();
await load();
updateSortButtons();
updateResetButton();
  
function updateSortButtons() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const field = btn.dataset.field;
    if (field !== state.sortField) {
      btn.textContent = '↕';
      return;
    }
    btn.textContent =
      state.sortDir === 'asc'
        ? '▲'
        : '▼';
  });
}

function updateResetButton() {
  const hasFilters =
    Object.values(state.filters).some(v => v && v.length > 0);
  const hasSort = state.sortField !== null;
  const btn = document.querySelector('.reset-btn');
  if (!btn) return;
  btn.textContent = (hasFilters || hasSort) ? '↺' : '•';
  btn.classList.toggle('active', hasFilters || hasSort);
}
  
window.resetAll = () => {
  state.filters = {};
  state.sortField = null;
  state.sortDir = 'asc';
  sessionStorage.removeItem('luoghi_filters');
  document.querySelectorAll('.filter').forEach(i => i.value = '');
  render();
  syncUI();
};

function syncUI() {
  updateSortButtons();
  updateResetButton();
}  

</script>
</body>
</html>
