<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Luoghi Admin</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  display: flex;
  gap: 10px;
  align-items: center;
}

.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
  overflow: hidden;
}

/* FILTER + SORT ROW */
.col-header {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  font-weight: bold;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  white-space: nowrap;
}

/* input + sort inline */
.col-tools {
  display: flex;
  gap: 4px;
  align-items: center;
}

.filter {
  flex: 1;
  font-size: 12px;
  padding: 4px;
}

/* SORT BUTTON */
.sort-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #dbeafe;
  color: #1e3a8a;
}

.sort-btn:hover {
  background: #bfdbfe;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #fee2e2;
  color: #991b1b;
}

.reset-btn:hover {
  background: #fecaca;
}

.reset-btn.active {
  background: #ef4444;
  color: white;
}  
  
/* TABLE ROW */
tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

th {
  white-space: normal;
  overflow: hidden;
}
  
td {overflow: hidden; white-space: nowrap; text-overflow: ellipsis;}  

label {
  font-size: 12px;
  color: #374151;
  margin-top: 6px;
}

input, select, textarea {
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 8px;
  font-size: 13px;
}

textarea {
  min-height: 60px;
  resize: vertical;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">
    Luoghi
    <button class="add-btn" onclick="openModal()">+</button>
  </div>
</div>

<table>
<colgroup>
  <col style="width: 30px;">
  <col style="width: 140px;">
  <col style="width: 140px;">
  <col style="width: 180px;">
  <col style="width: 80px;">
  <col style="width: 80px;">
  <col style="width: 160px;">
  <col style="width: 70px;">
</colgroup>

<thead>

<tr>
  <th>
    <div class="col-header">
      <div class="col-title">
        ID
        <button class="reset-btn" onclick="resetAll()">↕</button>
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Comune:
        <button class="sort-btn" data-field="comune" onclick="sort('comune')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('comune', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Location:
        <button class="sort-btn" data-field="location" onclick="sort('location')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('location', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Descrizione:
        <button class="sort-btn" data-field="descrizione" onclick="sort('descrizione')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('descrizione', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Lat:
        <button class="sort-btn" data-field="lat" onclick="sort('lat')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('lat', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Lng:
        <button class="sort-btn" data-field="lng" onclick="sort('lng')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('lng', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Note:
        <button class="sort-btn" data-field="note" onclick="sort('note')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('note', this.value)">
      </div>
    </div>
  </th>

  <th>
    <div class="col-header">
      <div class="col-title">
        Capacità:
        <button class="sort-btn" data-field="cap" onclick="sort('cap')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('cap', this.value)">
      </div>
    </div>
  </th>

</tr>

</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];
let comuni = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc',
  dirty: false,
};

let originalData = null;
  
// ---------------- COMUNI ----------------
async function loadComuni() {
  const res = await supabase.from('comuni').select('*');
  comuni = res.data;
}
  
// ---------------- LOAD ----------------
async function load() {
  const res = await supabase.from('luoghi').select('*');
  data = res.data;
  data.sort((a, b) => {
    const ca = comuni.find(x => x.id_comune === a.lu_comune)?.co_descrizione || '';
    const cb = comuni.find(x => x.id_comune === b.lu_comune)?.co_descrizione || '';
    return ca.localeCompare(cb);
  });
  render();
}

// ---------------- RENDER ----------------
function render() {
  let filtered = [...data];
  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;
    filtered = filtered.filter(r => {
      if (k === 'comune') {
        const c = comuni.find(x => x.id_comune === r.lu_comune);
        return (c?.co_descrizione || '').toLowerCase().includes(v);
      }
      if (k === 'location')
        return (r.lu_location || '').toLowerCase().includes(v);
      if (k === 'descrizione')
        return (r.lu_descrizione || '').toLowerCase().includes(v);
      if (k === 'lat')
        return (r.lu_lat || '').toString().startsWith(v);
      if (k === 'lng')
        return (r.lu_lng || '').toString().startsWith(v);
      if (k === 'note')
        return (r.lu_note || '').toLowerCase().includes(v);
      if (k === 'cap')
        return (r.lu_capacita_massima || '').toString().startsWith(v);
      return true;
    });
  });

  if (state.sortField) {
    filtered.sort((a, b) => {
      let va = a['lu_' + state.sortField];
      let vb = b['lu_' + state.sortField];
      va = (va ?? '').toString().toLowerCase();
      vb = (vb ?? '').toString().toLowerCase();
      if (state.sortDir === 'asc') return va.localeCompare(vb);
      return vb.localeCompare(va);
    });
  }

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  filtered.forEach(r => {
    const c = comuni.find(x => x.id_comune === r.lu_comune);
    const tr = document.createElement("tr");
    tr.onclick = () => open("luogo.html?id=" + r.id_luogo, "_self");
    // tr.onclick = () => openModal(r);
    tr.innerHTML = `
      <td>${r.id_luogo}</td>
      <td>${c ? c.co_descrizione : ''}</td>
      <td>${r.lu_location || ''}</td>
      <td>${r.lu_descrizione || ''}</td>
      <td>${r.lu_lat}</td>
      <td>${r.lu_lng}</td>
      <td>${r.lu_note || ''}</td>
      <td>${r.lu_capacita_massima || ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ---------------- FILTER ----------------
window.setFilter = (k,v) => {
  state.filters[k] = v;
  render();
  syncUI();
};

// ---------------- SORT ----------------
window.sort = (field) => {
  if (state.sortField !== field) {
    state.sortField = field;
    state.sortDir = 'asc';
  } else {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  }
  render();
  syncUI();
};

await loadComuni();
await load();
updateSortButtons();
updateResetButton();
  
function updateSortButtons() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const field = btn.dataset.field;
    if (field !== state.sortField) {
      btn.textContent = '-';
      return;
    }
    btn.textContent =
      state.sortDir === 'asc'
        ? '▼'
        : '▲';
  });
}

function updateResetButton() {
  const hasFilters =
    Object.values(state.filters).some(v => v && v.length > 0);
  const hasSort = state.sortField !== null;
  const btn = document.querySelector('.reset-btn');
  if (!btn) return;
  btn.textContent = (hasFilters || hasSort) ? '✕' : '↕';
  btn.classList.toggle('active', hasFilters || hasSort);
}
  
window.resetAll = () => {
  state.filters = {};
  state.sortField = null;
  state.sortDir = 'asc';
  document.querySelectorAll('.filter').forEach(i => i.value = '');
  render();
  syncUI();
};

function syncUI() {
  updateSortButtons();
  updateResetButton();
}  

</script>
</body>
</html>
