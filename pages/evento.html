<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evento</title>

<link rel="stylesheet"href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  font-weight: bold;
}

.back-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.back-btn.dirty {
  background: #fbbf24;
  color: #111827;
}

.back-btn:hover {
  background: #d1d5db;
}

.map-btn {
  width: 60px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: #dbeafe;
  color: #1e3a8a;
  font-size: 12px;
  cursor: pointer;
}  

/* HERO */
.hero {
  margin: 10px 15px 8px;
  padding: 12px;
  background: white;
  border-radius: 12px;
}

.hero input {
  width: 100%;
  font-size: 20px;
  font-weight: bold;
  border: none;
  text-align: center;
  background: transparent;
}

/* CARD */
.card {
  background: white;
  margin: 0 15px 20px;
  padding: 15px;
  border-radius: 12px;
}

/* LABEL */
.section-title {
  font-size: 11px;
  color: #777;
  margin: 12px 0 4px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 16px;
}

/* INLINE */
.inline {
  display: flex;
  gap: 25px;
  align-items: center;
  margin-top: 15px;
}

/* FOOTER */
.footer {
  text-align: right;
  font-size: 11px;
  color: #888;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="topbar" style="justify-content:center; padding:16px 20px;">
  <div style="display:flex; align-items:center; gap:20px;">
    <button id="backBtn" class="back-btn" onclick="requestBack()">←</button>
    <div>Evento</div>
  </div>
  <button onclick="duplicateEvent()" style="
    width:34px;
    height:34px;
    border-radius:17px;
    border:none;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-left:20px;
  ">⧉</button>
</div>

<!-- TITOLO -->
<div class="hero">
  <input id="ev_titolo" oninput="markDirty()">
</div>

<div class="card">

  <!-- CATEGORIA -->
  <div class="section-title">Categoria</div>
  <select id="ev_categoria" oninput="markDirty()"></select>

  <!-- DESCRIZIONE -->
  <div class="section-title">Descrizione</div>
  <textarea id="ev_descrizione" oninput="markDirty()"></textarea>
  
  <!-- COMUNE -->
  <div class="section-title">Comune</div>
  <select id="id_comune_evento" oninput="markDirty(); filterLuoghi();"></select>

  <!-- LUOGO -->
  <div class="section-title">Luogo</div>
  <div style="display:flex; gap:10px; align-items:center;">
  <select id="id_luogo" oninput="markDirty()" style="flex:1;"></select>
  <button type="button" class="map-btn" onclick="openMapByComune()">Map</button>    
  <button type="button" onclick="window.location.href='luogo.html?new=1'" style="
    width:34px;
    height:34px;
    border-radius:17px;
    border:none;
    background:#22c55e;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
  ">+</button>
</div>
  
  <!-- ORGANIZZATORE -->
  <div class="section-title">Organizzatore</div>
  <div style="display:flex; gap:10px; align-items:center;">
  <select id="id_organizzatore" oninput="markDirty()" style="flex:1;"></select>
  <button type="button" onclick="window.location.href='organizzatore.html?new=1'" style="
    width:34px;
    height:34px;
    border-radius:17px;
    border:none;
    background:#22c55e;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
  ">+</button>
</div>
  
<div class="inline">
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Inizio</div>
    <input id="ev_inizio" type="datetime-local" oninput="markDirty()">
  </div>
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Fine</div>
    <input id="ev_fine" type="datetime-local" oninput="markDirty()">
  </div>
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Costo</div>
    <input id="ev_costo" oninput="markDirty()">
  </div>
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Capienza</div>
    <input id="ev_capienza" oninput="markDirty()">
  </div>
</div>
    <!-- ATTIVO -->
  <div class="section-title">Attivo</div>
  <label style="display:flex; align-items:center; gap:10px;">
    <input id="ev_attivo" type="checkbox" oninput="markDirty()" style="width:auto;">
    Attivo
  </label>
  
  <!-- LINK -->
  <div class="section-title">Link</div>
  <input id="ev_link" oninput="markDirty()">

  <!-- COPERTINA -->
  <div class="section-title">Copertina</div>
  <input id="ev_copertina" oninput="markDirty(); updateCover()">

  <img id="coverPreview" style="width:200px; height:200px; object-fit:contain; border-radius:8px; margin-top:8px; display:none; background:#f3f4f6; margin-inline:auto;" />

  <!-- MAP POPUP -->
<div id="mapModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:9999;
">
  <div style="
    position:absolute;
    top:5%;
    left:5%;
    width:90%;
    height:90%;
    background:white;
    border-radius:12px;
    overflow:hidden;
  ">
    <div style="padding:10px; display:flex; justify-content:space-between;">
      <div style="font-weight:bold;">Seleziona luogo</div>
      <button onclick="closeMap()" style="border:none;background:#ef4444;color:white;width:30px;height:30px;border-radius:15px;">✕</button>
    </div>
    <div id="map" style="height:calc(100% - 50px);"></div>
  </div>
</div>
  
  <!-- FOOTER -->
  <div class="footer" id="ev_creato"></div>

<!-- SI - NO - ANNULLA -->
<div id="saveDialog" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:99999;
  align-items:center;
  justify-content:center;
">
  <div style="
    background:white;
    padding:22px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
  ">
    <div style="margin-bottom:18px; font-weight:600;">
      Vuoi salvare le modifiche?
    </div>

    <div style="display:flex; gap:10px; justify-content:center;">

      <button onclick="dialogAction('yes')" style="
        flex:1;
        background:#22c55e;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Sì</button>

      <button onclick="dialogAction('no')" style="
        flex:1;
        background:#ef4444;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">No</button>

      <button onclick="dialogAction('cancel')" style="
        flex:1;
        background:#9ca3af;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Annulla</button>

    </div>
  </div>
</div>
</div>

<script type="module">
import { supabase } from '../supabase.js';

const params = new URLSearchParams(location.search);
const id = params.get('id');
const isNew = params.has('new') || !id;

let original = "{}";
let dirty = false;
// CANCELLARE ***** let luoghiMap = {};
let comuniMap = {};
let luoghi = [];
let map;
let markers = [];
let dialogResolve;
  
/* LOAD SELECTS */
async function loadSelects() {
  const { data: cat } = await supabase.from('macrocategorie').select('*');
  ev_categoria.innerHTML = `<option value="">-- categoria --</option>`;
  (cat || []).forEach(c => {
    ev_categoria.innerHTML += `<option value="${c.id_macro_categoria}">${c.mc_descrizione}</option>`;
  });
const { data: luoghiData } = await supabase.from('luoghi').select('*');
luoghi = luoghiData || [];
id_comune_evento.innerHTML = `<option value="">-- comune --</option>`;
/* comuni unici derivati dai luoghi */
const comuniUnici = [...new Set(luoghi.map(l => l.id_comune))]
  .sort((a, b) =>
    (comuniMap[a] || '').localeCompare(comuniMap[b] || '')
  );
comuniUnici.forEach(idc => {
  id_comune_evento.innerHTML += `
    <option value="${idc}">
      ${comuniMap[idc] || ''}
    </option>
  `;
});
const { data: org } = await supabase.from('organizzatori').select('*');
  id_organizzatore.innerHTML = `<option value="">-- organizzatore --</option>`;
(org || [])
  .sort((a, b) =>
    (a.or_nome || '').localeCompare(b.or_nome || '')
  )
  .forEach(o => {
    id_organizzatore.innerHTML += `
      <option value="${o.id_organizzatore}">${o.or_nome}</option>
    `;
  });
enableTypeSearch(id_comune_evento);
enableTypeSearch(id_luogo);
enableTypeSearch(id_organizzatore);  
}

/* LOAD */
async function load() {
  if (isNew) {
    original = JSON.stringify({});
    return;
  }
  const { data, error } = await supabase
    .from('eventi')
    .select('*')
    .eq('id_evento', id)
    .single();
  if (error) {
    console.error(error);
    return;
  }
  original = JSON.stringify(data);
  ev_titolo.value = data.ev_titolo || '';
  ev_descrizione.value = data.ev_descrizione || '';
  ev_categoria.value = data.ev_categoria || '';
  const luogo = luoghi.find(l => l.id_luogo == data.id_luogo);
  if (luogo) {
    id_comune_evento.value = luogo.id_comune;
    filterLuoghi();
    id_luogo.value = data.id_luogo || '';
  }
  // CANCELLARE  ***** const comuneId = luoghiMap[data.id_luogo];
  id_organizzatore.value = data.id_organizzatore || '';
  ev_inizio.value = data.ev_inizio ? data.ev_inizio.replace(' ', 'T') : '';
  ev_fine.value = data.ev_fine ? data.ev_fine.replace(' ', 'T') : '';
  ev_costo.value = data.ev_costo || '';
  ev_capienza.value = data.ev_capienza || '';
  ev_link.value = data.ev_link || '';
  ev_copertina.value = data.ev_copertina || '';
  ev_attivo.checked = !!data.ev_attivo;
  ev_creato.textContent = data.ev_creato
    ? new Date(data.ev_creato).toLocaleString()
    : '';
updateCover();
}

async function loadComuni() {
  const { data } = await supabase.from('comuni').select('*');
  (data || []).forEach(c => {
    comuniMap[c.id_comune] = c.co_descrizione;
  });
}

window.filterLuoghi = () => {
  id_luogo.value = "";
  const idComune = id_comune_evento.value;
  id_luogo.innerHTML = `<option value="">-- luogo --</option>`;
  luoghi
    .filter(l => l.id_comune == idComune)
    .sort((a, b) =>
      (a.lu_location || '').localeCompare(b.lu_location || '')
    )
    .forEach(l => {
      id_luogo.innerHTML += `
        <option value="${l.id_luogo}">${l.lu_location}</option>
      `;
  });
};

  
/* DIRTY */
window.markDirty = () => {
  const current = JSON.stringify({
    ev_titolo: ev_titolo.value,
    ev_descrizione: ev_descrizione.value,
    ev_categoria: ev_categoria.value,
    id_luogo: id_luogo.value,
    id_organizzatore: id_organizzatore.value,
    ev_inizio: ev_inizio.value,
    ev_fine: ev_fine.value,
    ev_costo: ev_costo.value,
    ev_capienza: ev_capienza.value,
    ev_link: ev_link.value,
    ev_copertina: ev_copertina.value,
    ev_attivo: ev_attivo.checked
  });
  dirty = current !== original;
  document.getElementById('backBtn')
    .classList.toggle('dirty', dirty);
};

window.duplicateEvent = async () => {
  if (!id) return;
  const { data, error } = await supabase
    .from('eventi')
    .select('*')
    .eq('id_evento', id)
    .single();
  if (error) {
    console.error(error);
    return;
  }
  const payload = {
    ev_titolo: data.ev_titolo,
    ev_descrizione: data.ev_descrizione,
    ev_categoria: data.ev_categoria,
    id_luogo: data.id_luogo,
    id_organizzatore: data.id_organizzatore,
    ev_inizio: data.ev_inizio,
    ev_fine: data.ev_fine,
    ev_costo: data.ev_costo,
    ev_capienza: data.ev_capienza,
    ev_link: data.ev_link,
    ev_copertina: data.ev_copertina,
    ev_attivo: data.ev_attivo
  };
  const result = await supabase
    .from('eventi')
    .insert(payload)
    .select()
    .single();
  const { data: newRow, error: err2 } = result;
  if (err2) {
    console.error(err2);
    return;
  }
  // redirect a pagina eventi
    location.href = `eventi.html`;
};
  
/* SAVE */
async function save() {
  const payload = {
    ev_titolo: ev_titolo.value,
    ev_descrizione: ev_descrizione.value,
    ev_categoria: ev_categoria.value,
    id_luogo: id_luogo.value,
    id_organizzatore: id_organizzatore.value,
    ev_inizio: ev_inizio.value ? ev_inizio.value.replace('T',' ') : null,
    ev_fine: ev_fine.value ? ev_fine.value.replace('T',' ') : null,
    ev_costo: ev_costo.value ? parseFloat(ev_costo.value) : null,
    ev_capienza: ev_capienza.value ? parseInt(ev_capienza.value) : null,
    ev_link: ev_link.value,
    ev_copertina: ev_copertina.value,
    ev_attivo: ev_attivo.checked
  };
  let result;
  if (isNew) {
    result = await supabase.from('eventi').insert(payload).select().single();
  } else {
    result = await supabase.from('eventi').update(payload).eq('id_evento', id).select().single();
  }
  const { data, error } = result;
  if (error) {
    console.error(error);
    alert("Errore salvataggio");
    return false;
  }
  dirty = false;
  if (isNew) {
    location.href = `evento.html?id=${data.id_evento}`;
  }
  return true;
}

/* BACK */
window.requestBack = async () => {
  if (!dirty) {
    location.href = 'eventi.html';
    return;
  }
  const choice = await askSaveDialog();
  if (choice === "cancel") return;
  if (choice === "yes") {
    const success = await save();
    if (!success) return;
    location.href = 'eventi.html';
    return;
  }
  if (choice === "no") {
    location.href = 'eventi.html';
  }
};
  
function updateCover() {
  const url = ev_copertina.value;
  const img = document.getElementById('coverPreview');
  if (url) {
    img.src = url;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }
}  

function enableTypeSearch(select) {
  let buffer = "";
  let timer = null;
  select.addEventListener("keydown", (e) => {
    if (e.key.length !== 1) return;
    buffer += e.key.toLowerCase();
    clearTimeout(timer);
    timer = setTimeout(() => buffer = "", 800);
    const options = Array.from(select.options);
    const match = options.find(o =>
      o.text.toLowerCase().startsWith(buffer)
    );
    if (match) {
      select.value = match.value;
      markDirty();
    }
  });
}

function initMap() {
  if (map) return;
  map = L.map('map').setView([38.1, 13.3], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: ''
  }).addTo(map);
  map.on("click", (e) => {
  const { lat, lng } = e.latlng;
  const ok = confirm("Vuoi aggiungere un nuovo luogo qui?");
  if (!ok) return;
  openNewLuogoFromMap(lat, lng);
});
}

window.openMapByComune = async () => {
  const idComune = id_comune_evento.value;
  if (!idComune) return;
  document.getElementById("mapModal").style.display = "block";
  await loadMapLuoghi(idComune);
  // fondamentale per Leaflet dentro modale
  setTimeout(() => {
    map.invalidateSize();
  }, 200);
};

async function loadMapLuoghi(idComune) {
  initMap();
  const { data } = await supabase
    .from("luoghi")
    .select("*")
    .eq("id_comune", idComune);
  renderMarkers(data || []);
}

function renderMarkers(luoghiList) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const valid = luoghiList.filter(l => l.lu_lat && l.lu_lng);
  if (!valid.length) {
    map.setView([38.1, 13.3], 10);
    return;
  }
  const bounds = [];
  valid.forEach(l => {
    const marker = L.marker([l.lu_lat, l.lu_lng]).addTo(map);
    marker.bindTooltip(
      l.lu_descrizione
        ? `${l.lu_location}<br><small>${l.lu_descrizione}</small>`
        : l.lu_location,
      { direction: "top", sticky: true }
    );
    marker.on("click", () => {
      id_luogo.value = l.id_luogo;
      markDirty();
      closeMap();
    });
    markers.push(marker);
    bounds.push([l.lu_lat, l.lu_lng]);
  });
  map.fitBounds(bounds, { padding: [30, 30] });
}

window.closeMap = () => {
  document.getElementById("mapModal").style.display = "none";
};

function openNewLuogoFromMap(lat, lng) {
  const comune = id_comune_evento.value;
  const url = `luogo.html?new=1&lat=${lat}&lng=${lng}&comune=${comune}`;
  window.location.href = url;
}

function askSaveDialog() {
  document.getElementById("saveDialog").style.display = "flex";

  return new Promise(resolve => {
    dialogResolve = resolve;
  });
}

function dialogAction(type) {
  document.getElementById("saveDialog").style.display = "none";
  dialogResolve(type);
}

window.dialogAction = dialogAction;
  
await loadComuni();  
await loadSelects();
await load();

</script>
</body>
</html>
