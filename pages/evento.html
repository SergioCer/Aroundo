<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evento</title>

<link rel="stylesheet"href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  font-weight: bold;
}

.back-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.back-btn.dirty {
  background: #fbbf24;
  color: #111827;
}

.back-btn:hover {
  background: #d1d5db;
}

.map-btn {
  width: 60px;
  min-width: 60px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: #dbeafe;
  color: #1e3a8a;
  font-size: 12px;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.8);
  transition: all 0.25s ease;
}

.map-btn.visible {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1);
  animation: bounceIn 0.35s ease;
}

@keyframes bounceIn {
  0%   { transform: scale(0.7); }
  60%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* HERO */
.hero {
  margin: 10px 15px 8px;
  padding: 12px;
  background: white;
  border-radius: 12px;
}

.hero input {
  width: 100%;
  font-size: 20px;
  font-weight: bold;
  border: none;
  text-align: center;
  background: transparent;
}

/* CARD */
.card {
  background: white;
  margin: 0 15px 20px;
  padding: 15px;
  border-radius: 12px;
}

/* LABEL */
.section-title {
  font-size: 11px;
  color: #777;
  margin: 12px 0 4px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 16px;
}

/* INLINE */
.inline {
  display: flex;
  gap: 25px;
  align-items: center;
  margin-top: 15px;
}

/* FOOTER */
.footer {
  text-align: right;
  font-size: 11px;
  color: #888;
  margin-top: 15px;
}

.search-option {
  padding: 6px 10px;
  border-bottom: 1px solid #eee;
}

</style>
</head>

<body>

<div class="topbar" style="justify-content:center; padding:16px 20px;">
  <div style="display:flex; align-items:center; gap:20px;">
    <button id="backBtn" class="back-btn" onclick="requestBack()">←</button>
    <div style="font-size:30px;">Event</div>
  </div>
  <button id="btnDuplicate" onclick="duplicateEvent()" title="Duplica Evento" style="
    width:34px;
    height:34px;
    border-radius:17px;
    border:none;
    background:#3b82f6;
    color:white;
    font-size:20px;
    cursor:pointer;
    margin-left:20px;
  ">⧉</button>
</div>

<!-- TITOLO -->
<div class="hero">
  <input id="ev_titolo" oninput="markDirty()">
</div>

<div class="card">

  <!-- CATEGORIA -->
  <div class="section-title">Category</div>
  <select id="id_categoria" oninput="markDirty()"></select>

  <!-- DESCRIZIONE -->
  <div class="section-title">Description</div>
  <textarea id="ev_descrizione" rows="4" oninput="markDirty()"></textarea>
  
  <!-- COMUNE -->
  <div class="section-title">Comune</div>
  <input id="id_comune_evento" placeholder="Comune..." oninput="searchComuni(this.value)">
  <input type="hidden" id="id_comune_evento_hidden">
  <div style="font-size:11px;color:#888;margin-top:4px;">
  Inserire almeno 3 caratteri per la ricerca
</div>
<div id="comuniResults"></div>

  <!-- LUOGO -->
  <div class="section-title">Place</div>
  <div style="display:flex; gap:10px; align-items:center;">
  <select id="id_luogo" oninput="markDirty()" style="flex:1;"></select>
    
    <div style="position:relative; display:inline-block;">
      <button type="button" class="map-btn" onclick="openMapByComune()" id="mapBtn">
        Map
      </button>
   </div>
    
    <button type="button" onclick="window.location.href='luogo.html?new=1'" style="
    width:34px;
    height:34px;
    border-radius:17px;
    border:none;
    background:#22c55e;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
  ">+</button>
</div>
  
  <!-- ORGANIZZATORE -->
  <div class="section-title">Organizzatore</div>
  <div style="display:flex; gap:10px; align-items:center;">
  <input id="id_organizzatore" placeholder="Organizzatore...(min 3 chars to search)" oninput="searchOrganizzatori(this.value)" style="flex:1;">
    
    <input type="hidden" id="id_organizzatore_hidden">
    
  <button type="button" onclick="window.location.href='organizzatore.html?new=1'" style="
    width:34px;
    height:34px;
    border-radius:17px;
    border:none;
    background:#22c55e;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
  ">+</button>
</div>
<div id="organizzatoriResults"></div>
  
<div class="inline">
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Start</div>
    <input id="ev_inizio" type="datetime-local" oninput="aggiornaFineDaInizio(); markDirty()">
  </div>
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">End</div>
    <input id="ev_fine" type="datetime-local" oninput="markDirty(); calcolaDurata()">
  </div>
    <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Durata</div>
    <input id="ev_durata" readonly>
  </div>
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Price — null = TBA · 0 = Free</div>
    <input id="ev_costo" oninput="markDirty()">
  </div>
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Capacity</div>
    <input id="ev_capienza" oninput="markDirty()">
  </div>
</div>
<div class="inline">

  <!-- ATTIVO -->
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Active</div>
    <label style="display:flex; align-items:center; gap:10px;">
      <input id="ev_attivo" type="checkbox" oninput="markDirty()" style="width:auto;">
      Attivo
    </label>
  </div>

  <!-- SERIE -->
  <div style="flex:1;">
    <div class="section-title" style="margin-top:0;">Event Series</div>
    <select id="id_event_series" oninput="markDirty()" disabled>
      <option value="">Nessuna serie</option>
    </select>
  </div>
</div>
  
  <!-- LINK -->
  <div class="section-title">Link</div>
  <input id="ev_link" oninput="markDirty()">

  <!-- COPERTINA -->
  <div class="section-title">Copertina</div>
  <input id="ev_copertina" oninput="markDirty(); updateCover()">

  <img id="coverPreview" style="width:200px; height:200px; object-fit:contain; border-radius:8px; margin-top:8px; display:none; background:#f3f4f6; margin-inline:auto;" />

  <!-- MAP POPUP -->
<div id="mapModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:9999;
">
  <div style="
    position:absolute;
    top:5%;
    left:5%;
    width:90%;
    height:90%;
    background:white;
    border-radius:12px;
    overflow:hidden;
  ">
    <div style="padding:10px; display:flex; justify-content:space-between;">
      <div style="font-weight:bold;">Seleziona luogo</div>
      <button onclick="closeMap()" style="border:none;background:#ef4444;color:white;width:30px;height:30px;border-radius:15px;">✕</button>
    </div>
    <div id="map" style="height:calc(100% - 50px);"></div>
  </div>
</div>
  
  <!-- FOOTER -->
  <div class="footer" id="ev_creato"></div>

<!-- SI - NO - ANNULLA -->
<div id="saveDialog" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:99999;
  align-items:center;
  justify-content:center;
">
  <div style="
    background:white;
    padding:22px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
  ">
    <div style="margin-bottom:18px; font-weight:600;">
      Vuoi salvare le modifiche?
    </div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button onclick="dialogAction('yes')" style="
        flex:1;
        background:#22c55e;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Sì</button>
      <button onclick="dialogAction('no')" style="
        flex:1;
        background:#ef4444;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">No</button>
      <button onclick="dialogAction('cancel')" style="
        flex:1;
        background:#9ca3af;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Annulla</button>
    </div>
  </div>
</div>

<div id="warningDialog" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:99999;
  align-items:center;
  justify-content:center;
">
  <div style="
    background:white;
    padding:22px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
  ">
    <div id="warningMessage" style="
      margin-bottom:18px;
      font-weight:600;
    ">
    </div>
    <button onclick="closeWarning()" style="
      width:100%;
      background:#9ca3af;
      color:white;
      border:none;
      padding:10px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    ">
      Annulla
    </button>
  </div>
</div>  

<script type="module">
import { supabase } from '../supabase.js';

const params = new URLSearchParams(location.search);
const id = params.get('id');
const isNew = params.has('new') || !id;

let original = "{}";
let dirty = false;
let comuniMap = {};
let map;
let markers = [];
let dialogResolve;
let seriesCache = [];  

const defaultIcon = L.icon({
  iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});

const selectedIcon = L.icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});  
  
/* LOAD SELECTS */
async function loadSelects() {
  const { data: cat } = await supabase
  .from('categorie')
  .select('*')
  .order('mc_ordine', { ascending: true });
  id_categoria.innerHTML = `<option value="">Categoria...</option>`;
  (cat || []).forEach(c => {
    id_categoria.innerHTML += `<option value="${c.id_categoria}">${c.mc_descrizione}</option>`;
  });
  id_luogo.innerHTML = `<option value="">Place...</option>`;
  const { data: org } = await supabase.from('organizzatori').select('*');
  id_organizzatore.innerHTML = `<option value="">Organizzatore...</option>`;
  (org || [])
  .sort((a, b) =>
    (a.or_nome || '').localeCompare(b.or_nome || '')
  )
  .forEach(o => {
    id_organizzatore.innerHTML += `
      <option value="${o.id_organizzatore}">${o.or_nome}</option>
    `;
  });
}

async function loadSeriesByOrganizzatore(idOrg) {
  const select = document.getElementById("id_event_series");
  if (!idOrg) {
    select.innerHTML = `<option value="">Nessuna serie</option>`;
    select.disabled = true;
    return;
  }
  const { data, error } = await supabase
    .from("event_series")
    .select("id_event_series, es_title")
    .eq("id_organizzatore", idOrg)
    .order("es_title");
  if (error) {
    console.error("STEP SERIES - errore:", error);
    return;
  }
  seriesCache = data || [];
  select.innerHTML = `<option value="">Nessuna serie</option>`;
  (data || []).forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.id_event_series;
    opt.textContent = s.es_title;
    select.appendChild(opt);
  });
  select.disabled = false;
}  

/* LOAD */
async function load() {
  if (isNew) {
    original = JSON.stringify({});
    return;
  }
  const { data, error } = await supabase
    .from('eventi')
    .select('*')
    .eq('id_evento', id)
    .single();
  if (error) {
    console.error(error);
    return;
  }
  original = JSON.stringify(data);
  ev_titolo.value = data.ev_titolo || '';
  ev_descrizione.value = data.ev_descrizione || '';
  id_categoria.value = data.id_categoria || '';
  id_organizzatore_hidden.value = data.id_organizzatore || '';
  if (data.id_luogo) {
  const { data: luogo } = await supabase
    .from('luoghi')
    .select('id_comune')
    .eq('id_luogo', data.id_luogo)
    .single();
  if (luogo) {
    id_comune_evento_hidden.value = luogo.id_comune;
    id_comune_evento.value =
      comuniMap[luogo.id_comune] || '';
    await filterLuoghi(data.id_luogo);
  }
}
  // opzionale: mostra nome se vuoi
  const org = await supabase
    .from('organizzatori')
    .select('or_nome')
    .eq('id_organizzatore', data.id_organizzatore)
    .single();
  if (org.data) {
    id_organizzatore.value = org.data.or_nome;
  }
  ev_inizio.value = data.ev_inizio ? data.ev_inizio.replace(' ', 'T') : '';
  ev_fine.value = data.ev_fine ? data.ev_fine.replace(' ', 'T') : '';
  calcolaDurata()
  // ev_costo.value = data.ev_costo || ''; // non esponeva Zero e Null ( vedi sotto )
  ev_costo.value = data.ev_costo === null ? 'TBA' : data.ev_costo;
  ev_capienza.value = data.ev_capienza || '';
  ev_link.value = data.ev_link || '';
  ev_copertina.value = data.ev_copertina || '';
  ev_attivo.checked = !!data.ev_attivo;
  ev_creato.textContent = data.ev_creato
    ? new Date(data.ev_creato).toLocaleString()
    : '';
    if (data.id_organizzatore) {
      await loadSeriesByOrganizzatore(data.id_organizzatore);
      if (data.id_event_series) {
        document.getElementById("id_event_series").value = data.id_event_series;
      }
    }
  updateCover();
  updateMapButton()  
  updateDupButton()
}

async function loadComuni() {
  const { data } = await supabase.from('comuni').select('*');
  (data || []).forEach(c => {
    comuniMap[c.id_comune] = c.co_descrizione;
  });
}

window.filterLuoghi = async (selectedId = null) => {
  const idComune = id_comune_evento_hidden.value;
  id_luogo.innerHTML = `<option value="">Luogo...</option>`;
  if (!idComune) return;
  const { data } = await supabase
    .from('luoghi')
    .select('id_luogo, lu_location')
    .eq('id_comune', idComune)
    .order('lu_location');
  (data || []).forEach(l => {
    id_luogo.innerHTML += `
      <option value="${l.id_luogo}">
        ${l.lu_location}
      </option>
    `;
  });
  if (selectedId) {
    id_luogo.value = selectedId;
  }
};
  
/* DIRTY */
window.markDirty = () => {
  const current = JSON.stringify({
    ev_titolo: ev_titolo.value,
    ev_descrizione: ev_descrizione.value,
    id_categoria: id_categoria.value,
    id_luogo: id_luogo.value,
    id_organizzatore: id_organizzatore.value,
    ev_inizio: ev_inizio.value,
    ev_fine: ev_fine.value,
    ev_costo: ev_costo.value,
    ev_capienza: ev_capienza.value,
    ev_link: ev_link.value,
    ev_copertina: ev_copertina.value,
    ev_attivo: ev_attivo.checked
  });
  dirty = current !== original;
  document.getElementById('backBtn')
    .classList.toggle('dirty', dirty);
};

window.duplicateEvent = async () => {
  if (!id) return;
  const { data, error } = await supabase
    .from('eventi')
    .select('*')
    .eq('id_evento', id)
    .single();
  if (error) {
    console.error(error);
    return;
  }
  const payload = {
    ev_titolo: data.ev_titolo,
    ev_descrizione: data.ev_descrizione,
    id_categoria: data.id_categoria,
    id_luogo: data.id_luogo,
    id_organizzatore: data.id_organizzatore,
    id_event_series: data.id_event_series,
    ev_inizio: data.ev_inizio,
    ev_fine: data.ev_fine,
    ev_costo: data.ev_costo,
    ev_capienza: data.ev_capienza,
    ev_link: data.ev_link,
    ev_copertina: data.ev_copertina,
    ev_attivo: data.ev_attivo
  };
  const result = await supabase
    .from('eventi')
    .insert(payload)
    .select()
    .single();
  const { data: newRow, error: err2 } = result;
  if (err2) {
    console.error(err2);
    return;
  }
  // redirect per modifica nuovo evento mantenendo la pagina
  location.href = `evento.html?id=${newRow.id_evento}`;
};

window.searchComuni = async (text) => {
  const box = document.getElementById('comuniResults');
  if (text.length < 3) {
    box.innerHTML = '';
    updateMapButton()
    return;
  }
  const { data } = await supabase
    .from('comuni')
    .select('id_comune, co_descrizione')
    .ilike('co_descrizione', text + '%')
    .limit(10);
  box.innerHTML = '';
  (data || []).forEach(c => {
    const div = document.createElement('div');
        div.style.padding = "6px 8px";
    div.style.borderBottom = "1px solid #eee";
    div.style.cursor = "pointer";
    div.innerText = c.co_descrizione;
    div.onclick = async () => {
        id_comune_evento.value = c.co_descrizione;
        id_comune_evento_hidden.value = c.id_comune;
      await filterLuoghi();
      markDirty();
      box.innerHTML = '';
      updateMapButton() 
    };
    box.appendChild(div);
  });
};

window.searchOrganizzatori = async (text) => {
  const box = document.getElementById('organizzatoriResults');
  if (text.length < 3) {
    box.innerHTML = '';
    return;
  }
  const { data } = await supabase
    .from('organizzatori')
    .select('id_organizzatore, or_nome')
    .ilike('or_nome', `%${text}%`)   // 🔥 CONTIENE (non inizia con)
    .limit(10);
  box.innerHTML = '';
  (data || []).forEach(o => {
    const div = document.createElement('div');
    div.style.padding = "6px 8px";
    div.style.borderBottom = "1px solid #eee";
    div.style.cursor = "pointer";
    div.innerText = o.or_nome;
    div.onclick = async () => {
    id_organizzatore.value = o.or_nome;
    id_organizzatore_hidden.value = o.id_organizzatore;
    markDirty();
    box.innerHTML = '';
    // 🔥 reset serie quando cambia organizzatore
    const seriesSelect = document.getElementById("id_event_series");
    seriesSelect.value = "";
    await loadSeriesByOrganizzatore(o.id_organizzatore);
  };
    box.appendChild(div);
  });
};

  
/* SAVE */
async function save() {
    const durata = parseInt(ev_durata.value);
      if (!isNaN(durata)) {
        if (durata < 3) {
          showWarning("Incoerenza di durata dell'evento");
          return false;
        }
        if (durata > 2160) {
          showWarning("Un singolo evento non dovrebbe durare più di 36 ore");
          return false;
        }
      }
  const payload = {
    ev_titolo: ev_titolo.value,
    ev_descrizione: ev_descrizione.value,
    id_categoria: id_categoria.value,
    id_luogo: id_luogo.value,
    id_organizzatore: id_organizzatore_hidden.value,
    id_event_series: document.getElementById("id_event_series").value || null,
    ev_inizio: ev_inizio.value ? ev_inizio.value.replace('T',' ') : null,
    ev_fine: ev_fine.value ? ev_fine.value.replace('T',' ') : null,
    ev_costo: ev_costo.value ? parseFloat(ev_costo.value) : null,
    ev_capienza: ev_capienza.value ? parseInt(ev_capienza.value) : null,
    ev_link: ev_link.value,
    ev_copertina: ev_copertina.value,
    ev_attivo: ev_attivo.checked
    };
  let result;
  if (isNew) {
    result = await supabase.from('eventi').insert(payload).select().single();
  } else {
    result = await supabase.from('eventi').update(payload).eq('id_evento', id).select().single();
  }
  const { data, error } = result;
  if (error) {
    console.error(error);
    alert("Errore salvataggio");
    return false;
  }
  dirty = false;
  if (isNew) {
    location.href = `evento.html?id=${data.id_evento}`;
  }
  return true;
}

/* BACK */
window.requestBack = async () => {
  if (!dirty) {
    location.href = 'eventi.html';
    return;
  }
  const choice = await askSaveDialog();
  if (choice === "cancel") return;
  if (choice === "yes") {
    const success = await save();
    if (!success) return;
    location.href = 'eventi.html';
    return;
  }
  if (choice === "no") {
    location.href = 'eventi.html';
  }
};
  
function updateCover() {
  const url = ev_copertina.value;
  const img = document.getElementById('coverPreview');

function initMap() {
  if (map) return;
  map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: ''
  }).addTo(map);
  map.on("click", (e) => {
  const { lat, lng } = e.latlng;
  const ok = confirm("Vuoi aggiungere un nuovo luogo qui?");
  if (!ok) return;
  openNewLuogoFromMap(lat, lng);
});
}

async function loadMapLuoghi(idComune) {
  initMap();
const { data: luoghiData } = await supabase
  .from("luoghi")
  .select("*")
  .eq("id_comune", idComune);
const luoghiList = luoghiData || [];
const { data: comuneData } = await supabase
  .from("comuni")
  .select("co_lat, co_lng")
  .eq("id_comune", idComune)
  .single();
renderMarkers(luoghiList, comuneData);
}

function renderMarkers(luoghiList, comune) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const valid = luoghiList.filter(l => l.lu_lat && l.lu_lng);
    if (!valid.length) {
      if (comune?.co_lat && comune?.co_lng) {
        map.setView([comune.co_lat, comune.co_lng], 13);
      } else {
        map.setView([38.1, 13.3], 9);
      }
      return;
    }
  const bounds = [];
  valid.forEach(l => {
    const isCurrent = l.id_luogo == id_luogo.value;
    const marker = L.marker([l.lu_lat, l.lu_lng],
    {icon: isCurrent ? selectedIcon : defaultIcon} ).addTo(map);
    marker.bindTooltip(
      l.lu_descrizione
        ? `${l.lu_location}<br><small>${l.lu_descrizione}</small>`
        : l.lu_location,
      { direction: "top", sticky: true }
    );
    marker.on("click", () => {
      id_luogo.value = l.id_luogo;
      markDirty();
      closeMap();
    });
    markers.push(marker);
    bounds.push([l.lu_lat, l.lu_lng]);
  });
  //CANCELLARE VECCHIO map.fitBounds(bounds, { padding: [30, 30] });  SOTTO IL NUOVO 
  // if (bounds.length) {
  map.fitBounds(bounds, { padding: [30, 30] }); // ***** VIVE *****
  // } else if (comune?.co_lat && comune?.co_lng) {
  // map.setView([comune.co_lat, comune.co_lng], 13);
// } else {
  // map.setView([38.1, 13.3], 9);
// }
}

// Elimina la T tra data ed ora e rimuove i secondi
function formatDateTime(dt) {
  if (!dt) return '';
  const [date, time] = dt.split('T');
  const hhmm = time ? time.slice(0, 5) : '';
  return `${date} ${hhmm}`;
}  

// Calcola durata dell'evento in minuti. 
window.calcolaDurata = function() {
  const inizio = document.getElementById('ev_inizio').value;
  const fine = document.getElementById('ev_fine').value;
  if (!inizio || !fine) {
    ev_durata.value = '';
    return;
  }
  const start = new Date(inizio);
  const end = new Date(fine);
  const minuti = Math.round((end - start) / 60000);
  ev_durata.value = minuti >= 0 ? minuti : '';
}  

// Calcola automaticamente la data fine evento aggiungendo 60 Minuti
window.aggiornaFineDaInizio = function() {
  const inizio = document.getElementById('ev_inizio').value;
  if (!inizio) return;
  const dataInizio = new Date(inizio);
  dataInizio.setMinutes(dataInizio.getMinutes() + 60);
  const anno = dataInizio.getFullYear();
  const mese = String(dataInizio.getMonth() + 1).padStart(2, '0');
  const giorno = String(dataInizio.getDate()).padStart(2, '0');
  const ore = String(dataInizio.getHours()).padStart(2, '0');
  const minuti = String(dataInizio.getMinutes()).padStart(2, '0');
  document.getElementById('ev_fine').value =
    `${anno}-${mese}-${giorno}T${ore}:${minuti}`;
calcolaDurata()
};
