<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Event Series Admin</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  padding: 10px;
}

.title {
  font-size: 24px;
  font-weight: bold;
  display: flex;
  gap: 20px;
  align-items: center;
}

.add-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

.add-btn:hover {
  background: #16a34a;
}  

.bck-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.bck-btn:hover {
  background: #d1d5db;
}  

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  overflow: hidden;
}

tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

td {
  white-space: nowrap;
  text-overflow: ellipsis;
  border-right: 2px solid #f1f5f9;
}

td:last-child {
  border-right: none;
}  
  
/* HEADER STRUCT */
.col-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 14px;
}

.col-tools {
  display: flex;
  gap: 4px;
}

.filter {
  width: 100%;
  font-size: 12px;
  padding: 6px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  box-sizing: border-box;
}

/* BUTTONS */
.sort-btn {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #dbeafe;
  color: #1e3a8a;
}

.sort-btn:hover {
  background: #bfdbfe;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  background: #f3f4f6;
  opacity: 0.5;
  cursor: pointer;
}

.reset-btn.active {
  background: #fbbf24;
  opacity: 1;
}

/* STATUS */
.status-ok { color: #22c55e; }
.status-no { color: #ef4444; }

.status-filter {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  background: #dbeafe;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">
    <button class="bck-btn" onclick="location.href='../tabelle.html'">←</button>
    Event Series
    <button class="add-btn" onclick="location.href='event_serie.html?new=1'">+</button>
  </div>
</div>

<table>

<colgroup>
  <col style="width: 30px;">
  <col style="width: 160px;">
  <col style="width: 140px;">
  <col style="width: 100px;">
  <col style="width: 100px;">
  <col style="width: 160px;">
  <col style="width: 30px;">
</colgroup>

<thead>
<tr>

  <!-- ID -->
  <th>
    <div class="col-header">
      <div class="col-title" style="justify-content:center;">
        ID
      </div>
      <div class="col-tools" style="justify-content:center;">
        <button class="reset-btn" onclick="resetAll()">•</button>
      </div>
    </div>
  </th>

  <!-- TITOLO -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Titolo
        <button class="sort-btn" onclick="sort('nome')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('nome',this.value)">
      </div>
    </div>
  </th>

  <!-- DESCRIZIONE -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Descrizione
        <button class="sort-btn" onclick="sort('descrizione')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('descrizione',this.value)">
      </div>
    </div>
  </th>

  <!-- Notes -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Notes
        <button class="sort-btn" onclick="sort('email')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('email',this.value)">
      </div>
    </div>
  </th>

</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

let data = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc',
  attivo: 'all'
};

const savedFilters = sessionStorage.getItem('event_series_filters');
if (savedFilters) {
  state.filters = JSON.parse(savedFilters);
}  

/* LOAD */
async function load() {
  const { data: rows } = await supabase
    .from('event_series')
    .select('*');
  data = rows || [];
  data.sort((a,b)=>
    new Date(b.es_created)-new Date(a.es_created)
  );
  render();
}

/* SORT */
window.sort = (field) => {
  if (state.sortField !== field) {
    state.sortField = field;
    state.sortDir = 'asc';
  } else {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  }
  render();
  syncUI();
};

/* FILTER */
window.setFilter = (k,v) => {
  state.filters[k] = v;
  sessionStorage.setItem('event_series_filters', JSON.stringify(state.filters));
  render();
  syncUI();
};

/* RESET */
window.resetAll = () => {
  state.filters = {};
  state.sortField = null;
  state.sortDir = 'asc';
  state.attivo = 'all';
  sessionStorage.removeItem('event_series_filters');
  document.querySelectorAll('.filter').forEach(i => i.value = '');
  render();
  syncUI();
};

/* STATUS FILTER */
window.toggleAttivo = () => {
  if (state.attivo === 'all') state.attivo = 'true';
  else if (state.attivo === 'true') state.attivo = 'false';
  else state.attivo = 'all';

  render();
  syncUI();
};

/* RENDER */
function render() {
  let filtered = [...data];
  if (state.attivo === 'true')
    filtered = filtered.filter(r => r.or_attivo === true);
  if (state.attivo === 'false')
    filtered = filtered.filter(r => r.or_attivo === false);
  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;
    filtered = filtered.filter(r => {
      if (k === 'nome') return (r.es_title||'').toLowerCase().includes(v);
      if (k === 'descrizione') return (r.es_description||'').toLowerCase().includes(v);
      if (k === 'note') return (r.es_notes||'').toLowerCase().includes(v);
      return true;
    });
  });
  if (state.sortField) {
    filtered.sort((a,b) => {
      let va = (a['or_' + state.sortField] || '').toLowerCase();
      let vb = (b['or_' + state.sortField] || '').toLowerCase();
      return state.sortDir === 'asc'
        ? va.localeCompare(vb)
        : vb.localeCompare(va);
    });
  }
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  document.querySelectorAll('.filter').forEach(input => {
  const key = input.getAttribute('oninput')?.match(/'(.*?)'/)?.[1];
  if (key && state.filters[key] !== undefined) {
    input.value = state.filters[key];
  }
});
    const img = r.es_cover
      ? '<span class="status-ok">✔</span>'
      : '<span class="status-no">✖</span>';
    const tr = document.createElement('tr');
    tr.onclick = () =>
      location.href = `event_serie.html?id=${r.id_event_series}`;
    tr.innerHTML = `
      <td>${r.id_event_series}</td>
      <td>${r.es_title||''}</td>
      <td>${r.es_description||''}</td>
      <td>${r.es_notes||''}</td>
      <td style="text-align:center">${img}</td>
    `;
    tbody.appendChild(tr);
  });

  updateSortUI();
  updateResetUI();
  updateStatusUI();
}

/* UI */
function updateSortUI() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const field = btn.getAttribute('onclick')?.match(/'(.+)'/)?.[1];
    if (field !== state.sortField) {
      btn.textContent = '↕';
      return;
    }
    btn.textContent = state.sortDir === 'asc' ? '▲' : '▼';
  });
}

function updateResetUI() {
  const btn = document.querySelector('.reset-btn');
  const active =
    Object.keys(state.filters).length > 0 ||
    state.attivo !== 'all' ||
    state.sortField !== null;
  btn.classList.toggle('active', active);
  btn.textContent = active ? '↺' : '•';
}

function updateStatusUI() {
  const btn = document.getElementById('attivoBtn');
  if (state.attivo === 'all') btn.textContent = '●';
  if (state.attivo === 'true') btn.textContent = '✔';
  if (state.attivo === 'false') btn.textContent = '✖';
}

function syncUI() {
  updateSortUI();
  updateResetUI();
  updateStatusUI();
}

load();
</script>

</body>
</html>
