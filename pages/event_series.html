<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
<title>Event Series Admin</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  padding: 10px;
}

.title {
  font-size: 24px;
  font-weight: bold;
  display: flex;
  gap: 20px;
  align-items: center;
}

.bck-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.bck-btn:hover {
  background: #d1d5db;
}  

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  overflow: hidden;
}

tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

td {
  white-space: nowrap;
  text-overflow: ellipsis;
  border-right: 2px solid #f1f5f9;
}

td:last-child {
  border-right: none;
}  
  
/* HEADER STRUCT */
.col-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  font-size: 14px;
}

.col-tools {
  display: flex;
  gap: 4px;
}

.filter {
  width: 100%;
  font-size: 12px;
  padding: 6px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  box-sizing: border-box;
}

/* BUTTONS */
.sort-btn {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #dbeafe;
  color: #1e3a8a;
}

.sort-btn:hover {
  background: #bfdbfe;
}

.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  background: #f3f4f6;
  opacity: 0.5;
  cursor: pointer;
}

.reset-btn.active {
  background: #fbbf24;
  opacity: 1;
}

/* STATUS */
.status-ok { color: #22c55e; }
.status-no { color: #ef4444; }

.status-filter {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  background: #dbeafe;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">
    <button class="bck-btn" onclick="location.href='dashboard.html'">←</button>
    Event Series
  </div>
</div>

<table>

<colgroup>
  <col style="width: 30px;">
  <col style="width: 140px;">
  <col style="width: 140px;">
  <col style="width: 160px;">
  <col style="width: 200px;">
</colgroup>

<thead>
<tr>

  <!-- RESET -->
  <th>
    <div class="col-header">
      <div class="col-title" style="justify-content:center;">
        Reset
      </div>
      <div class="col-tools" style="justify-content:center;">
        <button class="reset-btn" onclick="resetAll()">•</button>
      </div>
    </div>
  </th>

      <!-- ORGANIZZATORE -->
    <th>
      <div class="col-header">
        <div class="col-title">
          Organizzatore
          <button class="sort-btn" onclick="sort('organizzatore')">↕</button>
        </div>
        <div class="col-tools">
          <input class="filter" oninput="setFilter('organizzatore',this.value)">
        </div>
      </div>
    </th>
  
  <!-- TITOLO -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Titolo
        <button class="sort-btn" onclick="sort('title')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('title',this.value)">
      </div>
    </div>
  </th>

  <!-- DESCRIZIONE -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Descrizione
        <button class="sort-btn" onclick="sort('description')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('description',this.value)">
      </div>
    </div>
  </th>

  <!-- Notes -->
  <th>
    <div class="col-header">
      <div class="col-title">
        Notes
        <button class="sort-btn" onclick="sort('notes')">↕</button>
      </div>
      <div class="col-tools">
        <input class="filter" oninput="setFilter('notes',this.value)">
      </div>
    </div>
  </th>

</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { requireAuth } from './auth-check.js';
await requireAuth();  
  
import { supabase } from '../supabase.js';

let data = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc',
  attivo: 'all'
};

const savedFilters = sessionStorage.getItem('event_series_filters');
if (savedFilters) {
  state.filters = JSON.parse(savedFilters);
}  

/* LOAD */
async function load() {
const { data: rows } = await supabase
  .from('event_series')
  .select(`
    id_event_series,
    es_title,
    es_description,
    es_notes,
    es_created,
    id_organizzatore,
    organizzatori (
      id_organizzatore,
      or_nome
    )
  `);
  data = rows || [];
  data.sort((a,b)=>
    new Date(b.es_created)-new Date(a.es_created)
  );
  render();
  syncUI();
  state.filters = {};
}

/* SORT */
window.sort = (field) => {
  if (state.sortField !== field) {
    state.sortField = field;
    state.sortDir = 'asc';
  } else {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  }
  render();
  syncUI();
};

/* FILTER */
window.setFilter = (k,v) => {
  state.filters[k] = v;
  sessionStorage.setItem('event_series_filters', JSON.stringify(state.filters));
  render();
  syncUI();
};

/* RESET */
window.resetAll = () => {
  state.filters = {};
  state.sortField = null;
  state.sortDir = 'asc';
  sessionStorage.removeItem('event_series_filters');
  document.querySelectorAll('.filter').forEach(i => i.value = '');
  render();
  syncUI();
};

/* RENDER */
function render() {
  let filtered = [...data];
  // FILTRI
  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;
    filtered = filtered.filter(r => {
      if (k === 'organizzatore')
      return (r.organizzatori?.or_nome || '').toLowerCase().includes(v);
      if (k === 'title') return (r.es_title || '').toLowerCase().includes(v);
      if (k === 'description') return (r.es_description || '').toLowerCase().includes(v);
      if (k === 'notes') return (r.es_notes || '').toLowerCase().includes(v);
      return true;
    });
  });
  // SORT
    if (state.sortField) {
      filtered.sort((a, b) => {
        let va, vb;
        if (state.sortField === 'organizzatore') {
          va = (a.organizzatori?.or_nome || '').toLowerCase();
          vb = (b.organizzatori?.or_nome || '').toLowerCase();
        } else {
          va = (a['es_' + state.sortField] || '').toLowerCase();
          vb = (b['es_' + state.sortField] || '').toLowerCase();
        }
        return state.sortDir === 'asc'
          ? va.localeCompare(vb)
          : vb.localeCompare(va);
      });
    }
  // RENDER TABELLA
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  filtered.forEach(r => {
    const tr = document.createElement('tr');
    tr.onclick = () =>
      location.href = `event_serie.html?id=${r.id_event_series}`;
    tr.innerHTML = `
      <td></td>
      <td>${r.organizzatori?.or_nome || ''}</td>
      <td>${r.es_title || ''}</td>
      <td>${r.es_description || ''}</td>
      <td>${r.es_notes || ''}</td>
    `;
    tbody.appendChild(tr);
  });
  updateSortUI();
  updateResetUI();
}

/* UI */
function updateSortUI() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const field = btn.getAttribute('onclick')?.match(/'(.+)'/)?.[1];
    if (field !== state.sortField) {
      btn.textContent = '↕';
      return;
    }
    btn.textContent = state.sortDir === 'asc' ? '▲' : '▼';
  });
}

function updateResetUI() {
  const btn = document.querySelector('.reset-btn');
  if (!btn) return;
  const active =
    Object.keys(state.filters).length > 0 ||
    state.sortField !== null;
  btn.classList.toggle('active', active);
  btn.textContent = active ? '↺' : '•';
}

function syncUI() {
  updateSortUI();
  updateResetUI();
}

load();
</script>

</body>
</html>
