async function loadDB(){
let r=await Promise.all([
supabase.from("stati").select("*"),
supabase.from("regioni").select("*"),
supabase.from("province").select("*"),
supabase.from("comuni").select("*")

APP.db.regioni=r[1].data||[];

APP.db.comuni=r[3].data||[];
}

function buildTimeline(){
let d=[];
APP.db.comuni.forEach(c=>{
if(c.co_previsto)d.push(new Date(c.co_previsto));
if(c.co_attivato)d.push(new Date(c.co_attivato));
});
if(!d.length){
APP.timeline=[new Date()];
APP.timelineIndex=0;
APP.timelineDate=new Date();
updateTimeline();
return;
}
d.sort((a,b)=>a-b);
let start=new Date(d[0].getFullYear(),d[0].getMonth(),1);
let end=new Date(d[d.length-1].getFullYear(),d[d.length-1].getMonth(),1);
APP.timeline=[];
let cur=new Date(start);
while(cur<=end){
APP.timeline.push(new Date(cur));
cur.setMonth(cur.getMonth()+1);
}
let today=new Date();
APP.timelineIndex=APP.timeline.findIndex(v=>v.getMonth()==today.getMonth()&&v.getFullYear()==today.getFullYear());
if(APP.timelineIndex<0){
APP.timelineIndex=APP.timeline.length-1;
}
APP.timelineDate=APP.timeline[APP.timelineIndex];
updateTimeline();
}

function updateTimeline(){
let d=APP.timelineDate;
let m=String(d.getMonth()+1).padStart(2,"0");
let y=String(d.getFullYear()).slice(-2);
document.getElementById("timelineDate").textContent=`${m}/${y}`;
let ticks=document.getElementById("timelineTicks");
ticks.innerHTML="";
let w=ticks.clientWidth;
let step=APP.timeline.length>1?w/(APP.timeline.length-1):0;
APP.timeline.forEach((v,i)=>{
let t=document.createElement("div");
t.className="tick";
t.style.left=(i*step)+"px";
ticks.appendChild(t);
});
let arrow=document.getElementById("timelineArrow");
arrow.style.left=(APP.timelineIndex*step)+"px";
}

document.getElementById("timeline").addEventListener("click",e=>{
let r=e.target.getBoundingClientRect();
let x=e.clientX-r.left;
let i=Math.round((x/r.width)*(APP.timeline.length-1));
if(i<0)i=0;
if(i>=APP.timeline.length)i=APP.timeline.length-1;
APP.timelineIndex=i;
APP.timelineDate=APP.timeline[i];
updateTimeline();
refreshMap();
});

document.getElementById("todayBtn").addEventListener("click",()=>{
let t=new Date();
let i=APP.timeline.findIndex(v=>v.getMonth()==t.getMonth()&&v.getFullYear()==t.getFullYear());
if(i>=0){
APP.timelineIndex=i;
APP.timelineDate=APP.timeline[i];
updateTimeline();
refreshMap();
}
});

function normalizeComuneName(value){
return value
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.trim();
}

function getComuneFromFeature(feature){
let nome=normalizeComuneName(
feature.properties.name
);
let provincia=normalizeComuneName(
feature.properties.prov_name
);
return APP.db.comuni.find(c=>{
let nomeDB=normalizeComuneName(
c.co_descrizione
);
let p=APP.db.province.find(
x=>x.id_provincia==c.id_provincia
);
if(!p)return false;
let provinciaDB=normalizeComuneName(
p.pr_descrizione
);
return nomeDB===nome && provinciaDB===provincia;
});
}    
    
    
function getComuniByProvincia(id){
let provincia=APP.db.province.find(
p=>p.pr_istat==id||p.id_provincia==id
);
if(!provincia)return[];
return APP.db.comuni.filter(
c=>c.id_provincia==provincia.id_provincia
);
}

function getComuniByRegione(id){
let regione=APP.db.regioni.find(r=>r.rg_istat==id||r.id_regione==id);
if(!regione)return[];
let p=APP.db.province
.filter(x=>x.id_regione==regione.id_regione)
.map(x=>x.id_provincia);
return APP.db.comuni.filter(c=>p.includes(c.id_provincia));
}

function getProvinceByRegione(id){
let regione=APP.db.regioni.find(r=>r.rg_istat==id||r.id_regione==id);
if(!regione)return[];
return APP.db.province.filter(p=>p.id_regione==regione.id_regione);
}

// Stato del Comune
function getComuneState(comune){
let riferimento=APP.timelineDate||new Date();
let fineMese=new Date(
riferimento.getFullYear(),
riferimento.getMonth()+1,
0
);
let att=comune.co_attivato?new Date(comune.co_attivato):null;
let prev=comune.co_previsto?new Date(comune.co_previsto):null;
if(att&&att<=fineMese)return"active";
if(prev&&prev<=fineMese)return"planned";
return"none";
}  

// Stato della Provincia
function getProvinciaState(id){
let provincia=APP.db.province.find(
p=>p.pr_istat==id||p.id_provincia==id
);
if(!provincia)return"none";
let comuni=APP.db.comuni.filter(
c=>c.id_provincia==provincia.id_provincia
);
if(!comuni.length)return"none";
let attivi=comuni.filter(
c=>getComuneState(c)=="active"
).length;
let coperti=comuni.filter(c=>{
let s=getComuneState(c);
return s=="active"||s=="planned";
}).length;
if(attivi===comuni.length)return"complete";
if(coperti>0)return"planned";
return"none";
}

// Stato della Regione
function getRegioneState(id){
let regione=APP.db.regioni.find(
r=>r.rg_istat==id||r.id_regione==id
);
if(!regione)return"none";
let province=APP.db.province.filter(
p=>p.id_regione==regione.id_regione
);
if(!province.length)return"none";
let complete=0;
let presenti=0;
province.forEach(p=>{
let s=getProvinciaState(p.id_provincia);
if(s=="complete")complete++;
if(s=="complete"||s=="planned")presenti++;
});
if(complete===province.length)return"complete";
if(presenti>0)return"planned";
return"none";
}   

// Stato dello Stato
function getStatoState(idStato){
let regioni=APP.db.regioni.filter(r=>r.id_stato==idStato);
if(!regioni.length)return"none";
let complete=0;
let presenti=0;
regioni.forEach(r=>{
let s=getRegioneState(r.id_regione);
if(s=="complete")complete++;
if(s=="complete"||s=="planned")presenti++;
});
if(complete===regioni.length)return"complete";
if(presenti>0)return"planned";
return"none";
}

function refreshMap(){
if(!APP.geoLayer)return;
APP.geoLayer.eachLayer(layer=>{
let p=layer.feature.properties;
let id=null;
if(APP.currentLevel==="regioni"){
id=p.reg_istat_code_num||p.COD_REG;
}
if(APP.currentLevel==="province"){
id=p.prov_istat_code_num||p.COD_PRO;
}
if(APP.currentLevel==="comuni"){
id=p.com_istat_code_num||p.PRO_COM;
}
if(id!=null){
layer.setStyle(getGeoStyle(APP.currentLevel,id));
}
});
updateStatistics();
}

const GEOJSON={
regioni:"https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson",
province:"https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson",
comuni:"https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_municipalities.geojson"
};
    
async function loadGeoJSON(type){
if(APP.cache.geojson[type])return APP.cache.geojson[type];
let r=await fetch(GEOJSON[type]);
let j=await r.json();
APP.cache.geojson[type]=j;
return j;
}

function filterGeoJSON(data,type,id){
if(!id)return data;
let features=data.features.filter(f=>{
if(type==="province"){
return (f.properties.reg_istat_code_num||f.properties.COD_REG)==id;
}
if(type==="comuni"){
return (f.properties.prov_istat_code_num||f.properties.COD_PRO)==id;
}
return true;
});
return {
type:"FeatureCollection",
features:features
};
}

async function loadRegions(){
setCurrentLevel("regioni");
let data=await loadGeoJSON("regioni");
drawLayer(data,"regioni");
}

async function loadProvinces(id){
setCurrentLevel("province",id);
let data=await loadGeoJSON("province");
data=filterGeoJSON(data,"province",id);
drawLayer(data,"province");
}

async function loadMunicipalities(id){
setCurrentLevel("comuni",id);
let data=await loadGeoJSON("comuni");
data=filterGeoJSON(data,"comuni",id);
drawLayer(data,"comuni");
}

function drawLayer(data,type){
if(APP.geoLayer){
APP.map.removeLayer(APP.geoLayer);
}
APP.geoLayer=L.geoJSON(data,{
style:function(feature){
let id;
if(type==="regioni")id=getRegionIdFromFeature(feature);
if(type==="province")id=getProvinceIdFromFeature(feature);

// CANCELLARE Sostituita temporaneamente la riga di sopra con le 4 righe di sotto
// if(type==="comuni")id=getComuneIdFromFeature(feature);
if(type==="comuni"){
// console.log(feature.properties);
id=getComuneIdFromFeature(feature);
}
return getGeoStyle(type,id);
},
onEachFeature:function(feature,layer){
layer.on({
click:function(e){
L.DomEvent.stopPropagation(e);
handleClick(type,feature,layer);
},
dblclick:function(){
handleDoubleClick(type,feature);
},
mouseover:function(){
layer.setStyle({
color:"#0057a8",
weight:3
});
},
mouseout:function(){
let id;
if(type==="regioni")id=getRegionIdFromFeature(feature);
if(type==="province")id=getProvinceIdFromFeature(feature);
// if(type==="comuni")id=getComuneIdFromFeature(feature); //Disabilitata temporaneamente
// layer.setStyle(getGeoStyle(type,id)); //Disabilitata temporaneamente
// nuova da qui
if(type==="comuni"){
    console.log("COMUNE GEOJSON:", feature.properties);
    return {
        color:"#4a90c2",
        weight:1,
        fillOpacity:0.2,
        fillColor:"#cccccc"
    };
}
return getGeoStyle(type,id);
// nuova fino a qui     
}
});
}
}).addTo(APP.map);
APP.map.fitBounds(APP.geoLayer.getBounds());
updateStatistics();
}

function handleClick(type,feature,layer){
if(type==="regioni"){
let id=getRegionIdFromFeature(feature);
APP.navigation.push({
level:"regioni",
id:null
});
loadProvinces(id);
}
else if(type==="province"){
let id=getProvinceIdFromFeature(feature);
APP.navigation.push({
level:"province",
id:APP.currentRegion
});
loadMunicipalities(id);
}
else if(type==="comuni"){
let id=getComuneIdFromFeature(feature);
updateInfo(
APP.db.comuni.filter(c=>c.co_istat==id)
);
}
}

APP.map.on("click",function(){
if(!APP.navigation.length)return;
let last=APP.navigation.pop();
if(last.level==="regioni"){
loadRegions();
}
else if(last.level==="province"){
loadProvinces(last.id);
}
});

APP.map.on("dblclick",function(e){
L.DomEvent.stopPropagation(e);
});

function goBack(){
let last=APP.navigation.pop();
if(!last)return;
if(last.level==="regioni"){
loadRegions();
}
if(last.level==="province"){
loadProvinces(last.id);
}
}

function setTimelineDate(index){
if(index<0||index>=APP.timeline.length)return;
APP.timelineIndex=index;
APP.timelineDate=APP.timeline[index];
updateTimeline();
refreshCurrentData();
}

function moveTimeline(step){
let i=APP.timelineIndex+step;
setTimelineDate(i);
}
