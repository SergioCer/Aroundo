<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Servizi</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
}

.title {
  font-size: 24px;
  font-weight: bold;
  display: flex;
  gap: 20px;
  align-items: center;
}

.bck-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
  overflow: hidden;
}

/* COL HEADER (COME LUOGHI) */
.col-header {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.col-title {
  font-weight: bold;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* FILTER */
.filter {
  width: 100%;
  font-size: 12px;
  padding: 6px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  box-sizing: border-box;
}

/* SORT BUTTON */
.sort-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #dbeafe;
  color: #1e3a8a;
}

.sort-btn:hover {
  background: #bfdbfe;
}

/* RESET (COME LUOGHI) */
.reset-btn {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid #d1d5db;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  background: #f3f4f6;
  color: #374151;
  opacity: 0.4;
}

.reset-btn.active {
  background: #fbbf24;
  opacity: 1;
}

/* ROW */
tr:hover {
  background: #eef6ff;
  cursor: pointer;
}

td {
  white-space: nowrap;
  text-overflow: ellipsis;
  border-right: 2px solid #f1f5f9;
}

td:last-child {
  border-right: none;
}

.material-symbols-outlined {
  vertical-align: middle;
}
  
</style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">  
</head>

<body>

<div class="header">
  <div class="title">
    <button class="bck-btn" onclick="history.back()">←</button>
    Servizi
  </div>
</div>

<table>
<colgroup>
  <col style="width: 30px;">
  <col style="width: 160px;">
  <col style="width: 240px;">
  <col style="width: 80px;">
  <col style="width: 40px;">
  <col style="width: 40px;">
</colgroup>  
<thead>
<tr>

<!-- ID + RESET SOTTO -->
<th>
  <div class="col-header">
    <div class="col-title" style="justify-content:center;">
      ID
    </div>
    <button class="reset-btn" onclick="resetAll()">•</button>
  </div>
</th>

<!-- SERVIZIO -->
<th>
  <div class="col-header">
    <div class="col-title">
      Servizio
      <button class="sort-btn" data-field="servizio" onclick="sort('servizio')">↕</button>
    </div>
    <input class="filter" oninput="setFilter('servizio',this.value)">
  </div>
</th>

<!-- DESCRIZIONE -->
<th>
  <div class="col-header">
    <div class="col-title">
      Descrizione
      <button class="sort-btn" data-field="descrizione" onclick="sort('descrizione')">↕</button>
    </div>
    <input class="filter" oninput="setFilter('descrizione',this.value)">
  </div>
</th>

<!-- ICONA -->
<th>
  <div class="col-header">
    <div class="col-title">Icona</div>
  </div>
</th>

<!-- ATTIVO (3 STATI) -->
<th>
  <div class="col-header">
    <div class="col-title">
      Attivo
      <button class="sort-btn" data-field="attivo" onclick="sort('attivo')">↕</button>
    </div>
    <select class="filter" oninput="setFilter('attivo',this.value)">
      <option value=""></option>
      <option value="true">true</option>
      <option value="false">false</option>
    </select>
  </div>
</th>

<!-- LIVELLO -->
<th>
  <div class="col-header">
    <div class="col-title">
      Livello
      <button class="sort-btn" data-field="livello" onclick="sort('livello')">↕</button>
    </div>
    <input class="filter" oninput="setFilter('livello',this.value)">
  </div>
</th>

</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

const params = new URLSearchParams(location.search);
const id_genere = params.get('id_genere');

if (!id_genere) document.body.innerHTML = "ID genere mancante";

let data = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc'
};

const saved = sessionStorage.getItem('servizi_filters');
if (saved) state.filters = JSON.parse(saved);

/* LOAD */
async function load() {
  const { data: rows } = await supabase
    .from('servizi')
    .select('*')
    .eq('id_genere', id_genere);

  data = rows || [];
  render();
}

/* RENDER */
function render() {
  let filtered = [...data];

  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k];
    if (!v) return;

    filtered = filtered.filter(r => {
      if (k === 'servizio')
        return (r.sv_servizio || '').toLowerCase().includes(v.toLowerCase());

      if (k === 'descrizione')
        return (r.sv_descrizione || '').toLowerCase().includes(v.toLowerCase());

      if (k === 'attivo')
        return (r.sv_attivo + '') === v;

      if (k === 'livello')
        return (r.livello + '').startsWith(v);

      return true;
    });
  });

  if (state.sortField) {
    filtered.sort((a,b)=>{
      let va, vb;

      if (state.sortField === 'servizio')
        va = a.sv_servizio, vb = b.sv_servizio;
      else if (state.sortField === 'descrizione')
        va = a.sv_descrizione, vb = b.sv_descrizione;
      else if (state.sortField === 'attivo')
        va = a.sv_attivo, vb = b.sv_attivo;
      else
        va = a[state.sortField], vb = b[state.sortField];

      va = (va ?? '').toString();
      vb = (vb ?? '').toString();

      return state.sortDir === 'asc'
        ? va.localeCompare(vb)
        : vb.localeCompare(va);
    });
  }

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  filtered.forEach(r=>{
    const tr=document.createElement("tr");

    tr.onclick=()=>{
      window.location.href=`servizio.html?id=${r.id_servizio}`;
    };

    tr.innerHTML=`
      <td>${r.id_servizio}</td>
      <td>${r.sv_servizio||''}</td>
      <td>${r.sv_descrizione||''}</td>
      <td><span class="material-symbols-outlined">${r.sv_icona || ''}</span></td>
      <td>${r.sv_attivo}</td>
      <td>${r.livello}</td>
    `;

    tbody.appendChild(tr);
  });

  syncUI();
}

/* FILTER */
window.setFilter=(k,v)=>{
  state.filters[k]=v;
  sessionStorage.setItem('servizi_filters',JSON.stringify(state.filters));
  render();
};

/* SORT */
window.sort=(f)=>{
  if(state.sortField!==f){
    state.sortField=f;
    state.sortDir='asc';
  } else {
    state.sortDir=state.sortDir==='asc'?'desc':'asc';
  }
  render();
};

/* RESET */
window.resetAll=()=>{
  state.filters={};
  state.sortField=null;
  state.sortDir='asc';
  sessionStorage.removeItem('servizi_filters');
  render();
};

/* UI SYNC (FRECCE + RESET STATO) */
function syncUI(){
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    const f = btn.dataset.field;
    if(!f || f!==state.sortField){
      btn.textContent='↕';
    } else {
      btn.textContent = state.sortDir==='asc' ? '▲' : '▼';
    }
  });

  const btn=document.querySelector('.reset-btn');
  const hasFilters = Object.values(state.filters).some(v=>v);
  const hasSort = state.sortField!==null;

  btn.classList.toggle('active', hasFilters || hasSort);
  btn.textContent = (hasFilters || hasSort) ? '↺' : '•';
}

await load();
</script>

</body>
</html>
