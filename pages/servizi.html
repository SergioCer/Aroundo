<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Servizi</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
}

.title {
  font-size: 24px;
  font-weight: bold;
  display: flex;
  gap: 20px;
  align-items: center;
}

.bck-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
  overflow: hidden;
}

.col-header {
  display:flex;
  flex-direction:column;
  gap:4px;
}

.col-title {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:14px;
}

.col-tools {
  display:flex;
  gap:4px;
}

.filter {
  width:100%;
  font-size:12px;
  padding:6px;
  border:1px solid #e5e7eb;
  border-radius:8px;
}

.sort-btn {
  width:28px;
  height:28px;
  border-radius:14px;
  border:none;
  background:#dbeafe;
  cursor:pointer;
}

.reset-btn {
  width:28px;
  height:28px;
  border-radius:14px;
  border:1px solid #d1d5db;
  background:#f3f4f6;
  opacity:0.4;
  cursor:pointer;
}

.reset-btn.active {
  background:#fbbf24;
  opacity:1;
}
tr:hover {
  background:#eef6ff;
  cursor:pointer;
}

td {
  white-space:nowrap;
  text-overflow:ellipsis;
  border-right:2px solid #f1f5f9;
}

td:last-child { border-right:none; }
</style>
</head>

<body>

<div class="header">
  <div class="title">
    <button class="bck-btn" onclick="history.back()">←</button>
    Servizi
  </div>
</div>

<table>

<thead>
<tr>

<th>ID</th>

<th>
<div class="col-header">
  <div class="col-title">
    Servizio
    <button class="sort-btn" onclick="sort('servizio')">↕</button>
  </div>
  <div class="col-tools">
    <input class="filter" oninput="setFilter('servizio',this.value)">
  </div>
</div>
</th>

<th>
<div class="col-header">
  <div class="col-title">Descrizione</div>
  <div class="col-tools">
    <input class="filter" oninput="setFilter('descrizione',this.value)">
  </div>
</div>
</th>

<th>Icona</th>

<th>
<div class="col-header">
  <div class="col-title">
    Attivo
    <button class="sort-btn" onclick="sort('attivo')">↕</button>
  </div>
</div>
</th>

<th>
<div class="col-header">
  <div class="col-title">
    Livello
    <button class="sort-btn" onclick="sort('livello')">↕</button>
  </div>
</div>
</th>

<th>
<button class="reset-btn" onclick="resetAll()">↺</button>
</th>

</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">
import { supabase } from '../supabase.js';

const params = new URLSearchParams(location.search);
const id_genere = params.get('id_genere');

if (!id_genere) document.body.innerHTML = "ERRORE";

let data = [];

let state = {
  filters: {},
  sortField: null,
  sortDir: 'asc'
};

const saved = sessionStorage.getItem('servizi_filters');
if (saved) state.filters = JSON.parse(saved);

async function load() {
  const { data: rows } = await supabase
    .from('servizi')
    .select('*')
    .eq('id_genere', id_genere);

  data = rows || [];
  render();
}

function render() {
  let filtered = [...data];

  Object.keys(state.filters).forEach(k => {
    const v = state.filters[k]?.toLowerCase();
    if (!v) return;

    filtered = filtered.filter(r => {
      if (k==='servizio') return (r.sv_servizio||'').toLowerCase().includes(v);
      if (k==='descrizione') return (r.sv_descrizione||'').toLowerCase().includes(v);
      if (k==='attivo') return (r.sv_attivo+'').includes(v);
      if (k==='livello') return (r.livello+'').startsWith(v);
      return true;
    });
  });

  if (state.sortField) {
    filtered.sort((a,b)=>{
      let va=a['sv_'+state.sortField]??a[state.sortField];
      let vb=b['sv_'+state.sortField]??b[state.sortField];

      va=(va??'').toString();
      vb=(vb??'').toString();

      return state.sortDir==='asc'
        ? va.localeCompare(vb)
        : vb.localeCompare(va);
    });
  }

  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  filtered.forEach(r=>{
    const tr=document.createElement("tr");

    tr.onclick=()=>{
      window.location.href=`servizio.html?id=${r.id_servizio}`;
    };

    tr.innerHTML=`
      <td>${r.id_servizio}</td>
      <td>${r.sv_servizio||''}</td>
      <td>${r.sv_descrizione||''}</td>
      <td>${r.sv_icona||''}</td>
      <td>${r.sv_attivo}</td>
      <td>${r.livello}</td>
      <td></td>
    `;

    tbody.appendChild(tr);
  });
}

window.setFilter=(k,v)=>{
  state.filters[k]=v;
  sessionStorage.setItem('servizi_filters',JSON.stringify(state.filters));
  render();
};

window.sort=(f)=>{
  if(state.sortField!==f){
    state.sortField=f;
    state.sortDir='asc';
  } else {
    state.sortDir=state.sortDir==='asc'?'desc':'asc';
  }
  render();
};

window.resetAll=()=>{
  state.filters={};
  state.sortField=null;
  sessionStorage.removeItem('servizi_filters');
  render();
};

await load();
</script>

</body>
</html>
