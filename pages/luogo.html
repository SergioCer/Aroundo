<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luogo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
}

.back, .close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #22c55e;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
}

.hero {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: white;
  margin: 10px 15px;
  padding: 12px;
  border-radius: 12px;
}

.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
}

.row {
  display: flex;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.label {
  width: 140px;
  font-size: 12px;
  color: #777;
}

.value {
  flex: 1;
}

input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 13px;
}

.btn {
  margin-top: 10px;
  width: 100%;
  height: 34px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.map-btn {
  background: #dbeafe;
  color: #1e3a8a;
  margin-top: 8px;
}

.footer {
  text-align: right;
  font-size: 11px;
  color: #888;
  margin: 10px 15px;
}
</style>
</head>

<body>

<div class="topbar">
  <a class="back" href="javascript:history.back()">←</a>
  <div class="close" onclick="requestClose()">✕</div>
</div>

<div class="hero">
  <input id="lu_location" style="font-size:18px;text-align:center;font-weight:bold;border:none;background:transparent;">
</div>

<div class="card">

  <div class="row">
    <div class="label">Comune</div>
    <div class="value">
      <select id="lu_comune"></select>
    </div>
  </div>

  <div class="row">
    <div class="label">Lat</div>
    <div class="value"><input id="lu_lat"></div>
  </div>

  <div class="row">
    <div class="label">Lng</div>
    <div class="value"><input id="lu_lng"></div>
  </div>

  <button class="btn map-btn" onclick="openCoords()">Apri mappa</button>

  <div class="row">
    <div class="label">Descrizione</div>
    <div class="value"><textarea id="lu_descrizione"></textarea></div>
  </div>

  <div class="row">
    <div class="label">Note</div>
    <div class="value"><textarea id="lu_note"></textarea></div>
  </div>

  <div class="row">
    <div class="label">Capacità</div>
    <div class="value"><input id="lu_capacita_massima"></div>
  </div>

  <button class="btn" onclick="save()">Salva</button>

</div>

<div class="footer" id="created"></div>

<script type="module">
import { supabase } from '../supabase.js';

let id = new URLSearchParams(location.search).get('id');
let comuni = [];
let original = {};
let dirty = false;

/* COMUNI ORDINATI */
async function loadComuni() {
  const { data } = await supabase.from('comuni').select('*');

  comuni = data.sort((a,b)=>
    (a.co_descrizione||'').localeCompare(b.co_descrizione||'')
  );

  const sel = document.getElementById("lu_comune");
  sel.innerHTML = `<option value="">--</option>`;

  comuni.forEach(c => {
    sel.innerHTML += `<option value="${c.id_comune}">${c.co_descrizione}</option>`;
  });
}

/* LOAD */
async function load() {
  const { data } = await supabase
    .from('luoghi')
    .select('*')
    .eq('id_luogo', id)
    .single();

  original = JSON.stringify(data);

  document.getElementById('lu_location').value = data.lu_location || '';
  document.getElementById('lu_comune').value = data.lu_comune || '';
  document.getElementById('lu_lat').value = data.lu_lat || '';
  document.getElementById('lu_lng').value = data.lu_lng || '';
  document.getElementById('lu_descrizione').value = data.lu_descrizione || '';
  document.getElementById('lu_note').value = data.lu_note || '';
  document.getElementById('lu_capacita_massima').value = data.lu_capacita_massima || '';

  document.getElementById('created').textContent =
    data.lu_creato ? new Date(data.lu_creato).toLocaleString() : '';
}

/* DIRTY CHECK */
window.markDirty = () => {
  const current = JSON.stringify({
    lu_location: lu_location.value,
    lu_comune: lu_comune.value,
    lu_lat: lu_lat.value,
    lu_lng: lu_lng.value,
    lu_descrizione: lu_descrizione.value,
    lu_note: lu_note.value,
    lu_capacita_massima: lu_capacita_massima.value
  });

  dirty = current !== original;
};

/* SAVE */
window.save = async () => {
  await supabase.from('luoghi')
    .update({
      lu_location: lu_location.value,
      lu_comune: lu_comune.value,
      lu_lat: lu_lat.value,
      lu_lng: lu_lng.value,
      lu_descrizione: lu_descrizione.value,
      lu_note: lu_note.value,
      lu_capacita_massima: lu_capacita_massima.value
    })
    .eq('id_luogo', id);

  dirty = false;
  load();
};

/* MAP */
window.openCoords = () => {
  window.open(
    `https://sergiocer.github.io/Coordinate/?lat=${lu_lat.value}&lng=${lu_lng.value}`,
    "_blank"
  );
};

/* CLOSE */
window.requestClose = () => {
  if (!dirty) return history.back();
  if (confirm("Salvare modifiche?")) save();
};

await loadComuni();
await load();
</script>

</body>
</html>
