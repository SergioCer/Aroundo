<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luogo</title>

<link rel="stylesheet"href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  font-weight: bold;
  gap: 20px;
}

.back-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.back-btn.dirty {
  background: #fbbf24;
  color: #111827;
}
  
.back-btn:hover {
  background: #d1d5db;
}  

/* HERO LOCATION */
.hero {
  margin: 10px 15px 8px;
  padding: 12px;
  background: white;
  border-radius: 12px;
}

/* CARD */
.card {
  background: white;
  margin: 0 15px 20px;
  padding: 15px;
  border-radius: 12px;
}

/* LABEL OUTSIDE */
.section-title {
  font-size: 11px;
  color: #777;
  margin: 12px 0 4px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 16px;
}

/* MAP BUTTON */
.map-btn {
  width: 60px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: #dbeafe;
  color: #1e3a8a;
  font-size: 12px;
  cursor: pointer;
}

.map-btn:disabled {
  background: #e5e7eb;
  color: #9ca3af;
  cursor: not-allowed;
}  

.footer {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 11px;
  color: #888;
}

.section-box {
  margin: 0 15px 15px;
  background: white;
  border-radius: 12px;
  overflow: hidden;
}

.section-header {
  padding: 10px 12px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  gap: 8px;
  align-items: center;
  user-select: none;
}

.section-header.disabled {
  color: #9ca3af;
  cursor: default;
}

.section-panel {
  border-top: 1px solid #eee;
  max-height: 300px;
  overflow-y: auto;
}

.mini-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.mini-table td {
  padding: 6px 8px;
  border-bottom: 1px solid #f1f5f9;
  cursor: pointer;
}

.mini-table tr:hover {
  background: #eef6ff;
}

.link-cell {
  color: #1e3a8a;
  cursor: pointer;
  font-weight: 600;
}

.link-cell:hover {
  text-decoration: underline;
}

.header-row td {
  font-size: 11px;
  color: #777;
  font-weight: 600;
  border-bottom: 1px solid #ddd;
  box-shadow: 0 1px 0 #e5e7eb;
  cursor: default;
  background: #fafafa;
  position: sticky;
  top: 0;
  z-index: 5;
}

#comuniResults {
  margin-top: 6px;
  border: 1px solid #ddd;
  border-radius: 8px;
  overflow: hidden;
  background: white;
}  

#id_comune::placeholder {
  font-size: 13px;
  font-weight: normal;
  font-style: italic;
  color: #9ca3af;
}

input:disabled,
textarea:disabled {
  background: #f8fafc;
  color: #9ca3af;
  cursor: not-allowed;
}  

.card.locked {
  opacity: .55;
  pointer-events: none;
}

.card.locked .map-btn {
  pointer-events: none;
}
  
</style>
</head>

<body>

<div class="topbar">
  <button id="backBtn" class="back-btn" onclick="requestBack()">←</button>
<div id="mapTitle" style="font-weight:bold;"></div>
</div>

<div class="hero">

  <!-- COMUNE (EDITABILE) -->
<input id="id_comune"
       placeholder=" Comune... obbligatorio (minimo 3 caratteri) "
       oninput="onComuneInput(this.value)"
       style="font-size:20px; font-weight:700; text-align:center; width:100%; border:none; background:transparent;">
<input type="hidden" id="id_comune_hidden">

<div id="comuniResults"></div> 
<div class="card">

  <!-- LOCATION -->
  <div class="section-title">Location:</div>
  <input id="lu_location"style="font-size:16px; font-weight:600; text-align:left;"
         oninput="markDirty()">

  <!-- DESCRIZIONE -->
  <div class="section-title">Descrizione:</div>
  <textarea id="lu_descrizione" oninput="markDirty()"></textarea>

  <!-- NOTE -->
  <div class="section-title">Note:</div>
  <textarea id="lu_note" oninput="markDirty()"></textarea>

<!-- RIGA 1: LABEL -->
<div style="display:flex; font-size: 11px; gap:20px; margin-bottom:4px;">
  <div style="flex:1;">Capienza:</div>
  <div style="flex:1;">Lat:</div>
  <div style="flex:1;">Lng:</div>
  <div style="width:70px;"></div>
</div>

<!-- RIGA 2: VALORI + MAP -->
<div style="display:flex; gap:20px; align-items:center;">

  <div style="flex:1;">
    <input id="lu_capienza" oninput="markDirty()">
  </div>

  <div style="flex:1;">
    <input id="lu_lat" oninput="markDirty()">
  </div>

  <div style="flex:1;">
    <input id="lu_lng" oninput="markDirty()">
  </div>

  <div style="width:70px;">
    <button id="mapBtn" class="map-btn" onclick="openMapLuogo()" title="Seleziona il Comune per accedere">Map</button>
  </div>
  </div>

  <div class="footer" id="lu_creato"></div>

  <!-- SI - NO - ANNULLA -->
<div id="saveDialog" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:99999;
  align-items:center;
  justify-content:center;
">
  <div style="
    background:white;
    padding:22px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
  ">
    <div style="margin-bottom:18px; font-weight:600;">
      Vuoi salvare le modifiche?
    </div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button onclick="dialogAction('yes')" style="
        flex:1;
        background:#22c55e;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Sì</button>
      <button onclick="dialogAction('no')" style="
        flex:1;
        background:#ef4444;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">No</button>
      <button onclick="dialogAction('cancel')" style="
        flex:1;
        background:#9ca3af;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Annulla</button>
    </div>
  </div>
</div>

<!-- COORDINATE -->  
<div id="coordDialog" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:99999;
  align-items:center;
  justify-content:center;
">
    <div style="
      background:white;
      padding:22px;
      border-radius:12px;
      width:300px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    ">
    <div id="coordContent"></div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button onclick="coordAction('yes')" style="
        flex:1;
        background:#22c55e;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Usa</button>
      <button onclick="coordAction('cancel')" style="
        flex:1;
        background:#9ca3af;
        color:white;
        border:none;
        padding:10px;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
      ">Annulla</button>
    </div>
  </div>
</div>
  
  
    <!-- MAP POPUP -->
<div id="mapModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:9999;
">
  <div style="
    position:absolute;
    top:5%;
    left:5%;
    width:90%;
    height:90%;
    background:white;
    border-radius:12px;
    overflow:hidden;
  ">
    <div style="padding:10px; display:flex; justify-content:space-between;">
      <div id="mapTitle" style="font-weight:bold;">Mappa</div>
      <button onclick="closeMap()" style="border:none;background:#ef4444;color:white;width:30px;height:30px;border-radius:15px;">✕</button>
    </div>
    <div id="map" style="height:calc(100% - 50px);"></div>
  </div>
</div>
</div>

<div class="section-box">
  <div class="section-header" onclick="toggleSection('eventi')">
    <span id="eventiArrow">▶</span>
    <span id="eventiTitle">Eventi (0)</span>
  </div>
  <div id="eventiPanel" class="section-panel" style="display:none;">
    <table class="mini-table">
      <tbody id="eventiBody"></tbody>
    </table>
  </div>
</div>

<div class="section-box">
  <div class="section-header" onclick="toggleSection('organizzatori')">
    <span id="organizzatoriArrow">▶</span>
    <span id="organizzatoriTitle">Organizzatori (0)</span>
  </div>
  <div id="organizzatoriPanel" class="section-panel" style="display:none;">
    <table class="mini-table">
      <tbody id="organizzatoriBody"></tbody>
    </table>
  </div>
</div>
  
  
<script type="module">
import { supabase } from '../supabase.js';

const params = new URLSearchParams(location.search);
const id = params.get('id');
const isNew = params.has('new') || !id;
const lat = params.get("lat");
const lng = params.get("lng");
const comune = params.get("comune");

let original = "{}";
let dirty = false;
let map;
let marker;
let markers = [];
let luoghi = [];
let dialogResolve;
let comuniCoords = {};
let eventiList = [];
let eventiOpen = false;
let organizzatoriList = [];  
let orgOpen = false;
let coordResolve;
  
function askSaveDialog() {
  document.getElementById("saveDialog").style.display = "flex";
  return new Promise(resolve => {
    dialogResolve = resolve;
  });
}

function dialogAction(type) {
  document.getElementById("saveDialog").style.display = "none";
  dialogResolve(type);
}

function updatePageState() {
  const comuneOk = !isNew || id_comune_hidden.value !== "";
  document.querySelector(".card")
    .classList.toggle("locked", !comuneOk);
  const controls = [
    lu_location,
    lu_descrizione,
    lu_note,
    lu_capienza,
    lu_lat,
    lu_lng
  ];
  controls.forEach(c => c.disabled = !comuneOk);
  const mapBtn = document.getElementById("mapBtn");
  mapBtn.disabled = !comuneOk;
  mapBtn.title = comuneOk
      ? ""
      : "Seleziona il Comune per accedere";
}

window.dialogAction = dialogAction;
  
function initMapLuogo() {
  if (map) return;
  map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: ''
  }).addTo(map);
map.on("click", async (e) => {
  const idComune = id_comune_hidden.value;
  const comune = comuniCoords[idComune];
  if (!comune?.lat || !comune?.lng) {
    return;
  }
  const distanzaComune = map.distance(
    [e.latlng.lat, e.latlng.lng],
    [comune.lat, comune.lng]
  );
    if (distanzaComune > 15000) {
      await askCoordDialog(
        "",
        "",
        "",
        "",
        "La posizione è troppo distante dal comune selezionato."
      );
      return;
    }
  const { lat, lng } = e.latlng;
  const latF = lat.toFixed(6);
  const lngF = lng.toFixed(6);
  // prendo lista luoghi per confronto
  const { data } = await supabase
    .from("luoghi")
    .select("lu_lat, lu_lng")
    .eq("id_comune", id_comune_hidden.value);
  const valid = data || [];
  const minDist = checkDistance(lat, lng, valid);
  let mode = "";
  let msg = "";
  const oldLat = lu_lat.value;
  const oldLng = lu_lng.value;
    if (!oldLat || !oldLng) {
      // PRIMO INSERIMENTO
      if (minDist < 2) {
        mode = "block";
        msg = "Posizione già occupata";
      } else if (minDist <= 10) {
        mode = "warn";
        msg = "Esistono posizioni molto vicine, confermi ?";
      } else {
        mode = "first";
        msg = "Aggiungere il luogo ?";
      }
    } else {
      // MODIFICA SUCCESSIVA
      if (minDist < 2) {
        mode = "block";
        msg = "Posizione già occupata";
      } else if (minDist <= 10) {
        mode = "warn";
        msg = "Esistono posizioni molto vicine, confermi ?";
      } else {
        mode = "move";
        msg = "Spostare il luogo ?";
      }
    }
  const choice = await askCoordDialog(oldLat, oldLng, latF, lngF, msg);
  // BLOCCO
  if (mode === "block") return;
  // ANNULLA
  if (choice !== "yes") return;
  // OK → APPLICO MOVIMENTO / CREAZIONE
  if (marker) {
    marker.setLatLng([lat, lng]);
  } else {
  // NUOVO LUOGO → crea marker rosso
    marker = L.marker([lat, lng], {
      icon: selectedIcon,
      riseOnHover: true
    }).addTo(map);
  }
  lu_lat.value = latF;
  lu_lng.value = lngF;
  markDirty();
  });
}

function renderMarkers(list) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const currentId = id; // luogo in modifica
  const valid = (list || []).filter(l => l.lu_lat && l.lu_lng);
  if (!valid.length) {
  const idComune = id_comune_hidden.value;
  const comune = comuniCoords[idComune];
  if (comune?.lat && comune?.lng) {
    map.setView([comune.lat, comune.lng], 12);
  } else {
    map.setView([38.1, 13.3], 8);
  }
  return;
}
  const bounds = [];
  valid.forEach(l => {
    const isCurrent = l.id_luogo == currentId;
    const m = L.marker(
      [l.lu_lat, l.lu_lng],
      { icon: isCurrent ? selectedIcon : defaultIcon }
    ).addTo(map);
    m.bindTooltip(
      l.lu_location || "",
      { direction: "top", sticky: true }
    );
    markers.push(m);
    if (isCurrent) {
      marker = m; // marker globale del luogo attivo
    }
    bounds.push([l.lu_lat, l.lu_lng]);
  });
    map.fitBounds(bounds, { padding: [30, 30] });
}

function checkDistance(lat, lng, list) {
  let min = Infinity;
  for (const l of list) {
    if (!l.lu_lat || !l.lu_lng) continue;
    const d = map.distance(
      [lat, lng],
      [l.lu_lat,
       l.lu_lng]
    );
    if (d < min) min = d;
  }
  return min;
}
    
const defaultIcon = L.icon({
  iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});

const selectedIcon = L.icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});  

function askCoordDialog(oldLat, oldLng, newLat, newLng, message) {
    const box = document.getElementById("coordContent");
    let html = `
    <div style="margin-bottom:10px;font-weight:600">
    ${message}
    </div>
    `;
    if (oldLat && oldLng) {
    html += `
    <div style="font-family:monospace;font-weight:bold;color:#111827">
    Lat : ${oldLat}<br>
    Lng : ${oldLng}
    </div>
    <div style="height:10px"></div>
    `;
    }
    html += `
      <div style="
        text-align:center;
        font-size:20px;
        margin:8px 0;
    ">
        ↓
    </div>
    <div style="font-family:monospace;color:#374151">
    Lat : ${newLat}<br>
    Lng : ${newLng}
    </div>
    <div style="height:16px"></div>
    `;
    box.innerHTML = html;
    document.getElementById("coordDialog").style.display = "flex";
    return new Promise(resolve => {
      coordResolve = resolve;
    });
  }

    // Preleva la distanza dal comune selezionato per verificare se è coerente usando il raggio 
    function isInsideComune(lat, lng, comuneLat, comuneLng, maxKm = 15) {
      const d = map.distance(
        [lat, lng],
        [comuneLat, comuneLng]
      );
      return d <= maxKm * 1000;
    }
  
window.coordAction = (type) => {
  document.getElementById("coordDialog").style.display = "none";
  coordResolve(type);
};  
  
window.openMapLuogo = async () => {
  if (isNew && !id_comune_hidden.value) return;
  document.getElementById("mapModal").style.display = "block";
  initMapLuogo();
  const idComune = id_comune_hidden.value;
   if (idComune) {
    await loadMapLuoghi(idComune);
  }
  setTimeout(() => {
    map.invalidateSize();
  }, 200);
};

window.onComuneInput = (text) => {
  // qualsiasi modifica manuale invalida il comune selezionato
  id_comune_hidden.value = "";
  searchComuni(text);
  markDirty();
};

  
/* COMUNI */
async function loadComuni() {
  const { data = [] } = await supabase
    .from('comuni')
    .select('id_comune, co_lat, co_lng');
  comuniCoords = {};
  data.forEach(c => {
    comuniCoords[c.id_comune] = {
      lat: c.co_lat,
      lng: c.co_lng
    };
  });
}

/* LOAD */
async function load() {
  if (isNew) {
    original = JSON.stringify({}); // base vuoto
    document.getElementById("mapTitle").textContent = "Aggiungi Luogo";
    updatePageState();
    return;
  } else {
    document.getElementById("mapTitle").textContent =  "Luogo Attuale";
  }
  const { data, error } = await supabase
    .from('luoghi')
    .select('*')
    .eq('id_luogo', id)
    .single();
  if (error) {
    console.error(error);
    return;
  }
  original = JSON.stringify(data);
  lu_location.value = data.lu_location || '';
  id_comune_hidden.value = data.id_comune || '';
  const com = await supabase
  .from("comuni")
  .select("co_descrizione")
  .eq("id_comune", data.id_comune)
  .single();
if (com.data) {
  id_comune.value = com.data.co_descrizione;
}
  lu_descrizione.value = data.lu_descrizione || '';
  lu_note.value = data.lu_note || '';
  lu_lat.value = data.lu_lat || '';
  lu_lng.value = data.lu_lng || '';
  lu_capienza.value = data.lu_capienza || '';
  document.getElementById('lu_creato').textContent = data.lu_creato ? new Date(data.lu_creato).toLocaleString() : '';
  updatePageState();
}

async function loadMapLuoghi(idComune) {
  const { data } = await supabase
    .from("luoghi")
    .select("*")
    .eq("id_comune", idComune);
  renderMarkers(data || []);
}
  
/* SAVE */
async function save() {
  const payload = {
    lu_location: lu_location.value,
    id_comune: id_comune_hidden.value,
    lu_descrizione: lu_descrizione.value,
    lu_note: lu_note.value,
    lu_lat: lu_lat.value ? parseFloat(lu_lat.value) : null,
    lu_lng: lu_lng.value ? parseFloat(lu_lng.value) : null,
    lu_capienza: lu_capienza.value
      ? parseInt(lu_capienza.value)
      : null
  };
  let result;
  if (isNew) {
    result = await supabase
      .from('luoghi')
      .insert(payload)
      .select()
      .single();
  } else {
    result = await supabase
      .from('luoghi')
      .update(payload)
      .eq('id_luogo', id)
      .select()
      .single();
  }
  const { data, error } = result;
  if (error) {
    console.error(error);
    alert("Errore salvataggio");
    return false;
  }
  dirty = false;
  // 🔥 redirect solo dopo insert
  if (isNew) {
    location.href = `luogo.html?id=${data.id_luogo}`;
  }
  return true;
}

/* DIRTY */
window.markDirty = () => {
  // Nessun comune selezionato: non è possibile salvare
  if (!id_comune_hidden.value) {
    dirty = false;
    document.getElementById('backBtn')
      .classList.remove('dirty');
    return;
  }
  const current = JSON.stringify({
    lu_location: lu_location.value,
    id_comune: id_comune_hidden.value,
    lu_descrizione: lu_descrizione.value,
    lu_note: lu_note.value,
    lu_lat: lu_lat.value,
    lu_lng: lu_lng.value,
    lu_capienza: lu_capienza.value
  });
  dirty = current !== original;
  document.getElementById('backBtn')
    .classList.toggle('dirty', dirty);
};

window.searchComuni = async (text) => {
  const box = document.getElementById("comuniResults");
  if (text.length < 3) {
    box.innerHTML = "";
    box.style.border = "none";
    return;
  }
  const { data } = await supabase
    .from("comuni")
    .select("id_comune, co_descrizione")
    .ilike("co_descrizione", `%${text}%`)   // 👈 CONTIENE
    .limit(10);
  box.innerHTML = "";
  (data || []).forEach(c => {
    const div = document.createElement("div");
    div.style.padding = "6px 8px";
    div.style.borderBottom = "1px solid #eee";
    div.style.cursor = "pointer";
    div.style.textAlign = "center";
      div.onmouseenter = () => {
      div.style.background = "#eef6ff"; /* oppure colore f8fafc */
    };
      div.onmouseleave = () => {
      div.style.background = "";
    };
    div.innerText = c.co_descrizione;
    div.onclick = () => {
      id_comune.value = c.co_descrizione;
      id_comune_hidden.value = c.id_comune;
      updatePageState();
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      box.innerHTML = "";
      markDirty();
    };
    box.appendChild(div);
  });
};

window.requestBack = async () => {
  if (!dirty) return history.back();
  const choice = await askSaveDialog();
  if (choice === "cancel") return;
  if (choice === "yes") {
    const success = await save();
    if (!success) return;
    history.back();
    return;
  }
  if (choice === "no") {
    history.back();
  }
};

  window.closeMap = () => {
  document.getElementById("mapModal").style.display = "none";
};

async function loadEventiLuogo(idLuogo) {
  const { data } = await supabase
    .from("eventi")
    .select(`
      id_evento,
      ev_titolo,
      ev_descrizione,
      ev_inizio,
      id_organizzatore,
      organizzatori (
        id_organizzatore,
        or_nome
      )
    `)
    .eq("id_luogo", idLuogo);
  eventiList = sortEventi(data || []);
  renderEventi();
  
}

async function loadOrganizzatoriLuogo(idLuogo) {
  const map = new Map();
  eventiList.forEach(e => {
    if (!e.organizzatori) return;
    const id = e.organizzatori.id_organizzatore;
    if (!map.has(id)) {
      map.set(id, {
        id_organizzatore: id,
        or_nome: e.organizzatori.or_nome,
        or_descrizione: "",
        num_eventi: 1
      });
    } else {
      map.get(id).num_eventi++;
    }
  });
  organizzatoriList = [...map.values()]
      .sort((a, b) => a.or_nome.localeCompare(b.or_nome));
  renderOrganizzatori();
}
 
function renderEventi() {
  const body = document.getElementById("eventiBody");
  body.innerHTML = "";
  document.getElementById("eventiTitle").textContent =
    `Eventi (${eventiList.length})`;
  const arrow = document.getElementById("eventiArrow");
  const sectionHeader = document.querySelector("#eventiPanel").previousElementSibling;
  if (eventiList.length === 0) {
    arrow.textContent = "▶";
    sectionHeader.classList.add("disabled");
    return;
  }
  sectionHeader.classList.remove("disabled");
  // intestazione colonne
  const headerRow = document.createElement("tr");
  headerRow.className = "header-row";
  headerRow.innerHTML = `
      <td>Data</td>
      <td>Evento</td>
      <td>Organizzatore</td>
      <td>Descrizione</td>
  `;
  body.appendChild(headerRow);
  // righe dati
  eventiList.forEach(e => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${formatInizio(e.ev_inizio)}</td>
      <td class="link-cell">
        ${e.ev_titolo || ""}
      </td>
      <td class="link-cell">
        ${e.organizzatori?.or_nome || ""}
      </td>
      <td>
        ${e.ev_descrizione || ""}
      </td>
    `;
    // Evento
    tr.cells[1].onclick = () => {
      location.href = `evento.html?id=${e.id_evento}`;
    };
    // Organizzatore
    if (e.organizzatori) {
      tr.cells[2].onclick = () => {
        location.href =
          `organizzatore.html?id=${e.organizzatori.id_organizzatore}`;
      };
    }
    body.appendChild(tr);
  });
}

function sortEventi(list) {
  return [...list].sort((a, b) => {
    const da = new Date(a.ev_inizio);
    const db = new Date(b.ev_inizio);
    return db - da; // 👈 dal più futuro al più passato
  });
}

function renderOrganizzatori() {
  const body = document.getElementById("organizzatoriBody");
  body.innerHTML = "";
  document.getElementById("organizzatoriTitle").textContent =
    `Organizzatori (${organizzatoriList.length})`;
  const arrow = document.getElementById("organizzatoriArrow");
  const sectionHeader = document.querySelector("#organizzatoriPanel").previousElementSibling;
  if (organizzatoriList.length === 0) {
    arrow.textContent = "▶";
    sectionHeader.classList.add("disabled");
    return;
  }
  sectionHeader.classList.remove("disabled");
  // intestazione colonne
  const headerRow = document.createElement("tr");
  headerRow.className = "header-row";
  headerRow.innerHTML = `
    <td>Nome</td>
    <td style="text-align:right;">N° eventi</td>
  `;
  body.appendChild(headerRow);
  // righe
  organizzatoriList.forEach(o => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="link-cell">
        ${o.or_nome || ""}
      </td>
      <td style="text-align:right;">
        ${o.num_eventi || 0}
      </td>
    `;
    // click su nome → organizzatore
    tr.cells[0].onclick = () => {
      location.href = `organizzatore.html?id=${o.id_organizzatore}`;
    };
    body.appendChild(tr);
  });
}

function formatInizio(val) {
  if (!val) return '';
  const d = new Date(val);
  const aa = String(d.getFullYear()).slice(-2);
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const gg = String(d.getDate()).padStart(2, "0");
  return `${aa}/${mm}/${gg}`;
}

window.toggleSection = (section) => {
  if (section === "eventi") {
    if (eventiList.length === 0) return;
    eventiOpen = !eventiOpen;
    document.getElementById("eventiPanel").style.display =
      eventiOpen ? "block" : "none";
    document.getElementById("eventiArrow").textContent =
      eventiOpen ? "▼" : "▶";
  }
  if (section === "organizzatori") {
    if (organizzatoriList.length === 0) return;
    orgOpen = !orgOpen;
    document.getElementById("organizzatoriPanel").style.display =
      orgOpen ? "block" : "none";
    document.getElementById("organizzatoriArrow").textContent =
      orgOpen ? "▼" : "▶";
  }
};

} else {

  renderOrganizzatori();
}
