<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luogo</title>

<link rel="stylesheet"href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  font-weight: bold;
  gap: 20px;
}

.back-btn {
  width: 34px;
  height: 34px;
  border-radius: 17px;
  border: none;
  background: #e5e7eb;
  color: #374151;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.back-btn.dirty {
  background: #fbbf24;
  color: #111827;
}
  
.back-btn:hover {
  background: #d1d5db;
}  

/* HERO LOCATION */
.hero {
  margin: 10px 15px 8px;
  padding: 12px;
  background: white;
  border-radius: 12px;
}

/* CARD */
.card {
  background: white;
  margin: 0 15px 20px;
  padding: 15px;
  border-radius: 12px;
}

/* LABEL OUTSIDE */
.section-title {
  font-size: 11px;
  color: #777;
  margin: 12px 0 4px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 16px;
}

/* MAP BUTTON */
.map-btn {
  width: 60px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: #dbeafe;
  color: #1e3a8a;
  font-size: 12px;
  cursor: pointer;
}

.footer {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 11px;
  color: #888;
}

</style>
</head>

<body>

<div class="topbar">
  <button id="backBtn" class="back-btn" onclick="requestBack()">←</button>
  Luogo
</div>

<div class="hero">

  <!-- COMUNE (EDITABILE) -->
  <select id="id_comune"
          style="font-size:20px; font-weight:700; text-align:center; width:100%; border:none; background:transparent;"
          oninput="markDirty()"></select>
 
<div class="card">

  <!-- LOCATION -->
  <div class="section-title">Location:</div>
  <input id="lu_location"style="font-size:16px; font-weight:600; text-align:left;"
         oninput="markDirty()">

  <!-- DESCRIZIONE -->
  <div class="section-title">Descrizione:</div>
  <textarea id="lu_descrizione" oninput="markDirty()"></textarea>

  <!-- NOTE -->
  <div class="section-title">Note:</div>
  <textarea id="lu_note" oninput="markDirty()"></textarea>

<!-- RIGA 1: LABEL -->
<div style="display:flex; font-size: 11px; gap:20px; margin-bottom:4px;">
  <div style="flex:1;">Capienza:</div>
  <div style="flex:1;">Lat:</div>
  <div style="flex:1;">Lng:</div>
  <div style="width:70px;"></div>
</div>

<!-- RIGA 2: VALORI + MAP -->
<div style="display:flex; gap:20px; align-items:center;">

  <div style="flex:1;">
    <input id="lu_capienza" oninput="markDirty()">
  </div>

  <div style="flex:1;">
    <input id="lu_lat" oninput="markDirty()">
  </div>

  <div style="flex:1;">
    <input id="lu_lng" oninput="markDirty()">
  </div>

  <div style="width:70px;">
    <button class="map-btn" onclick="openMapLuogo()">Map</button>
  </div>

  <div class="footer" id="lu_creato"></div>
  
    <!-- MAP POPUP -->
<div id="mapModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:9999;
">
  <div style="
    position:absolute;
    top:5%;
    left:5%;
    width:90%;
    height:90%;
    background:white;
    border-radius:12px;
    overflow:hidden;
  ">
    <div style="padding:10px; display:flex; justify-content:space-between;">
      <div style="font-weight:bold;">Seleziona luogo</div>
      <button onclick="closeMap()" style="border:none;background:#ef4444;color:white;width:30px;height:30px;border-radius:15px;">✕</button>
    </div>
    <div id="map" style="height:calc(100% - 50px);"></div>
  </div>
</div>
</div>
  
<script type="module">
import { supabase } from '../supabase.js';

const params = new URLSearchParams(location.search);
const id = params.get('id');
const isNew = params.has('new') || !id;

const lat = params.get("lat");
const lng = params.get("lng");
const comune = params.get("comune");

let original = "{}";
let dirty = false;
let map;
let marker;
let markers = [];
let luoghi = [];
  
function initMapLuogo() {
  if (map) return;
  map = L.map('map').setView([38.1, 13.3], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: ''
  }).addTo(map);
  map.on("click", (e) => {
    const { lat, lng } = e.latlng;
    const ok = confirm("Vuoi usare queste coordinate per il luogo?");
    if (!ok) return;
    lu_lat.value = lat.toFixed(6);
    lu_lng.value = lng.toFixed(6);
    markDirty();
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);
  });
}

function renderMarkers(list) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const currentId = id; // luogo in modifica
  const valid = (list || []).filter(l => l.lu_lat && l.lu_lng);
  if (!valid.length) return;
  const bounds = [];
  valid.forEach(l => {
    const isCurrent = l.id_luogo == currentId;
    const marker = L.marker(
      [l.lu_lat, l.lu_lng],
      { icon: isCurrent ? selectedIcon : defaultIcon }
    ).addTo(map);
    marker.bindTooltip(
      l.lu_location || "",
      { direction: "top", sticky: true }
    );
    markers.push(marker);
    bounds.push([l.lu_lat, l.lu_lng]);
  });
  map.fitBounds(bounds, { padding: [30, 30] });
}

const defaultIcon = L.icon({
  iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});

const selectedIcon = L.icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});  
  
window.openMapLuogo = () => {
  document.getElementById("mapModal").style.display = "block";
  initMapLuogo();
  setTimeout(() => {
    map.invalidateSize();
  }, 200);
};

  
/* COMUNI */
async function loadComuni() {
  const { data = [] } = await supabase.from('comuni').select('*');
  const sorted = (data || []).sort((a,b)=>
  (a.co_descrizione||'').localeCompare(b.co_descrizione||'')
  );
  const sel = document.getElementById("id_comune");
  sel.innerHTML = `<option value="">-- Seleziona Comune --</option>`;
  sorted.forEach(c=>{
    sel.innerHTML += `<option value="${c.id_comune}">${c.co_descrizione}</option>`;
  });
}

/* LOAD */
async function load() {
  if (isNew) {
    original = JSON.stringify({}); // base vuoto
    return;
  }
  const { data, error } = await supabase
    .from('luoghi')
    .select('*')
    .eq('id_luogo', id)
    .single();
  if (error) {
    console.error(error);
    return;
  }
  original = JSON.stringify(data);
  lu_location.value = data.lu_location || '';
  id_comune.value = data.id_comune || '';
  lu_descrizione.value = data.lu_descrizione || '';
  lu_note.value = data.lu_note || '';
  lu_lat.value = data.lu_lat || '';
  lu_lng.value = data.lu_lng || '';
  lu_capienza.value = data.lu_capienza || '';
  document.getElementById('lu_creato').textContent = data.lu_creato ? new Date(data.lu_creato).toLocaleString() : '';
}

async function loadMapLuoghi(idComune) {
  const { data } = await supabase
    .from("luoghi")
    .select("*")
    .eq("id_comune", idComune);
  renderMarkers(data || []);
}
  
/* SAVE */
async function save() {
  const payload = {
    lu_location: lu_location.value,
    id_comune: id_comune.value,
    lu_descrizione: lu_descrizione.value,
    lu_note: lu_note.value,
    lu_lat: lu_lat.value ? parseFloat(lu_lat.value) : null,
    lu_lng: lu_lng.value ? parseFloat(lu_lng.value) : null,
    lu_capienza: lu_capienza.value
      ? parseInt(lu_capienza.value)
      : null
  };
  let result;
  if (isNew) {
    result = await supabase
      .from('luoghi')
      .insert(payload)
      .select()
      .single();
  } else {
    result = await supabase
      .from('luoghi')
      .update(payload)
      .eq('id_luogo', id)
      .select()
      .single();
  }
  const { data, error } = result;
  if (error) {
    console.error(error);
    alert("Errore salvataggio");
    return false;
  }
  dirty = false;
  // 🔥 redirect solo dopo insert
  if (isNew) {
    location.href = `luogo.html?id=${data.id_luogo}`;
  }
  return true;
}

/* DIRTY */
window.markDirty = () => {
  const current = JSON.stringify({
    lu_location: lu_location.value,
    id_comune: id_comune.value,
    lu_descrizione: lu_descrizione.value,
    lu_note: lu_note.value,
    lu_lat: lu_lat.value,
    lu_lng: lu_lng.value,
    lu_capienza: lu_capienza.value
  });
  dirty = current !== original;
  document.getElementById('backBtn')
    .classList.toggle('dirty', dirty);
};
  
  /* BACK */
window.requestBack = async () => {
  if (!dirty) return history.back();
  const ok = confirm("Vuoi salvare le modifiche?");
if (ok) {
  const success = await save();
  if (!success) return;
}
history.back();
};

  window.closeMap = () => {
  document.getElementById("mapModal").style.display = "none";
};

window.openMapLuogo = () => {
  document.getElementById("mapModal").style.display = "block";
  initMapLuogo();
  const idComune = id_comune.value; // 🔥 fondamentale
  if (idComune) loadMapLuoghi(idComune);
  setTimeout(() => {
    map.invalidateSize();
  }, 200);
};
  
await loadComuni();
await load();
  
</script>
</body>
</html>
