<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luogo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

/* TOPBAR */
.topbar {
  padding: 12px 15px;
}

/* BACK BUTTON NUOVO */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  background: #22c55e;
  color: white;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  border: none;
  transition: 0.2s;
}

.back-btn.dirty {
  background: #f59e0b;
}

/* HERO */
.hero {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: white;
  margin: 10px 15px 8px;
  padding: 14px;
  border-radius: 12px;
}

/* CARD */
.card {
  background: white;
  margin: 0 15px 20px;
  padding: 15px;
  border-radius: 12px;
}

/* ROW */
.row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.label {
  width: 120px;
  font-size: 12px;
  color: #777;
  text-transform: capitalize;
}

.value {
  flex: 1;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 13px;
}

/* COMUNE PIÙ IMPORTANTE */
.hero-secondary {
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  color: #333;
  margin-bottom: 10px;
}

/* COORDS + CAPACITY INLINE */
.inline {
  display: flex;
  gap: 6px;
  align-items: center;
}

.small {
  max-width: 120px;
}

/* MAP BUTTON */
.map-btn {
  width: 60px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: #dbeafe;
  color: #1e3a8a;
  font-size: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <button id="backBtn" class="back-btn" onclick="requestBack()">
    ← Torna
  </button>
</div>

<div class="hero" id="lu_location"></div>

<div class="hero-secondary" id="lu_comune"></div>

<div class="card">

  <!-- DESCRIZIONE -->
  <div class="row">
    <div class="label">descrizione:</div>
    <div class="value">
      <textarea id="lu_descrizione" oninput="markDirty()"></textarea>
    </div>
  </div>

  <!-- NOTE -->
  <div class="row">
    <div class="label">note:</div>
    <div class="value">
      <textarea id="lu_note" oninput="markDirty()"></textarea>
    </div>
  </div>

  <!-- LAT LNG -->
  <div class="row">
    <div class="label">lat / lng:</div>
    <div class="value">
      <div class="inline">
        <input id="lu_lat" class="small" oninput="markDirty()">
        <input id="lu_lng" class="small" oninput="markDirty()">
        <button class="map-btn" onclick="openCoords()">Map</button>
      </div>
    </div>
  </div>

  <!-- CAPACITÀ -->
  <div class="row">
    <div class="label">capacità:</div>
    <div class="value">
      <input id="lu_capacita_massima" class="small" oninput="markDirty()">
    </div>
  </div>

</div>

<script type="module">
import { supabase } from '../supabase.js';

const id = new URLSearchParams(location.search).get('id');

let original = {};
let dirty = false;

/* LOAD */
async function load() {
  const { data } = await supabase
    .from('luoghi')
    .select('*')
    .eq('id_luogo', id)
    .single();

  original = JSON.stringify(data);

  lu_location.textContent = data.lu_location || '';
  lu_comune.textContent = data.lu_comune || '';
  lu_descrizione.value = data.lu_descrizione || '';
  lu_note.value = data.lu_note || '';
  lu_lat.value = data.lu_lat || '';
  lu_lng.value = data.lu_lng || '';
  lu_capacita_massima.value = data.lu_capacita_massima || '';
}

/* DIRTY */
window.markDirty = () => {
  const current = JSON.stringify({
    lu_descrizione: lu_descrizione.value,
    lu_note: lu_note.value,
    lu_lat: lu_lat.value,
    lu_lng: lu_lng.value,
    lu_capacita_massima: lu_capacita_massima.value
  });

  dirty = current !== original;

  document.getElementById('backBtn')
    .classList.toggle('dirty', dirty);
};

/* SAVE */
async function save() {
  await supabase.from('luoghi')
    .update({
      lu_descrizione: lu_descrizione.value,
      lu_note: lu_note.value,
      lu_lat: lu_lat.value,
      lu_lng: lu_lng.value,
      lu_capacita_massima: lu_capacita_massima.value
    })
    .eq('id_luogo', id);

  dirty = false;
}

/* BACK */
window.requestBack = async () => {
  if (!dirty) return history.back();

  const ok = confirm("Vuoi salvare le modifiche?");
  if (ok) await save();

  history.back();
};

/* MAP */
window.openCoords = () => {
  window.open(
    `https://sergiocer.github.io/Coordinate/?lat=${lu_lat.value}&lng=${lu_lng.value}`,
    "_blank"
  );
};

load();
</script>

</body>
</html>
