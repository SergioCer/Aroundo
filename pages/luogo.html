<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luogo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

/* TOPBAR */
.topbar {
  padding: 12px 15px;
}

/* BACK ICON ONLY */
.back-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #22c55e;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.back-btn.dirty {
  background: #f59e0b;
}

/* HERO LOCATION */
.hero {
  margin: 10px 15px 8px;
  padding: 12px;
  background: white;
  border-radius: 12px;
}

.hero input {
  width: 100%;
  font-size: 20px;
  font-weight: bold;
  border: none;
  text-align: center;
  background: transparent;
}

/* CARD */
.card {
  background: white;
  margin: 0 15px 20px;
  padding: 15px;
  border-radius: 12px;
}

/* LABEL OUTSIDE */
.section-title {
  font-size: 11px;
  color: #777;
  margin: 12px 0 4px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  padding: 6px;
  border-radius: 6px;
  font-size: 13px;
}

/* INLINE ROW */
.inline {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* MAP BUTTON */
.map-btn {
  width: 60px;
  height: 30px;
  border-radius: 6px;
  border: none;
  background: #dbeafe;
  color: #1e3a8a;
  font-size: 12px;
  cursor: pointer;
}

/* BACK ICON STYLE DIFFERENT WHEN DIRTY */
</style>
</head>

<body>

<div class="topbar">
  <button id="backBtn" class="back-btn" onclick="requestBack()">←</button>
</div>

<div class="hero">

  <!-- COMUNE (EDITABILE) -->
  <select id="lu_comune"
          style="font-size:20px; font-weight:700; text-align:center; width:100%; border:none; background:transparent;"
          oninput="markDirty()"></select>

</div>

<div class="card">

  <!-- LOCATION -->
  <div class="section-title">Location:</div>
  <input id="lu_location"style="font-size:16px; font-weight:600; text-align:left;"
         oninput="markDirty()">

  <!-- DESCRIZIONE -->
  <div class="section-title">Descrizione:</div>
  <textarea id="lu_descrizione" oninput="markDirty()"></textarea>

  <!-- NOTE -->
  <div class="section-title">Note:</div>
  <textarea id="lu_note" oninput="markDirty()"></textarea>

<!-- RIGA 1: LABEL -->
<div style="display:flex; font-size: 11px; gap:20px; margin-bottom:4px;">
  <div style="flex:1;">Capacità:</div>
  <div style="flex:1;">Lat:</div>
  <div style="flex:1;">Lng:</div>
  <div style="width:70px;"></div>
</div>

<!-- RIGA 2: VALORI + MAP -->
<div style="display:flex; gap:20px; align-items:center;">

  <div style="flex:1;">
    <input id="lu_capacita_massima" oninput="markDirty()">
  </div>

  <div style="flex:1;">
    <input id="lu_lat" oninput="markDirty()">
  </div>

  <div style="flex:1;">
    <input id="lu_lng" oninput="markDirty()">
  </div>

  <div style="width:70px;">
    <button class="map-btn" onclick="openCoords()">Map</button>
  </div>

</div>

<script type="module">
import { supabase } from '../supabase.js';

const id = new URLSearchParams(location.search).get('id');

let original = {};
let dirty = false;

/* COMUNI */
async function loadComuni() {
  const { data } = await supabase.from('comuni').select('*');

  const sorted = data.sort((a,b)=>
    (a.co_descrizione||'').localeCompare(b.co_descrizione||'')
  );

  const sel = document.getElementById("lu_comune");
  sel.innerHTML = `<option value="">--</option>`;

  sorted.forEach(c=>{
    sel.innerHTML += `<option value="${c.id_comune}">${c.co_descrizione}</option>`;
  });
}

/* LOAD */
async function load() {
  const { data } = await supabase
    .from('luoghi')
    .select('*, comuni(co_descrizione)')
    .eq('id_luogo', id)
    .single();

  original = JSON.stringify(data);

  lu_location.value = data.lu_location || '';
  lu_comune.value = data.lu_comune || '';
  lu_descrizione.value = data.lu_descrizione || '';
  lu_note.value = data.lu_note || '';
  lu_lat.value = data.lu_lat || '';
  lu_lng.value = data.lu_lng || '';
  lu_capacita_massima.value = data.lu_capacita_massima || '';
}

/* DIRTY */
window.markDirty = () => {
  const current = JSON.stringify({
    lu_location: lu_location.value,
    lu_comune: lu_comune.value,
    lu_descrizione: lu_descrizione.value,
    lu_note: lu_note.value,
    lu_lat: lu_lat.value,
    lu_lng: lu_lng.value,
    lu_capacita_massima: lu_capacita_massima.value
  });

  dirty = current !== original;

  document.getElementById('backBtn')
    .classList.toggle('dirty', dirty);
};

/* SAVE */
async function save() {
  const { error } = await supabase.from('luoghi')
    .update({
      lu_location: lu_location.value,
      lu_comune: lu_comune.value,
      lu_descrizione: lu_descrizione.value,
      lu_note: lu_note.value,
      lu_lat: lu_lat.value,
      lu_lng: lu_lng.value,
      lu_capacita_massima: lu_capacita_massima.value
    })
    .eq('id_luogo', id);

  if (error) {
    console.error(error);
    alert("Errore salvataggio");
    return false;
  }

  dirty = false;
  return true;
}

/* BACK */
window.requestBack = async () => {
  if (!dirty) return history.back();

  const ok = confirm("Vuoi salvare le modifiche?");
if (ok) {
  const success = await save();
  if (!success) return;
}
history.back();
};

/* MAP */
window.openCoords = () => {
  window.open(
    `https://sergiocer.github.io/Coordinate/?lat=${lu_lat.value}&lng=${lu_lng.value}`,
    "_blank"
  );
};

await loadComuni();
await load();
</script>

</body>
</html>
